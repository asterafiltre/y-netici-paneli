<script src="./teslimat.js"></script>
<script>
if(!window.TeslimatModule){
(function(global){
  "use strict";

  var bridge = global.ModuleBridge && typeof global.ModuleBridge.createHelpers === "function"
    ? global.ModuleBridge.createHelpers("TeslimatModule", {
      render: {
        renderTeslimPage: "pgTeslim",
        renderCariDetail: "renderCariD",
        renderCariList: "renderML"
      },
      actions: {
        openModal: "openModal",
        closeModal: "closeModal",
        downloadTextFile: "downloadTextFile",
        findCustomerByIdentity: "findCustomerByIdentity",
        customerMatchesIdentity: "customerMatchesIdentity",
        printDocWrap: "printDocWrap",
        syncStockDown: "syncStockDown",
        saveProds: "saveProds",
        syncTeslimlerFromSatis: "syncTeslimlerFromSatis",
        confirm: "confirm"
      },
      formatters: {
        today: "today",
        formatDate: "fD",
        formatCustomerLink: "mLink",
        uid: "uid"
      },
      stateRefs: {
        currentPage: { get: function(){ return global.curPage; } },
        selectedCustomer: { get: function(){ return global.selMusteri || null; } }
      }
    })
    : null;
  var state = {
    tslDoc: global.tslDoc || null,
    signCanvas: null,
    signCtx: null,
    signDrawing: false
  };

  global.tslDoc = state.tslDoc;

  function el(id){
    if (bridge) return bridge.el(id);
    if (typeof global.g === "function") return global.g(id);
    return document.getElementById(id);
  }

  function notify(msg, type){
    if (bridge) return bridge.notify(msg, type);
    if (typeof global.notif === "function") return global.notif(msg, type);
    console[type === "red" ? "warn" : "log"](msg);
  }

  function fmtMoney(v){
    if (bridge) return bridge.fmtMoney(v);
    if (typeof global.fmt === "function") return global.fmt(v);
    return (parseFloat(v || 0) || 0).toLocaleString("tr-TR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function readState(key, fallback){
    if (bridge) return bridge.readState(key, fallback);
    if (!global.AppState) return fallback;
    var value = global.AppState.get(key);
    return value == null ? fallback : value;
  }

  function saveState(key, value){
    if (bridge) return bridge.saveState(key, value);
    if (!global.AppState) return value;
    global.AppState.set(key, value);
    global.AppState.save(key);
    return value;
  }

  function clone(v){
    if (bridge) return bridge.clone(v);
    if (typeof global.deepClone === "function") return global.deepClone(v);
    try { return JSON.parse(JSON.stringify(v)); } catch (err) { return v; }
  }

  function todayValue(){
    return bridge ? bridge.call("today", [], function(){ return ""; }) : (typeof global.today === "function" ? global.today() : "");
  }

  function openModalSafe(title, body, footer, wide){
    if (bridge) return bridge.call("openModal", [title, body, footer, wide], function(){});
    if (typeof global.openModal === "function") return global.openModal(title, body, footer, wide);
  }

  function closeModalSafe(){
    if (bridge) return bridge.call("closeModal", [], function(){});
    if (typeof global.closeModal === "function") return global.closeModal();
  }

  function formatDateValue(value){
    return bridge ? bridge.call("formatDate", [value], function(){ return value || ""; }) : (typeof global.fD === "function" ? global.fD(value) : (value || ""));
  }

  function makeId(){
    return bridge ? bridge.call("uid", [], function(){ return String(Date.now()); }) : (typeof global.uid === "function" ? global.uid() : String(Date.now()));
  }

  function findCustomer(input){
    return bridge ? bridge.call("findCustomerByIdentity", [input], function(){ return null; }) : (typeof global.findCustomerByIdentity === "function" ? global.findCustomerByIdentity(input) : null);
  }

  function matchesCustomer(mu, input){
    return bridge ? bridge.call("customerMatchesIdentity", [mu, input], function(){ return mu ? mu.ad === input : false; }) : (typeof global.customerMatchesIdentity === "function" ? global.customerMatchesIdentity(mu, input) : (mu ? mu.ad === input : false));
  }

  function formatCustomerLink(value){
    return bridge ? bridge.call("formatCustomerLink", [value], function(){ return value || ""; }) : (typeof global.mLink === "function" ? global.mLink(value) : (value || ""));
  }

  function confirmAction(message){
    return bridge ? bridge.call("confirm", [message], function(){ return true; }) : global.confirm(message);
  }

  function downloadTextFileSafe(name, content, mime){
    if (bridge) return bridge.call("downloadTextFile", [name, content, mime], function(){});
    if (typeof global.downloadTextFile === "function") return global.downloadTextFile(name, content, mime);
  }

  function printDocSafe(){
    if (bridge) return bridge.call("printDocWrap", [], function(){});
    if (typeof global.printDocWrap === "function") return global.printDocWrap();
  }

  function syncStockDownSafe(mann, adet){
    if (bridge) return bridge.call("syncStockDown", [mann, adet], function(){});
    if (typeof global.syncStockDown === "function") return global.syncStockDown(mann, adet);
  }

  function saveProdsSafe(){
    if (bridge) return bridge.call("saveProds", [], function(){});
    if (typeof global.saveProds === "function") return global.saveProds();
  }

  function syncTeslimlerSafe(){
    if (bridge) return bridge.call("syncTeslimlerFromSatis", [], function(){});
    if (typeof global.syncTeslimlerFromSatis === "function") return global.syncTeslimlerFromSatis();
  }

  function currentPageValue(){
    return bridge ? bridge.get("currentPage", "") : global.curPage;
  }

  function selectedCustomerValue(){
    return bridge ? bridge.get("selectedCustomer", null) : global.selMusteri;
  }

  function renderTeslimPageSafe(){
    if (bridge) return bridge.refresh(["renderTeslimPage"]);
    if (typeof global.pgTeslim === "function") return global.pgTeslim();
  }

  function renderCariDetailSafe(customer){
    if (!customer) return;
    if (bridge) return bridge.call("renderCariDetail", [customer], function(){});
    if (typeof global.renderCariD === "function") return global.renderCariD(customer);
  }

  function renderCariListSafe(){
    if (bridge) return bridge.refresh(["renderCariList"]);
    if (typeof global.renderML === "function") return global.renderML();
  }

  function getTeslimler(){ return readState("teslimler", []) || []; }
  function getSatis(){ return readState("satis", []) || []; }
  function getCari(){ return readState("cari", []) || []; }
  function getMusteriler(){ return readState("musteriler", []) || []; }

  function syncDocGlobal(){ global.tslDoc = state.tslDoc; }

  function pushUndo(kind, label, data){
    if (bridge) return bridge.pushUndo(kind, label, data);
    if (typeof global.pushUndoSnapshot === "function") {
      try { global.pushUndoSnapshot(kind, label, data); } catch (err) {}
    }
  }

  function teslimRows(){
    return getTeslimler().slice().sort(function(a, b){
      return String(b.signedAt || b.tarih || "").localeCompare(String(a.signedAt || a.tarih || ""));
    });
  }

  function pgTeslim(){
    var pageActs = el("pageActs");
    var content = el("content");
    if (!content) return console.warn("TeslimatModule.pgTeslim: content missing.");
    if (pageActs) pageActs.innerHTML = "";
    var options = getMusteriler().map(function(m){ return "<option>" + m.ad + "</option>"; }).join("");
    content.innerHTML = "<div class='card mb12'><div class='card-hdr'><div class='card-hdr-t'>Teslim Belgesi Olustur</div></div><div class='card-body'>"
      + "<div class='fr'><div class='fg'><label>Musteri</label><select id='tslM' onchange='loadTslItems()'><option value=''>-- Secin --</option>" + options + "</select></div>"
      + "<div class='fg'><label>Teslim Tarihi</label><input type='date' id='tslT' value='" + todayValue() + "'></div></div>"
      + "<div id='tslItemArea' style='display:none'><hr class='sep'><div class='flex jb ic mb8'><div class='sec-t'>Teslim Edilecek Urunler</div><button class='btn btn-sec btn-xs' onclick='selectAllTsl()'>Tumunu Sec</button></div><div id='tslItemList' style='display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px'></div><button class='btn btn-acc' onclick='genTslDoc()'>Belge Olustur</button></div></div></div>"
      + "<div id='tslDocArea' style='display:none'><div class='flex gap7 mb12 no-print flex-wrap'><button class='btn btn-sec' onclick='clearSign()'>Imzayi Temizle</button><button class='btn btn-acc' onclick='printDocWrap()'>Yazdir</button><button class='btn btn-grn' onclick='tslKaydet()'>Kaydet</button><span class='fz10 txt2' style='align-self:center'>Istege bagli imza; imzasiz da kaydedebilirsiniz.</span></div><div class='doc-wrap' id='tslDocContent'></div></div>";
  }

  function signDataUrl(){
    if (!state.signCanvas || !state.signCtx) return "";
    var placeholder = el("signPh");
    if (placeholder && placeholder.style.display !== "none") return "";
    return state.signCanvas.toDataURL("image/png");
  }

  function buildPrintableDocHtml(wrap){
    if (!wrap) return "";
    var cloneNode = wrap.cloneNode(true);
    var signature = signDataUrl() || "";
    var stampOverlay = cloneNode.querySelector("#tslStampOverlay");
    var stampWrap = cloneNode.querySelector("#tslStampWrap");
    var canvasEl = cloneNode.querySelector("#signCanvas");
    if (canvasEl) {
      if (signature) {
        var img = document.createElement("img");
        img.src = signature;
        img.alt = "Imza";
        img.className = "signature-overlay";
        canvasEl.parentNode.replaceChild(img, canvasEl);
      } else {
        canvasEl.remove();
      }
    }
    if (stampOverlay && stampOverlay.getAttribute("src")) {
      stampOverlay.style.display = "block";
      if (stampWrap) stampWrap.remove();
    }
    var ph = cloneNode.querySelector("#signPh");
    if (ph && signature) ph.remove();
    return cloneNode.innerHTML;
  }

  function buildTeslimArchiveHtml(entry){
    return "<!doctype html><html lang='tr'><head><meta charset='utf-8'><title>Teslim Belgesi</title><meta name='viewport' content='width=device-width,initial-scale=1'></head><body style='font-family:Segoe UI,Arial,sans-serif;background:#f6f1e7;padding:24px'><div style='max-width:900px;margin:0 auto;background:#fff;border:1px solid #ddd;border-radius:14px;padding:18px'>" + (entry.docHtml || "") + "</div></body></html>";
  }

  function buildTeslimBelgeViewerBody(t){
    if (t.docHtml && String(t.docHtml).trim().length > 20) return "<div class='doc-wrap' style='max-height:70vh;overflow:auto'>" + t.docHtml + "</div>";
    var parts = [];
    if (t.signature) parts.push("<div style='text-align:center'><div class='sec-t' style='margin-bottom:8px'>Panel imzasi</div><img src='" + t.signature + "' alt='' style='max-width:100%;max-height:420px;border:1px solid var(--bdr);border-radius:8px;object-fit:contain'></div>");
    if (t.kaseFoto) parts.push("<div style='text-align:center;margin-top:16px'><div class='sec-t' style='margin-bottom:8px'>Kase fotografi</div><img src='" + t.kaseFoto + "' alt='' style='max-width:100%;max-height:420px;border:1px solid var(--bdr);border-radius:8px;object-fit:contain'></div>");
    if (t.tarananBelge) {
      var tb = t.tarananBelge;
      if (String(tb).indexOf("data:application/pdf") === 0 || String(tb).indexOf("application/pdf") > 0) parts.push("<div style='margin-top:16px'><div class='sec-t' style='margin-bottom:8px'>Taranmis belge (PDF)</div><embed src='" + tb + "' type='application/pdf' style='width:100%;min-height:520px;border:1px solid var(--bdr);border-radius:8px'></div>");
      else parts.push("<div style='text-align:center;margin-top:16px'><div class='sec-t' style='margin-bottom:8px'>Taranmis belge</div><img src='" + tb + "' alt='' style='max-width:100%;max-height:70vh;border:1px solid var(--bdr);border-radius:8px;object-fit:contain'></div>");
    }
    return parts.length ? "<div style='padding:8px'>" + parts.join("") + "</div>" : null;
  }

  function viewTeslimDoc(id){
    var doc = getTeslimler().find(function(x){ return x.id === id; });
    if (!doc) return;
    var body = buildTeslimBelgeViewerBody(doc);
    if (!body) {
      openModalSafe("Teslim Evraki", "<div class='empty-st' style='padding:24px;text-align:center'><div style='font-size:14px;font-weight:700;margin-bottom:6px'>Belge yuklenmedi</div><div class='fz11 txt2'>Imzali HTML, imza, kase veya taranmis belge yok.</div></div>", "<button class='btn btn-sec' onclick='closeModal()'>Kapat</button>", false);
      return;
    }
    openModalSafe("Teslim Evraki", body, "<button class='btn btn-sec' onclick='closeModal()'>Kapat</button><button class='btn btn-acc' onclick=\"downloadTeslimDoc('" + id + "')\">Indir</button>", true);
  }

  function downloadTeslimDoc(id){
    var doc = getTeslimler().find(function(x){ return x.id === id; });
    if (!doc) return;
    return downloadTextFileSafe("teslim-" + String(doc.musteri || "evrak").replace(/[^a-zA-Z0-9]+/g, "-") + "-" + (doc.tarih || todayValue()) + ".html", buildTeslimArchiveHtml(doc), "text/html;charset=utf-8");
  }

  function selectAllTsl(){
    var list = el("tslItemList");
    if (!list) return;
    Array.prototype.forEach.call(list.querySelectorAll(".tsl-item"), function(node){
      node.classList.add("selected");
      node.style.background = "var(--blue-bg)";
      var check = node.querySelector("input");
      if (check) check.checked = true;
    });
  }

  function loadTslItems(){
    var musteriEl = el("tslM");
    var area = el("tslItemArea");
    var list = el("tslItemList");
    if (!musteriEl || !area || !list) return;
    var musteri = musteriEl.value;
    if (!musteri) {
      area.style.display = "none";
      return;
    }
    var mu = findCustomer(musteri);
    var satis = getSatis().filter(function(s){
      return mu ? matchesCustomer(mu, s.musteri) : s.musteri === musteri;
    });
    if (!satis.length) {
      notify("Bu musteride satis yok", "red");
      area.style.display = "none";
      return;
    }
    list.innerHTML = satis.map(function(s, i){
      return "<div class='tsl-item flex ic gap8' data-i='" + i + "' style='padding:8px;border:1.5px solid var(--bdr);border-radius:var(--rs);cursor:pointer;background:var(--sur)' onclick='tslToggle(this)'><input type='checkbox' style='display:none'><span class='fz11'>" + formatDateValue(s.tarih) + " - " + (s.mann || "") + " (" + (s.adet || 0) + " adet) - " + fmtMoney(s.toplam) + "TL</span></div>";
    }).join("");
    area.style.display = "block";
  }

  function tslToggle(node){
    if (!node) return;
    node.classList.toggle("selected");
    node.style.background = node.classList.contains("selected") ? "var(--blue-bg)" : "var(--sur)";
    var check = node.querySelector("input");
    if (check) check.checked = !check.checked;
  }

  function genTslDoc(){
    var musteriEl = el("tslM");
    var tarihEl = el("tslT");
    var itemList = el("tslItemList");
    var docArea = el("tslDocArea");
    var content = el("tslDocContent");
    if (!musteriEl || !tarihEl || !itemList || !docArea || !content) return;

    var musteri = musteriEl.value;
    var tarih = tarihEl.value || todayValue();
    var mu = findCustomer(musteri);
    var satis = getSatis().filter(function(s){
      return mu ? matchesCustomer(mu, s.musteri) : s.musteri === musteri;
    });
    var secili = Array.from(itemList.querySelectorAll(".selected")).map(function(node){ return satis[parseInt(node.getAttribute("data-i"), 10)]; }).filter(Boolean);
    if (!secili.length) return notify("En az bir urun secin", "red");

    var araToplam = secili.reduce(function(sum, row){ return sum + (parseFloat(row.toplam) || 0); }, 0);
    var iskontoOrani = Math.max(0, parseFloat(mu && mu.iskonto || 0) || 0);
    var iskontoTutari = araToplam * iskontoOrani / 100;
    var toplam = Math.max(0, araToplam - iskontoTutari);
    state.tslDoc = { musteri: musteri, tarih: tarih, items: secili, araToplam: araToplam, iskontoOrani: iskontoOrani, iskontoTutari: iskontoTutari, toplam: toplam, kaseFoto: "" };
    syncDocGlobal();

    mu = mu || {};
    var logo = typeof global.ls === "function" ? global.ls(global.K.logo, "") || "" : "";
    var logoHtml = logo ? "<img src='" + logo + "' style='height:48px;width:auto'>" : "<div style='width:48px;height:48px;background:#2a2118;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:22px'>A</div>";
    var rows = secili.map(function(s, i){
      return "<tr><td>" + (i + 1) + "</td><td class='r'>" + (s.mann || "") + "</td><td class='c'>" + (s.adet || 0) + "</td><td class='r'>" + fmtMoney(s.fiyat) + "TL</td><td class='r'>" + fmtMoney(s.toplam) + "TL</td></tr>";
    }).join("");
    var kaseHtml = mu.kase ? "<img class='kase-overlay' src='" + mu.kase + "'>" : "";
    var totalsHtml = "<div class='doc-tr-row'><span>ARA TOPLAM</span><span>" + fmtMoney(araToplam) + " TL</span></div>";
    if (iskontoOrani > 0 || iskontoTutari > 0) {
      totalsHtml += "<div class='doc-tr-row amb'><span>ISKONTO (%" + fmtMoney(iskontoOrani) + ")</span><span>-" + fmtMoney(iskontoTutari) + " TL</span></div>";
    }
    totalsHtml += "<div class='doc-tr-row grand'><span>GENEL TOPLAM</span><span>" + fmtMoney(toplam) + " TL</span></div>";

    content.innerHTML = "<div class='doc-hdr-row'><div class='flex ic gap10'>" + logoHtml + "<div class='doc-co'>ASTERA TICARET<small>Filtre Sistemleri - Erzurum</small></div></div><div class='doc-no-block'><strong>TESLIM TESELLUM - " + nextTeslimNo() + "</strong>Tarih: " + formatDateValue(tarih) + "</div></div>"
      + "<div style='margin-bottom:12px;font-size:13px'><strong>Teslim Alan:</strong> " + formatCustomerLink(musteri) + "</div>"
      + "<table class='doc-tbl'><thead><tr><th>#</th><th class='r'>URUN (MANN)</th><th class='c'>ADET</th><th class='r'>BIR. FIYAT</th><th class='r'>TOPLAM</th></tr></thead><tbody>" + rows + "</tbody></table>"
      + "<div class='doc-totals'>" + totalsHtml + "</div>"
      + "<div class='sign-grid mt16'><div><span class='sign-lbl'>TESLIM EDEN - ASTERA TICARET</span><div style='border-top:1.5px solid var(--acc);padding-top:6px;font-size:12px'>Imzalanmis belge</div></div><div><span class='sign-lbl'>TESLIM ALAN - IMZA / KASE</span><div class='sign-area' id='signArea'>" + kaseHtml + "<img id='tslStampOverlay' class='kase-overlay uploaded-stamp' style='display:none' alt='Kase'><canvas id='signCanvas'></canvas><div class='sign-ph' id='signPh'>Parmak veya fare ile imzalayin</div></div><div class='mt8 no-print'><label class='btn btn-sec btn-sm' style='cursor:pointer'>Kase Yukle<input type='file' id='tslStampInput' accept='image/*' capture='environment' style='display:none'></label><div class='fz10 txt2 mt8'>Yuklenen kase hem imza kutusunda hem belge altinda gosterilir.</div></div></div></div>"
      + "<div id='tslStampWrap' class='mt16 stamp-photo-wrap' style='display:none'><div class='sign-lbl'>TESLIM ALAN KASE FOTOGRAFI</div><img id='tslStampImg' class='stamp-photo'><div class='fz10 txt2'>Belgeye ekli kase/gorsel kayit</div></div><div class='doc-footer'>Erzurum ici teslimat ucretsiz olup, Erzurum disindaki yerler icin otobus veya kargo ile karsi odemeli gonderim yapilir.</div>";

    docArea.style.display = "block";
    docArea.scrollIntoView({ behavior: "smooth" });
    setTimeout(function(){ initSign(); bindTslStamp(); }, 200);
  }

  function bindTslStamp(){
    var input = el("tslStampInput");
    if (!input) return;
    input.onchange = function(){
      var file = this.files && this.files[0];
      if (!file || !state.tslDoc) return;
      var reader = new FileReader();
      reader.onload = function(e){
        state.tslDoc.kaseFoto = e.target.result;
        syncDocGlobal();
        if (el("tslStampOverlay")) {
          el("tslStampOverlay").src = state.tslDoc.kaseFoto;
          el("tslStampOverlay").style.display = "block";
        }
        if (el("tslStampImg")) el("tslStampImg").src = state.tslDoc.kaseFoto;
        if (el("tslStampWrap")) el("tslStampWrap").style.display = "block";
      };
      reader.readAsDataURL(file);
    };
  }

  function initSign(){
    var area = el("signArea");
    var canvas = el("signCanvas");
    if (!area || !canvas) return;
    state.signCanvas = canvas;
    state.signCtx = canvas.getContext("2d");
    canvas.width = area.offsetWidth;
    canvas.height = area.offsetHeight || 90;
    state.signCtx.strokeStyle = "#1a1917";
    state.signCtx.lineWidth = 2.5;
    state.signCtx.lineCap = "round";

    function pos(e){
      var rect = canvas.getBoundingClientRect();
      var touch = e.touches ? e.touches[0] : e;
      return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
    }

    canvas.onmousedown = function(e){
      state.signDrawing = true;
      var p = pos(e);
      state.signCtx.beginPath();
      state.signCtx.moveTo(p.x, p.y);
      if (el("signPh")) el("signPh").style.display = "none";
    };
    canvas.onmousemove = function(e){
      if (!state.signDrawing) return;
      var p = pos(e);
      state.signCtx.lineTo(p.x, p.y);
      state.signCtx.stroke();
    };
    canvas.onmouseup = function(){ state.signDrawing = false; };
    canvas.ontouchstart = function(e){
      e.preventDefault();
      state.signDrawing = true;
      var p = pos(e);
      state.signCtx.beginPath();
      state.signCtx.moveTo(p.x, p.y);
      if (el("signPh")) el("signPh").style.display = "none";
    };
    canvas.ontouchmove = function(e){
      e.preventDefault();
      if (!state.signDrawing) return;
      var p = pos(e);
      state.signCtx.lineTo(p.x, p.y);
      state.signCtx.stroke();
    };
    canvas.ontouchend = function(){ state.signDrawing = false; };
  }

  function clearSign(){
    if (state.signCanvas && state.signCtx) {
      state.signCtx.clearRect(0, 0, state.signCanvas.width, state.signCanvas.height);
      if (el("signPh")) el("signPh").style.display = "flex";
    }
  }

  function printTsl(){
    printDocSafe();
  }

  function nextTeslimNo(){
    var maxNo = 0;
    getTeslimler().forEach(function(t){
      if (t.belgeNo) {
        var n = parseInt(String(t.belgeNo).replace(/[^0-9]/g, ""), 10) || 0;
        if (n > maxNo) maxNo = n;
      }
    });
    return "TB-" + String(maxNo + 1).padStart(4, "0");
  }

  function tslKaydet(){
    if (!state.tslDoc) return;
    var teslimler = getTeslimler();
    var signature = signDataUrl() || "";
    var belgeNo = nextTeslimNo();
    var wrap = el("tslDocContent");
    var cloneNode = wrap ? wrap.cloneNode(true) : null;
    if (cloneNode) {
      cloneNode.innerHTML = buildPrintableDocHtml(wrap);
      var noBlock = cloneNode.querySelector(".doc-no-block");
      if (noBlock) {
        var strong = noBlock.querySelector("strong");
        if (strong) strong.textContent = "TESLIM TESELLUM - " + belgeNo;
      }
    }
    (state.tslDoc.items || []).forEach(function(s){
      syncStockDownSafe(s.mann, s.adet);
    });
    saveProdsSafe();
    teslimler.push({
      id: makeId(),
      belgeNo: belgeNo,
      tarih: state.tslDoc.tarih,
      musteri: state.tslDoc.musteri,
      items: state.tslDoc.items,
      araToplam: state.tslDoc.araToplam || state.tslDoc.toplam,
      iskontoOrani: state.tslDoc.iskontoOrani || 0,
      iskontoTutari: state.tslDoc.iskontoTutari || 0,
      toplam: state.tslDoc.toplam,
      kaseFoto: state.tslDoc.kaseFoto || "",
      signature: signature,
      signedAt: signature ? new Date().toISOString() : "",
      docHtml: cloneNode ? cloneNode.innerHTML : "",
      tarananBelge: "",
      otomatikFiÅŸ: false
    });
    saveState("teslimler", teslimler);
    syncTeslimlerSafe();
    notify(signature ? "Kaydedildi (" + belgeNo + "), stoklar guncellendi!" : "Kaydedildi (" + belgeNo + ", imzasiz), stoklar guncellendi!", "grn");
  }

  function renderCariBekleyenHtml(m){
    var mu = findCustomer(m);
    var bekleyen = (readState("bekleyenSiparisler", []) || []).filter(function(b){
      return mu ? matchesCustomer(mu, b.musteri) : b.musteri === m;
    });
    if (!bekleyen.length) return "";
    var rows = bekleyen.map(function(b){
      return "<tr><td>" + formatDateValue(b.tarih || "") + "</td><td class='mono fw7'>" + (b.mann || "") + "</td><td class='fz11 txt2'>" + String(b.name || "").substring(0, 30) + "</td><td class='c fw7 amb'>" + (b.bekleyenAdet || 0) + "</td><td class='r mono'>" + fmtMoney(b.fiyat || 0) + "TL</td><td class='r mono amb fw7'>" + fmtMoney((b.fiyat || 0) * (b.bekleyenAdet || 0)) + "TL</td><td class='c'><button class='btn btn-red btn-xs bek-iptal-btn' data-bid='" + b.id + "'>Iptal</button></td></tr>";
    }).join("");
    var toplam = bekleyen.reduce(function(sum, b){ return sum + (b.fiyat || 0) * (b.bekleyenAdet || 0); }, 0);
    return "<div class='card mt12' style='border:2px solid var(--amb)'><div class='card-hdr' style='background:var(--amb-bg)'><div class='card-hdr-t' style='color:var(--amb)'>Bekleyen Siparisler (" + bekleyen.length + " kalem)</div><span class='mono fw7' style='color:var(--amb)'>" + fmtMoney(toplam) + "TL</span></div><div class='tbl-wrap'><table class='tbl'><thead><tr><th>Tarih</th><th>MANN</th><th>Urun</th><th class='c'>Bek. Adet</th><th class='r'>Bir. Fiyat</th><th class='r'>Toplam</th><th class='c'>Islem</th></tr></thead><tbody>" + rows + "</tbody></table></div></div>";
  }

  function deleteTeslimBelgesi(id){
    var teslimler = getTeslimler();
    var cari = getCari();
    var rec = teslimler.find(function(t){ return t.id === id; });
    if (!rec) return notify("Teslimat fisi bulunamadi", "red");
    var linkedIadeler = cari.filter(function(c){ return c.teslimId === id; });
    var bn = rec.belgeNo || String(id || "").slice(-6).toUpperCase();
    var msg = "Teslimat fisi " + bn + " silinsin mi?";
    if (linkedIadeler.length) msg += " Bagli " + linkedIadeler.length + " iade kaydi da silinecek.";
    if (rec.otomatikFiÅŸ) msg += " Bu fis satislarla eslestirme sirasinda tekrar olusabilir.";
    if (!confirmAction(msg)) return;
    pushUndo("teslimler", "Teslim fisi silme", { teslimler: clone(teslimler), cari: clone(cari) });
    teslimler = teslimler.filter(function(t){ return t.id !== id; });
    if (linkedIadeler.length) cari = cari.filter(function(c){ return c.teslimId !== id; });
    saveState("teslimler", teslimler);
    saveState("cari", cari);
    closeModalSafe();
    if (currentPageValue() === "teslim") renderTeslimPageSafe();
    renderCariDetailSafe(selectedCustomerValue());
    renderCariListSafe();
    notify("Teslimat fisi silindi Â· Geri alinabilir", "red");
  }

  var api = {
    teslimRows: teslimRows,
    pgTeslim: pgTeslim,
    signDataUrl: signDataUrl,
    buildPrintableDocHtml: buildPrintableDocHtml,
    buildTeslimArchiveHtml: buildTeslimArchiveHtml,
    buildTeslimBelgeViewerBody: buildTeslimBelgeViewerBody,
    viewTeslimDoc: viewTeslimDoc,
    downloadTeslimDoc: downloadTeslimDoc,
    selectAllTsl: selectAllTsl,
    loadTslItems: loadTslItems,
    tslToggle: tslToggle,
    genTslDoc: genTslDoc,
    bindTslStamp: bindTslStamp,
    initSign: initSign,
    clearSign: clearSign,
    printTsl: printTsl,
    nextTeslimNo: nextTeslimNo,
    tslKaydet: tslKaydet,
    renderCariBekleyenHtml: renderCariBekleyenHtml,
    deleteTeslimBelgesi: deleteTeslimBelgesi
  };

  global.TeslimatModule = api;
  Object.keys(api).forEach(function(key){ global[key] = api[key]; });
})(window);

}
</script>
<script src="./satinalma.js"></script>
<script>
if(!window.SatinAlmaModule){
(function(global){
  "use strict";

  var bridge = global.ModuleBridge && typeof global.ModuleBridge.createHelpers === "function"
    ? global.ModuleBridge.createHelpers("SatinAlmaModule", {

        renderSATable: "renderSATbl"

  };

  global.saFlt = state.saFlt;
  global.curSATab = state.curSATab;
  global.saUrunC = state.saUrunC;

  function el(id){
    if (bridge) return bridge.el(id);
    if (typeof global.g === "function") return global.g(id);

  }

  function notify(msg, type){

  function fmtMoney(v){
    if (bridge) return bridge.fmtMoney(v);
    if (typeof global.fmt === "function") return global.fmt(v);
    return (parseFloat(v || 0) || 0).toLocaleString("tr-TR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function readState(key, fallback){
    if (bridge) return bridge.readState(key, fallback);
    if (!global.AppState) return fallback;
    var value = global.AppState.get(key);
    return value == null ? fallback : value;
  }

  function saveState(key, value){
    if (bridge) return bridge.saveState(key, value);
    if (!global.AppState) return value;
    global.AppState.set(key, value);
    global.AppState.save(key);
    return value;
  }

  function clone(v){
    if (bridge) return bridge.clone(v);
    if (typeof global.deepClone === "function") return global.deepClone(v);
    try { return JSON.parse(JSON.stringify(v)); } catch (err) { return v; }
  }

  function todayValue(){
    return bridge ? bridge.call("today", [], function(){ return ""; }) : (typeof global.today === "function" ? global.today() : "");
  }

  function closeModalSafe(){
    if (bridge) return bridge.call("closeModal", [], function(){});
    if (typeof global.closeModal === "function") return global.closeModal();
  }

  function formatDateValue(value){
    return bridge ? bridge.call("formatDate", [value], function(){ return value || ""; }) : (typeof global.fD === "function" ? global.fD(value) : (value || ""));
  }

  function makeId(){
    return bridge ? bridge.call("uid", [], function(){ return String(Date.now()); }) : (typeof global.uid === "function" ? global.uid() : String(Date.now()));
  }

  function confirmAction(message){
    return bridge ? bridge.call("confirm", [message], function(){ return true; }) : global.confirm(message);
  }

    return typeof global.getAllP === "function" ? global.getAllP() : [];

  }

    if (typeof global.addOrUpdateProd === "function") return global.addOrUpdateProd(grupKey, tur, payload);
  }

  function ensureVendorStructuresSafe(){
    if (bridge) return bridge.call("ensureVendorStructures", [], function(){});
    if (typeof global.ensureVendorStructures === "function") return global.ensureVendorStructures();
  }

  function renderSATableSafe(){
    if (bridge) return bridge.refresh(["renderSATable"]);
    return renderSATbl();
  }

  function getSatinalma(){ return readState("satinalma", []) || []; }
  function getHarcamalar(){ return readState("harcamalar", []) || []; }
  function getProducts(){ return readState("products", {}) || {}; }

  function syncGlobals(){
    global.saFlt = state.saFlt;
    global.curSATab = state.curSATab;
    global.saUrunC = state.saUrunC;
  }

  function pushUndo(kind, label, data){
    if (bridge) return bridge.pushUndo(kind, label, data);
    if (typeof global.pushUndoSnapshot === "function") {
      try { global.pushUndoSnapshot(kind, label, data); } catch (err) {}
    }
  }

  function pgSA(){
    var pageActs = el("pageActs");
    if (pageActs) {
      pageActs.innerHTML = "";
      var hmBtn = document.createElement("button");
      hmBtn.className = "btn btn-grn";
      hmBtn.textContent = "+ Hammadde";
      hmBtn.onclick = function(){ openSAModal("hammadde"); };
      pageActs.appendChild(hmBtn);

      var hrBtn = document.createElement("button");
      hrBtn.className = "btn btn-acc";
      hrBtn.textContent = "+ Gider";
      hrBtn.onclick = function(){ openSAModal("harcama"); };
      pageActs.appendChild(hrBtn);
    }
    renderSATbl();
  }

  function renderSATbl(){
    var satinalma = getSatinalma();
    var harcamalar = getHarcamalar();
    var products = getAllProductsSafe();
    var hmTop = satinalma.reduce(function(sum, row){ return sum + (parseFloat(row.tutarBrut) || 0); }, 0);
    var hrTop = harcamalar.reduce(function(sum, row){ return sum + (parseFloat(row.tutar) || 0); }, 0);
    var stokVal = products.reduce(function(sum, row){ return sum + ((parseFloat(row.alis) || 0) * (parseFloat(row.stokAdet) || 0)); }, 0);

    var content = el("content");
    if (!content) return console.warn("SatinAlmaModule.renderSATbl: content missing.");
    content.innerHTML =
      "<div class='g4 mb12'>"
      + "<div class='stat'><div class='stat-lbl'>Hammadde Fatura Toplami</div><div class='stat-val red'>" + fmtMoney(hmTop) + "TL</div><div class='fz10 txt3'>Nakliye haric</div></div>"
      + "<div class='stat'><div class='stat-lbl'>Genel Giderler</div><div class='stat-val amb'>" + fmtMoney(hrTop) + "TL</div></div>"
      + "<div class='stat'><div class='stat-lbl'>Stok Degeri (Alis)</div><div class='stat-val blue'>" + fmtMoney(stokVal) + "TL</div></div>"
      + "</div><div class='ctabs' id='saTabs'></div><div class='toolbar flex' style='gap:7px;flex-wrap:wrap'><input class='srch' id='saFirmaQ' style='min-width:140px' placeholder='Firma ara...' value='" + (state.saFlt.firma || "") + "'><input class='srch' type='date' id='saT1' style='max-width:130px' value='" + (state.saFlt.tarih1 || "") + "'><input class='srch' type='date' id='saT2' style='max-width:130px' value='" + (state.saFlt.tarih2 || "") + "'></div><div id='saHmArea'></div><div id='saHrArea' style='display:none'></div>";

    var tabs = document.getElementById("saTabs");
    [["hm", "Hammaddeler"], ["hr", "Giderler"]].forEach(function(row){
      var node = document.createElement("div");
      node.className = "ct" + (state.curSATab === row[0] ? " active" : "");
      node.textContent = row[1];
      node.onclick = function(){
        state.curSATab = row[0];
        syncGlobals();
        Array.prototype.forEach.call(document.querySelectorAll("#saTabs .ct"), function(item){ item.classList.remove("active"); });
        node.classList.add("active");
        renderSARows();
      };
      if (tabs) tabs.appendChild(node);
    });

    var qInp = document.getElementById("saFirmaQ");
    if (qInp) qInp.oninput = function(){ state.saFlt.firma = this.value || ""; renderSARows(); };
    var t1 = document.getElementById("saT1");
    if (t1) t1.onchange = function(){ state.saFlt.tarih1 = this.value || ""; renderSARows(); };
    var t2 = document.getElementById("saT2");
    if (t2) t2.onchange = function(){ state.saFlt.tarih2 = this.value || ""; renderSARows(); };

    renderSARows();

  function saTab(tab, node){
    state.curSATab = tab;

  function renderSARows(){

    var satinalma = getSatinalma();
    var harcamalar = getHarcamalar();

    var t1 = state.saFlt.tarih1 || "";
    var t2 = state.saFlt.tarih2 || "";

      var hmRows = satinalma.filter(function(s){
        return (!firma || String(s.firma || "").toLowerCase().indexOf(firma) >= 0) && (!t1 || s.tarih >= t1) && (!t2 || s.tarih <= t2);
      });
      var html = hmRows.length ? "<div class='card'><div class='tbl-wrap'><table class='tbl'><thead><tr><th>FIRMA</th><th>FATURA NO</th><th class='r'>FATURA TUTARI</th><th>IRSALIYE TARIHI</th><th>IRSALIYE NO</th><th></th></tr></thead><tbody>"

    var hrRows = harcamalar.filter(function(h){
      return (!firma || String(h.aciklama || "").toLowerCase().indexOf(firma) >= 0) && (!t1 || h.tarih >= t1) && (!t2 || h.tarih <= t2);
    });
    var hrHtml = "<div class='card'><div class='tbl-wrap'><table class='tbl'><thead><tr><th>TARIH</th><th>KATEGORI</th><th>ACIKLAMA</th><th class='r'>TUTAR</th><th></th></tr></thead><tbody>"
      + hrRows.map(function(h){
        return "<tr><td>" + formatDateValue(h.tarih) + "</td><td><span class='badge amb'>" + (h.kategori || "") + "</span></td><td>" + (h.aciklama || "") + "</td><td class='mono r'>" + fmtMoney(h.tutar) + "TL</td><td class='flex gap4'><button class='btn btn-amb btn-xs hr-edit-btn' data-hid='" + h.id + "'>Duzenle</button><button class='btn btn-red btn-xs hr-del-btn' data-hid='" + h.id + "'>Sil</button></td></tr>";
      }).join("") + "</tbody></table></div></div>";
    if (el("saHrArea")) {
      el("saHrArea").innerHTML = hrHtml;
      el("saHrArea").style.display = "block";

      Array.prototype.forEach.call(el("saHrArea").querySelectorAll(".hr-del-btn"), function(btn){ btn.onclick = function(){ delHr(this.getAttribute("data-hid")); }; });
    }
    if (el("saHmArea")) el("saHmArea").style.display = "none";

  function toggleSADet(sid){
    var detail = document.getElementById("sadet_" + sid);
    var arrow = document.getElementById("sarrow_" + sid);
    if (!detail) return;
    var isOpen = detail.style.display !== "none";
    detail.style.display = isOpen ? "none" : "block";
    if (arrow) arrow.textContent = isOpen ? "Detay" : "Kapat";
  }

  function updateSAKargo(saId, sid){
    var satinalma = getSatinalma();
    var record = satinalma.find(function(x){ return x.id === saId; });
    if (!record) return;
    var input = document.getElementById("kargo_" + sid);
    if (!input) return;
    var newKargo = parseFloat(input.value) || 0;
    var data = getProducts();
    record.kargoMasraf = newKargo;
    var kdvsizTop = record.kdvDahil ? (parseFloat(record.tutarBrut) || 0) / 1.2 : (parseFloat(record.tutarBrut) || 0);
    var stat = document.getElementById("kargoStat_" + sid);
    if (stat) stat.textContent = fmtMoney(newKargo) + "TL";
    (record.urunler || []).forEach(function(urun){
      var alis = parseFloat(urun.birimAlis) || 0;
      var kargoPayi = kdvsizTop > 0 ? newKargo * alis / kdvsizTop : 0;
      var maliyet = alis + kargoPayi;
      urun.maliyet = maliyet;
      var key = String(urun.mann || "").replace(/[\s]/g, "_");
      var kpEl = document.getElementById("kpay_" + sid + "_" + key);
      var myEl = document.getElementById("maly_" + sid + "_" + key);
      if (kpEl) kpEl.textContent = fmtMoney(kargoPayi) + "TL";
      if (myEl) myEl.textContent = fmtMoney(maliyet) + "TL";
      if (urun.grupKey && urun.tur && data[urun.grupKey] && data[urun.grupKey].cats && data[urun.grupKey].cats[urun.tur]) {
        var prod = data[urun.grupKey].cats[urun.tur].find(function(p){ return p.mann === urun.mann; });
        if (prod) prod.maliyet = maliyet;
      }
    });
    saveState("satinalma", satinalma);
    saveState("products", data);
    saveProdsSafe();
    notify("Kargo guncellendi, maliyetler hesaplandi", "grn");
  }

  function openSAModal(tur, existingId){
    if (tur === "hammadde") {
      var satinalma = getSatinalma();
      var existing = existingId ? satinalma.find(function(x){ return x.id === existingId; }) : null;
      var isEdit = !!existing;
      var title = el("modalTitle");
      var body = el("modalBody");
      var foot = el("modalFoot");
      var box = el("modalBox");
      var ov = el("modalOv");
      if (!title || !body || !foot || !box || !ov) return;
      title.textContent = isEdit ? "Hammadde Faturasi Duzenle" : "Hammadde Alimi";
      body.innerHTML = "<div style='background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rs);padding:11px 13px;margin-bottom:12px'><div class='sec-t' style='margin-bottom:8px'>Fatura Bilgileri</div><div class='fr'><div class='fg'><label>Tarih</label><input type='date' id='sa_t' value='" + (existing ? existing.tarih : todayValue()) + "'></div><div class='fg'><label>Firma</label><input type='text' id='sa_f' placeholder='Firma Adi' value='" + (existing ? existing.firma : "") + "'></div></div><div class='fr'><div class='fg'><label>Fatura No</label><input type='text' id='sa_fn' value='" + (existing ? existing.faturaNo : "") + "'></div><div class='fg'><label>Fatura Tutari (TL)</label><input type='number' id='sa_v' step='0.01' value='" + (existing ? existing.tutarBrut : "") + "'></div></div><div class='fr'><div class='fg'><label>Irsaliye Tarihi</label><input type='date' id='sa_it' value='" + ((existing && existing.irsaliyeTarihi) ? existing.irsaliyeTarihi : (existing ? existing.tarih : todayValue())) + "'></div><div class='fg'><label>Irsaliye No</label><input type='text' id='sa_in' value='" + ((existing && existing.irsaliyeNo) ? existing.irsaliyeNo : "") + "'></div></div><div class='fr c1'><div class='fg'><label>KDV Durumu (Fatura)</label><select id='sa_kdv'><option value='true'" + ((!existing || existing.kdvDahil) ? " selected" : "") + ">KDV Dahil</option><option value='false'" + (existing && !existing.kdvDahil ? " selected" : "") + ">KDV Haric</option></select></div></div></div><div class='sec-t'>Urun Satirlari</div><div id='saUrunRows' style='margin-top:8px'></div><button class='btn btn-sec btn-sm mt8' id='saAddUrunBtn'>+ Urun Satiri Ekle</button>";
      foot.innerHTML = "";
      box.className = "modal wide";
      var cancelBtn = document.createElement("button");
      cancelBtn.className = "btn btn-sec";
      cancelBtn.textContent = "Iptal";
      cancelBtn.onclick = closeModalSafe;
      var saveBtn = document.createElement("button");
      saveBtn.className = "btn btn-grn";
      saveBtn.textContent = isEdit ? "Guncelle" : "Kaydet";
      saveBtn.onclick = isEdit ? function(){ saveSA(existingId); } : function(){ saveSA(null); };
      foot.appendChild(cancelBtn);
      foot.appendChild(saveBtn);
      ov.classList.add("open");
      state.saUrunC = 0;
      syncGlobals();
      setTimeout(function(){
        var addBtn = document.getElementById("saAddUrunBtn");
        if (addBtn) addBtn.onclick = addSAUrun;
        var totalInp = document.getElementById("sa_v");
        if (totalInp) totalInp.oninput = recalcAllSA;
        var kdvSel = document.getElementById("sa_kdv");
        if (kdvSel) kdvSel.onchange = recalcAllSA;
        if (isEdit && existing && existing.urunler && existing.urunler.length) {
          existing.urunler.forEach(function(urun){ addSAUrun(urun); });
          setTimeout(recalcAllSA, 150);
        } else {
          addSAUrun();
        }
      }, 30);
      return;
    }

    var title2 = el("modalTitle");
    var body2 = el("modalBody");
    var foot2 = el("modalFoot");
    var box2 = el("modalBox");
    var ov2 = el("modalOv");
    if (!title2 || !body2 || !foot2 || !box2 || !ov2) return;
    title2.textContent = "+ Gider Ekle";
    body2.innerHTML = "<div class='fr'><div class='fg'><label>Tarih</label><input type='date' id='hr_t' value='" + todayValue() + "'></div><div class='fg'><label>Kategori</label><select id='hr_k'><option>Kira</option><option>Yakit</option><option>Vergi</option><option>Kargo</option><option>Personel</option><option>Diger</option></select></div></div><div class='fr'><div class='fg'><label>Aciklama</label><input type='text' id='hr_ac'></div><div class='fg'><label>Tutar (TL)</label><input type='number' id='hr_v' step='0.01'></div></div>";
    foot2.innerHTML = "";
    box2.className = "modal";
    var cancelBtn2 = document.createElement("button");
    cancelBtn2.className = "btn btn-sec";
    cancelBtn2.textContent = "Iptal";
    cancelBtn2.onclick = closeModalSafe;
    var saveBtn2 = document.createElement("button");
    saveBtn2.className = "btn btn-acc";
    saveBtn2.textContent = "Kaydet";
    saveBtn2.onclick = saveHr;
    foot2.appendChild(cancelBtn2);
    foot2.appendChild(saveBtn2);
    ov2.classList.add("open");
  }

  function addSAUrun(existingUrun){
    state.saUrunC += 1;
    syncGlobals();
    var rc = state.saUrunC;
    var data = getProducts();
    var groupOptions = Object.keys(data).map(function(key){
      return "<option value='" + key + "'" + ((existingUrun && existingUrun.grupKey === key) ? " selected" : "") + ">" + ((data[key] && data[key].label) || key) + "</option>";
    }).join("");
    var eu = existingUrun || {};
    var row = document.createElement("div");
    row.id = "saur" + rc;
    row.style.cssText = "border:1px solid var(--bdr);border-radius:var(--rs);padding:10px;margin-bottom:8px;background:var(--sur)";
    row.innerHTML =
      "<div class='flex jb ic mb7'><span class='fw7 fz11'>Urun #" + rc + (eu.mann ? " - <span class='mono' style='color:var(--blue)'>" + eu.mann + "</span>" : "") + "</span><button class='btn btn-red btn-xs' id='saurdel" + rc + "'>x</button></div>"
      + "<div class='fr c4'><div class='fg'><label>MANN No</label><input type='text' id='sau_mn" + rc + "' placeholder='C 25115' value='" + (eu.mann || "") + "'></div><div class='fg'><label>OEM No</label><input type='text' id='sau_oem" + rc + "' value='" + (eu.oem || "") + "'></div><div class='fg'><label>Arac Grubu</label><select id='sau_gk" + rc + "'>" + groupOptions + "</select></div><div class='fg'><label>Filtre Turu</label><select id='sau_tur" + rc + "'>" + ["Hava", "Yag", "Polen", "Yakit"].map(function(tur){ return "<option" + (eu.tur === tur ? " selected" : "") + ">" + tur + "</option>"; }).join("") + "</select></div></div>"
      + "<div class='fr c4'><div class='fg'><label>Adet</label><input type='number' id='sau_adet" + rc + "' value='" + (eu.adet || 0) + "'></div><div class='fg'><label>Birim Alis (TL, KDV dahil)</label><input type='number' id='sau_ba" + rc + "' step='0.01' value='" + (eu.birimAlis || 0) + "'></div><div class='fg'><label>Satis Fiyati (TL)</label><input type='number' id='sau_sf" + rc + "' step='0.01' value='" + (eu.satisFiyat || 0) + "'></div><div class='fg'><label>Hesaplanan Maliyet</label><input type='number' id='sau_maliyet" + rc + "' step='0.01' readonly style='background:var(--sur2);font-weight:700' value='" + (eu.maliyet || 0) + "'></div></div>"
      + "<div class='fr'><div class='fg'><label>Uyumlu Araclar</label><input type='text' id='sau_cars" + rc + "' value='" + (eu.modeller || "") + "'></div><div class='fg'><label>Gorsel URL</label><input type='text' id='sau_img" + rc + "' value='" + (eu.img || "") + "'></div></div>";
    var container = document.getElementById("saUrunRows");
    if (container) container.appendChild(row);
    var deleteBtn = document.getElementById("saurdel" + rc);
    if (deleteBtn) deleteBtn.onclick = function(){ row.remove(); };
    var alisInp = document.getElementById("sau_ba" + rc);
    if (alisInp) alisInp.oninput = function(){ calcSAMaliyet(rc); };
    if (eu.birimAlis) setTimeout(function(){ calcSAMaliyet(rc); }, 80);
  }

  function calcSAMaliyet(rc){
    var alis = parseFloat(el("sau_ba" + rc) && el("sau_ba" + rc).value) || 0;
    if (el("sau_maliyet" + rc)) el("sau_maliyet" + rc).value = alis.toFixed(2);
  }

  function recalcAllSA(){
    for (var i = 1; i <= state.saUrunC; i++) {
      if (el("sau_ba" + i)) calcSAMaliyet(i);
    }
  }

  function saveSA(editId){
    var satinalma = getSatinalma();
    var tarih = el("sa_t") && el("sa_t").value;
    var firma = el("sa_f") && el("sa_f").value;
    var faturaNo = el("sa_fn") && el("sa_fn").value;
    var tutar = parseFloat(el("sa_v") && el("sa_v").value) || 0;
    var irsaliyeTarihi = (el("sa_it") && el("sa_it").value) || tarih;
    var irsaliyeNo = (el("sa_in") && el("sa_in").value) || "";
    var kdvDahil = (el("sa_kdv") && el("sa_kdv").value) === "true";
    var urunler = [];
    Array.prototype.forEach.call(document.querySelectorAll("#saUrunRows [id^='saur']"), function(row){
      var rc = row.id.replace("saur", "");
      var mann = String(el("sau_mn" + rc) && el("sau_mn" + rc).value || "").trim();
      var oem = String(el("sau_oem" + rc) && el("sau_oem" + rc).value || "").trim();
      var grupKey = el("sau_gk" + rc) && el("sau_gk" + rc).value;
      var tur = (el("sau_tur" + rc) && el("sau_tur" + rc).value) || "Hava";
      var adet = parseInt(el("sau_adet" + rc) && el("sau_adet" + rc).value, 10) || 0;
      var birimAlis = parseFloat(el("sau_ba" + rc) && el("sau_ba" + rc).value) || 0;
      var satisFiyat = parseFloat(el("sau_sf" + rc) && el("sau_sf" + rc).value) || 0;
      var modeller = el("sau_cars" + rc) && el("sau_cars" + rc).value;
      var img = el("sau_img" + rc) && el("sau_img" + rc).value;
      if (!mann || !adet) return;
      var maliyet = birimAlis;
      urunler.push({ mann: mann, oem: oem, adet: adet, birimAlis: birimAlis, birimKdvHaric: kdvDahil ? birimAlis / 1.2 : birimAlis, maliyet: maliyet, satisFiyat: satisFiyat, tur: tur, grupKey: grupKey, modeller: modeller, img: img });
      addOrUpdateProdSafe(grupKey, tur, { id: "prod-" + mann.replace(/[\s\/]/g, "-"), name: mann + (modeller ? " - " + String(modeller).substring(0, 40) : ""), mann: mann, oem: oem, price: satisFiyat, alis: kdvDahil ? birimAlis / 1.2 : birimAlis, maliyet: maliyet, stokAdet: adet, img: img, stock: adet > 0, tur: tur, modeller: modeller });
    });

    var record = { id: editId || makeId(), tarih: tarih, firma: firma, faturaNo: faturaNo, irsaliyeTarihi: irsaliyeTarihi, irsaliyeNo: irsaliyeNo, tur: "hammadde", aciklama: "HAMMADDE", tutarBrut: tutar, kdvDahil: kdvDahil, kargoMasraf: 0, kargoFaturaNo: "", urunler: urunler };
    if (editId) {
      var index = satinalma.findIndex(function(x){ return x.id === editId; });
      if (index >= 0) satinalma[index] = record;
      else satinalma.push(record);
    } else {
      satinalma.push(record);
    }
    saveState("satinalma", satinalma);
    ensureVendorStructuresSafe();
    saveProdsSafe();
    if (bridge) bridge.call("closeModal", [], function(){});
    else closeModalSafe();
    renderSATableSafe();
    notify(editId ? "Hammadde guncellendi, stok senkronize edildi!" : "Hammadde kaydedildi ve urunler stoka eklendi!", "grn");
  }

  function saveHr(){
    var harcamalar = getHarcamalar();
    harcamalar.push({ id: makeId(), tarih: el("hr_t") && el("hr_t").value, kategori: el("hr_k") && el("hr_k").value, aciklama: el("hr_ac") && el("hr_ac").value, tutar: parseFloat(el("hr_v") && el("hr_v").value) || 0 });
    saveState("harcamalar", harcamalar);
    state.curSATab = "hr";
    syncGlobals();
    if (bridge) bridge.call("closeModal", [], function(){});
    else closeModalSafe();
    renderSATableSafe();
    notify("Gider eklendi", "grn");
  }

  function delSA(id){
    if (!confirmAction("Silinsin mi?")) return;
    var satinalma = getSatinalma();
    pushUndo("satinalma", "Satin alma silme", { satinalma: clone(satinalma) });
    satinalma = satinalma.filter(function(s){ return s.id !== id; });
    saveState("satinalma", satinalma);
    ensureVendorStructuresSafe();
    renderSATableSafe();
    notify("Satin alma kaydi silindi Â· Geri alinabilir", "red");
  }

  function delHr(id){
    if (!confirmAction("Silinsin mi?")) return;
    var harcamalar = getHarcamalar();
    pushUndo("harcamalar", "Harcama silme", { harcamalar: clone(harcamalar) });
    harcamalar = harcamalar.filter(function(h){ return h.id !== id; });
    saveState("harcamalar", harcamalar);
    renderSATableSafe();
    notify("Harcama silindi Â· Geri alinabilir", "red");
  }

  function editSA(id){ openSAModal("hammadde", id); }

  function editHr(id){
    var harcamalar = getHarcamalar();
    var h = harcamalar.find(function(x){ return x.id === id; });
    if (!h) return;
    var title = el("modalTitle");
    var body = el("modalBody");
    var foot = el("modalFoot");
    var box = el("modalBox");
    var ov = el("modalOv");
    if (!title || !body || !foot || !box || !ov) return;
    title.textContent = "Gider Duzenle";
    body.innerHTML = "<div class='fr'><div class='fg'><label>Kategori</label><select id='ehr_k'><option" + (h.kategori === "Kira" ? " selected" : "") + ">Kira</option><option" + (h.kategori === "Yakit" ? " selected" : "") + ">Yakit</option><option" + (h.kategori === "Vergi" ? " selected" : "") + ">Vergi</option><option" + (h.kategori === "Kargo" ? " selected" : "") + ">Kargo</option><option" + (h.kategori === "Personel" ? " selected" : "") + ">Personel</option><option" + (h.kategori === "Diger" ? " selected" : "") + ">Diger</option></select></div><div class='fg'><label>Tutar</label><input type='number' id='ehr_v' value='" + (h.tutar || 0) + "' step='0.01'></div></div><div class='fr c1'><div class='fg'><label>Aciklama</label><input type='text' id='ehr_ac' value='" + (h.aciklama || "") + "'></div></div>";
    foot.innerHTML = "";
    box.className = "modal";
    var cancelBtn = document.createElement("button");
    cancelBtn.className = "btn btn-sec";
    cancelBtn.textContent = "Iptal";
    cancelBtn.onclick = closeModalSafe;
    var saveBtn = document.createElement("button");
    saveBtn.className = "btn btn-grn";
    saveBtn.textContent = "Guncelle";
    saveBtn.onclick = function(){ saveEditHr(id); };
    foot.appendChild(cancelBtn);
    foot.appendChild(saveBtn);
    ov.classList.add("open");
  }

  function saveEditHr(id){
    var harcamalar = getHarcamalar();
    var h = harcamalar.find(function(x){ return x.id === id; });
    if (!h) return;
    h.kategori = el("ehr_k") && el("ehr_k").value;
    h.aciklama = el("ehr_ac") && el("ehr_ac").value;
    h.tutar = parseFloat(el("ehr_v") && el("ehr_v").value) || 0;
    saveState("harcamalar", harcamalar);
    if (bridge) bridge.call("closeModal", [], function(){});
    else closeModalSafe();
    renderSATableSafe();
    notify("Guncellendi", "grn");
  }

  var api = {
    pgSA: pgSA,
    renderSATbl: renderSATbl,
    saTab: saTab,
    renderSARows: renderSARows,
    toggleSADet: toggleSADet,
    updateSAKargo: updateSAKargo,
    openSAModal: openSAModal,
    addSAUrun: addSAUrun,
    calcSAMaliyet: calcSAMaliyet,
    recalcAllSA: recalcAllSA,
    saveSA: saveSA,
    saveHr: saveHr,
    delSA: delSA,
    delHr: delHr,
    editSA: editSA,
    editHr: editHr,
    saveEditHr: saveEditHr
  };

  global.SatinAlmaModule = api;
  Object.keys(api).forEach(function(key){ global[key] = api[key]; });
})(window);

}
</script>
