<html lang="tr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ASTERA â€“ Yönetici Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
<style>
:root{--bg:#eeeae3;--sur:#fff;--sur2:#f4f1eb;--bdr:#e0dbd0;--bdr2:#ccc7bb;--txt:#333333;--txt2:#5f5f5f;--txt3:#8a8a8a;--acc:#2a2118;--grn:#1a5c35;--grn-bg:#e8f5ee;--red:#b82c1f;--red-bg:#fdf0ee;--amb:#8a5a0a;--amb-bg:#fdf4e3;--blue:#1a4882;--blue-bg:#edf2fc;--pur:#5b21b6;--pur-bg:#f3f0ff;--gold:#c8a84b;--r:10px;--rs:7px;--sb:210px}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--txt);font-size:16px;display:flex;flex-direction:column}
input,select,textarea,button{font-family:"Inter",sans-serif}
.hidden{display:none!important}
.login-wrap{position:fixed;inset:0;background:var(--acc);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px}
.login-box{background:var(--sur);border-radius:14px;padding:36px 32px;max-width:360px;width:100%;text-align:center}
.login-logo{width:56px;height:56px;background:var(--gold);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--acc);font-size:26px;font-weight:800;margin:0 auto 14px}
.login-title{font-size:28px;font-weight:800;margin-bottom:6px}
.login-sub{font-size:18px;font-weight:600;color:var(--txt2);margin-bottom:22px}
.login-inp{width:100%;border:1.5px solid var(--bdr);border-radius:var(--rs);padding:11px 14px;font-size:14px;outline:none;text-align:center;letter-spacing:3px;margin-bottom:10px;background:var(--sur2);color:var(--txt)}
.login-inp:focus{border-color:var(--acc)}
.login-btn{width:100%;background:var(--acc);color:#fff;border:none;padding:11px;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer}
.login-err{font-size:11px;color:var(--red);margin-top:7px;min-height:14px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sb);background:var(--acc);color:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:transform .25s;z-index:200}
@media(max-width:720px){.sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-110%)}.sidebar.open{transform:translateX(0)}}
.sb-logo{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo-img{height:32px;width:auto;display:none;border-radius:4px}
.sb-logo-fb{width:32px;height:32px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--acc);font-size:16px;font-weight:800;flex-shrink:0}
.sb-logo-txt{margin-top:7px;font-size:12px;font-weight:800;letter-spacing:.4px}
.sb-logo-sub{font-size:9px;opacity:.5;margin-top:1px}
.sb-nav{flex:1;padding:6px 0}
.sb-grp{padding:8px 12px 3px;font-size:9px;font-weight:700;opacity:.45;text-transform:uppercase;letter-spacing:.9px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;font-size:12px;font-weight:600;opacity:.72;transition:all .15s;border-left:3px solid transparent}
.sb-item:hover{opacity:1;background:rgba(255,255,255,.07)}
.sb-item.active{opacity:1;background:rgba(255,255,255,.13);border-left-color:var(--gold)}
.sb-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-bdg{background:var(--red);color:#fff;border-radius:99px;padding:1px 5px;font-size:9px;font-weight:700;margin-left:auto;display:none}
.sb-foot{padding:10px 14px;border-top:1px solid rgba(255,255,255,.1)}
.sb-logout{display:flex;align-items:center;gap:7px;font-size:11px;opacity:.55;cursor:pointer;padding:5px 0}
.sb-logout:hover{opacity:.9}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150}
.overlay.show{display:block}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.topbar-l{display:flex;align-items:center;gap:10px}
.menu-btn{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--txt);padding:2px 4px}
@media(max-width:720px){.menu-btn{display:block}}
.page-title{font-size:28px;font-weight:800;white-space:nowrap;color:var(--txt)}
.page-acts{display:flex;gap:6px;flex-wrap:wrap}
.content{flex:1;overflow-y:auto;padding:14px 16px}
@media(max-width:600px){.content{padding:10px}}
.notif{position:fixed;top:12px;right:12px;background:var(--acc);color:#fff;padding:9px 15px;border-radius:var(--rs);font-size:12px;font-weight:600;z-index:9999;opacity:0;transform:translateY(-8px);transition:all .3s;pointer-events:none;max-width:280px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.notif.show{opacity:1;transform:translateY(0)}
.notif.grn{background:var(--grn)}.notif.red{background:var(--red)}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-hdr{padding:11px 15px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-hdr-t{font-size:19px;font-weight:700;letter-spacing:0;color:var(--txt)}
.card-body{padding:13px 15px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
@media(max-width:800px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.g2,.g3,.g4{grid-template-columns:1fr}}
.stat{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:13px 15px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.stat-lbl{font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.stat-val{font-size:20px;font-weight:800;font-family:"Space Mono",monospace;line-height:1}
.stat-sub{font-size:10px;color:var(--txt3);margin-top:3px}
.stat-val.grn{color:var(--grn)}.stat-val.red{color:var(--red)}.stat-val.amb{color:var(--amb)}.stat-val.blue{color:var(--blue)}
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 10px;text-align:left;font-size:9px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--bdr);background:var(--sur2);white-space:nowrap;cursor:pointer;user-select:none}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--bdr);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(0,0,0,.015)}
.tbl .mono{font-family:"Space Mono",monospace;font-size:11px}
.tbl .r{text-align:right}.tbl .c{text-align:center}
.badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;white-space:nowrap;letter-spacing:.3px}
.badge.grn{background:var(--grn-bg);color:var(--grn)}.badge.red{background:var(--red-bg);color:var(--red)}.badge.amb{background:var(--amb-bg);color:var(--amb)}.badge.blue{background:var(--blue-bg);color:var(--blue)}.badge.pur{background:var(--pur-bg);color:var(--pur)}.badge.gray{background:var(--sur2);color:var(--txt2)}
.btn{padding:7px 13px;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-family:"Syne",sans-serif}
.btn-acc{background:var(--acc);color:#fff}.btn-acc:hover{opacity:.87}
.btn-grn{background:var(--grn);color:#fff}.btn-grn:hover{opacity:.87}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{opacity:.87}
.btn-amb{background:var(--amb);color:#fff}.btn-amb:hover{opacity:.87}
.btn-sec{background:var(--sur);color:var(--txt);border:1.5px solid var(--bdr2)!important}.btn-sec:hover{background:var(--sur2)}
.btn-wa{background:#25D366;color:#fff}
.btn-sm{padding:4px 9px;font-size:11px}.btn-xs{padding:2px 7px;font-size:10px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.fr.c1{grid-template-columns:1fr}.fr.c3{grid-template-columns:1fr 1fr 1fr}.fr.c4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:600px){.fr,.fr.c3,.fr.c4{grid-template-columns:1fr 1fr}}
@media(max-width:380px){.fr,.fr.c1,.fr.c3,.fr.c4{grid-template-columns:1fr}}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:18px;font-weight:600;color:var(--txt2);letter-spacing:0}
.fg input,.fg select,.fg textarea{border:1.5px solid var(--bdr);border-radius:var(--rs);padding:10px 12px;font-size:16px;color:var(--txt);background:var(--sur);outline:none;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc)}
.fg textarea{resize:vertical;min-height:56px}
.srch{border:1.5px solid var(--bdr);border-radius:var(--rs);padding:7px 10px;font-size:12px;outline:none;background:var(--sur);font-family:"Syne",sans-serif;color:var(--txt)}
.srch:focus{border-color:var(--acc)}
.toolbar{display:flex;gap:7px;margin-bottom:11px;flex-wrap:wrap;align-items:center}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:12px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-ov.open{opacity:1;pointer-events:auto}
.modal{background:var(--sur);border-radius:var(--r);width:100%;max-width:540px;max-height:93vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25);transform:translateY(8px);transition:transform .2s;overflow:hidden}
.modal-ov.open .modal{transform:translateY(0)}
.modal.wide{max-width:780px}
.modal-hdr{padding:13px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-hdr h3{font-size:14px;font-weight:800}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--txt2);line-height:1}
.modal-body{padding:15px 16px;overflow-y:auto;flex:1}
.modal-foot{padding:11px 16px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:7px;flex-shrink:0;flex-wrap:wrap}
.ctabs{display:flex;gap:3px;border-bottom:2px solid var(--bdr);margin-bottom:13px;overflow-x:auto}
.ct{padding:7px 13px;font-size:12px;font-weight:700;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;letter-spacing:.2px;white-space:nowrap;flex-shrink:0}
.ct:hover{color:var(--txt)}.ct.active{color:var(--acc);border-bottom-color:var(--acc)}
/* DOC STYLES */
.doc-wrap{background:#fff;border:2px solid var(--bdr);border-radius:var(--r);padding:26px;font-size:13px}
.doc-hdr-row{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--acc);padding-bottom:13px;margin-bottom:16px}
.doc-co{font-size:17px;font-weight:800;color:var(--acc)}
.doc-co small{display:block;font-size:10px;font-weight:400;color:var(--txt2)}
.doc-no-block{text-align:right;font-family:"Space Mono",monospace;font-size:11px;color:var(--txt2)}
.doc-no-block strong{display:block;font-size:13px;color:var(--txt);margin-bottom:2px}
.doc-tbl{width:100%;border-collapse:collapse;margin:11px 0}
.doc-tbl th{padding:6px 9px;background:var(--sur2);border:1px solid var(--bdr);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;text-align:left}
.doc-tbl td{padding:6px 9px;border:1px solid var(--bdr)}
.doc-tbl .r{text-align:right;font-family:"Space Mono",monospace}
.doc-totals{display:flex;flex-direction:column;align-items:flex-end;gap:3px;border-top:2px solid var(--bdr);padding-top:10px;margin-top:3px}
.doc-tr-row{display:flex;justify-content:space-between;gap:40px;font-size:12px}
.doc-tr-row.grand{font-weight:800;font-size:14px;padding-top:5px;border-top:1px solid var(--bdr);margin-top:3px}
.doc-footer{margin-top:17px;padding-top:11px;border-top:1px dashed var(--bdr);font-size:10px;color:var(--txt3);text-align:center}
.sign-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:22px}
@media(max-width:500px){.sign-grid{grid-template-columns:1fr}}
.sign-lbl{font-size:10px;font-weight:700;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.sign-area{border:2px dashed var(--bdr);border-radius:var(--rs);height:90px;position:relative;background:#fafafa;overflow:hidden;cursor:crosshair}
.sign-area canvas{position:absolute;inset:0;width:100%;height:100%}
.sign-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--txt3);pointer-events:none}
.kase-overlay{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0.25}
/* PRINT */
@media print{
  .login-wrap,.sidebar,.topbar,.no-print,.modal-ov,.overlay{display:none!important}
  .main{overflow:visible!important}
  .content{overflow:visible!important;padding:0!important}
  .print-show{display:block!important}
  body,html{overflow:visible!important;height:auto!important}
  .doc-wrap{border:none;padding:0;box-shadow:none}
  /* Panelin tamamı yazdırılmasın â€” sadece doc-wrap göster */
  .app,.sidebar,.topbar,.page-acts,.card:not(.print-target),.toolbar,.tbl-wrap:not(.print-target){display:none!important}
  .doc-wrap{display:block!important}
  #tslDocContent,#ftPreview{display:block!important}
}
.print-show{display:none}
/* utils */
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}
.flex{display:flex}.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.flex1{flex:1}.ic{align-items:center}.jb{justify-content:space-between}
.fw7{font-weight:700}.fw8{font-weight:800}.fz10{font-size:10px}.fz11{font-size:11px}.fz12{font-size:12px}
.txt2{color:var(--txt2)}.txt3{color:var(--txt3)}
.mono{font-family:"Space Mono",monospace}
.sep{border:none;border-top:1px solid var(--bdr);margin:13px 0}
.sec-t{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--bdr)}
.empty-st{text-align:center;padding:30px 14px;color:var(--txt3);font-size:12px}
.m-link{color:var(--blue);cursor:pointer;font-weight:700;border-bottom:1.5px dashed var(--blue-bg);transition:all .15s;white-space:nowrap}
.m-link:hover{color:var(--acc);border-bottom-color:var(--acc);background:var(--blue-bg);border-radius:3px;padding:0 2px}
</style>
</head>
<body>

<div id="loginWrap" style="position:fixed;inset:0;background:#2a2118;display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px">
  <div style="background:#fff;border-radius:14px;padding:36px 32px;max-width:360px;width:100%;text-align:center">
    <div style="width:56px;height:56px;background:#c8a84b;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#2a2118;font-size:26px;font-weight:800;margin:0 auto 14px">A</div>
    <div style="font-size:24px;font-weight:800;margin-bottom:6px">ASTERA</div>
    <div style="font-size:15px;font-weight:600;color:#666;margin-bottom:22px">Yönetici Paneli</div>
    <input id="loginPass" type="password" placeholder="Şifre" style="width:100%;border:1.5px solid #e0dbd0;border-radius:8px;padding:11px 14px;font-size:15px;outline:none;text-align:center;letter-spacing:3px;margin-bottom:10px;background:#f4f1eb;font-family:inherit">
    <button onclick="tryLogin()" style="width:100%;background:#2a2118;color:#fff;border:none;padding:12px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">Giriş Yap</button>
    <div id="loginErr" style="font-size:12px;color:#b82c1f;margin-top:8px;min-height:16px"></div>
  </div>
</div>
<div class="notif" id="notif"></div>
<div class="overlay" id="overlay" onclick="closeSB()"></div>
<!-- APP -->
<div class="app" id="appWrap" style="display:none">
  <div class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="flex ic gap8"><img id="sbLogoImg" class="sb-logo-img" alt=""><div id="sbLogoFb" class="sb-logo-fb">A</div><div><div class="sb-logo-txt">ASTERA</div><div class="sb-logo-sub">Yönetici</div></div></div>
    </div>
    <nav class="sb-nav">
      <div class="sb-grp">Genel</div>
      <div class="sb-item active" data-page="dashboard"><span class="sb-icon">📊</span>Dashboard</div>
      <div class="sb-grp">Satış</div>
      <div class="sb-item" data-page="siparisler"><span class="sb-icon">🛒</span>Siparişler <span class="sb-bdg" id="sipBdg">0</span></div>
      <div class="sb-item" data-page="bekleyenSip"><span class="sb-icon">⏳</span>Bekleyen Sip. <span class="sb-bdg" id="bekBdg" style="display:none">0</span></div>
      <div class="sb-item" data-page="performans"><span class="sb-icon">📈</span>Performans</div>
      <div class="sb-item" data-page="teslim"><span class="sb-icon">📋</span>Teslim Belgesi</div>
      <div class="sb-item" data-page="fatura"><span class="sb-icon">🧾</span>Fatura</div>
      <div class="sb-grp">Müşteri</div>
      <div class="sb-item" data-page="cari"><span class="sb-icon">👥</span>Cari Hesaplar</div>
      <div class="sb-grp">Stok &amp; Finans</div>
      <div class="sb-item" data-page="stok"><span class="sb-icon">📦</span>Stok Takip</div>
      <div class="sb-item" data-page="satinalma"><span class="sb-icon">🛍️</span>Satın Alma</div>
      <div class="sb-item" data-page="karlar"><span class="sb-icon">💰</span>Kâr / Zarar</div>
      <div class="sb-grp">Ayarlar</div>
      <div class="sb-item" data-page="urunler"><span class="sb-icon">âš™️</span>Ürün Yönetimi</div>
      <div class="sb-item" data-page="ayarlar"><span class="sb-icon">⚙️</span>Ayarlar</div>
    </nav>
    <div class="sb-foot"><div class="sb-logout" style="opacity:.4;cursor:default">ASTERA YÖNETİCİ</div></div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-l"><button class="menu-btn" id="menuBtn">☰</button><div class="page-title" id="pageTitle">Dashboard</div></div>
      <div class="page-acts" id="pageActs"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="modal-ov" id="modalOv">
  <div class="modal" id="modalBox">
    <div class="modal-hdr"><h3 id="modalTitle">Modal</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>

  return getCustomerPanelExportTemplate()
    .replace("__WA__",JSON.stringify(WA||""))
    .replace("__LOGO__",JSON.stringify(getPanelLogoData()))
    .replace("__DATA__",JSON.stringify(exportData))

function getCustomerPanelSourceData(){
  // DATA is always current (updated by initProds + user actions)
  // Use DATA directly to ensure the customer panel reflects the current admin state
  return DATA||{};
}
function buildCustomerPanelData(){
  var out={};
  var source=getCustomerPanelSourceData();
  Object.keys(source).forEach(function(groupKey){
    var group=source[groupKey];
    if(!group)return;
    out[groupKey]={label:group.label||groupKey,subtitle:group.subtitle||"",cats:{}};
    Object.keys(group.cats||{}).forEach(function(type){
      out[groupKey].cats[type]=(group.cats[type]||[]).filter(function(p){
        return !!p;
      }).map(function(p){
        return {
          id:p.id,
          name:p.name||"",
          oem:p.oem||"",
          mann:p.mann||"",
          price:parseFloat(p.price||0),
          img:p.img||"",
          modeller:p.modeller||"",
          stock:p.stock!==false,
          stokAdet:p.stokAdet==null?null:parseInt(p.stokAdet,10)||0
        };
      });
    });
  });
  return out;
}

  return {Hava:[],Yag:[],Polen:[],Yakit:[]};
}
function groupProductCount(key){
  if(!DATA[key]||!DATA[key].cats)return 0;
  return Object.keys(DATA[key].cats).reduce(function(sum,cat){
    return sum + ((DATA[key].cats[cat]||[]).length||0);
  },0);
}
function normalizeGroupLabel(v){
  return String(v||"").toLowerCase().replace(/[^a-z0-9]+/g,"");
}
function cleanupDuplicateEmptyGroups(){
  var seen={};
  Object.keys(DATA||{}).forEach(function(key){
    var grp=DATA[key]||{};
    var labelKey=normalizeGroupLabel(grp.label||key);
    var count=groupProductCount(key);
    if(!labelKey)return;
    if(!seen[labelKey]){
      seen[labelKey]={key:key,count:count};
      return;
    }
    if(count===0){
      delete DATA[key];
      return;
    }
    if(seen[labelKey].count===0){
      delete DATA[seen[labelKey].key];
      seen[labelKey]={key:key,count:count};
    }
  });
}
function ensureCoreGroups(){
  Object.keys(DEFAULT_GROUPS).forEach(function(key){
    if(!DATA[key]){
      DATA[key]={label:DEFAULT_GROUPS[key].label,subtitle:DEFAULT_GROUPS[key].subtitle,cats:makeEmptyCats()};
      return;
    }
    if(!DATA[key].label)DATA[key].label=DEFAULT_GROUPS[key].label;
    if(DATA[key].subtitle==null)DATA[key].subtitle=DEFAULT_GROUPS[key].subtitle;
    if(!DATA[key].cats)DATA[key].cats={};
    PRODUCT_TYPE_ORDER.forEach(function(type){
      if(!Array.isArray(DATA[key].cats[type]))DATA[key].cats[type]=[];
    });
  });
  cleanupDuplicateEmptyGroups();
}

<script>
var WA=__WA__;
var LOGO=__LOGO__;
var CUSTOMERS=__CUSTOMERS__;
var DATA=__DATA__;
var activeGroup="";
var activeType="";
var cart={};

function g(id){return document.getElementById(id);}
function money(n){return parseFloat(n||0).toLocaleString("tr-TR",{minimumFractionDigits:2,maximumFractionDigits:2})+" TL";}
function fmtDate(){return new Date().toLocaleDateString("tr-TR");}
function enc(v){return encodeURIComponent(v||"");}
function dec(v){return decodeURIComponent(v||"");}

function allProducts(){
  var out=[];
  Object.keys(DATA||{}).forEach(function(gk){
    var grp=DATA[gk]||{};
    Object.keys(grp.cats||{}).forEach(function(type){
      (grp.cats[type]||[]).forEach(function(p){
        var item=Object.assign({},p);
        item.groupKey=gk;
        item.groupLabel=grp.label||gk;
        item.type=type;
        out.push(item);
      });
    });
  });
  return out;
}

function findCustomerByPhone(phone){
  var clean=(phone||"").replace(/\D/g,"");
  return (CUSTOMERS||[]).find(function(c){
    return ((c.tel||"").replace(/\D/g,"")===clean)&&clean.length>5;
  });
}

function saveForm(){
  try{localStorage.setItem("astera_cf",JSON.stringify({ph:g("custPhone").value,nm:g("custName").value,fm:g("custFirm").value,inv:g("wantInvoice").checked,tn:g("custTaxNo").value,td:g("custTaxOffice").value}));}catch(e){}
}
function loadForm(){
  try{
    var d=JSON.parse(localStorage.getItem("astera_cf")||"{}");
    if(d.ph)g("custPhone").value=d.ph;
    if(d.nm)g("custName").value=d.nm;
    if(d.fm)g("custFirm").value=d.fm;
    if(d.inv)g("wantInvoice").checked=true;
    if(d.tn)g("custTaxNo").value=d.tn;
    if(d.td)g("custTaxOffice").value=d.td;
  }catch(e){}
  toggleInvoice();
}
function autofill(){
  var c=findCustomerByPhone(g("custPhone").value);
  if(!c)return;
  if(!g("custName").value)g("custName").value=c.ad||"";
  if(!g("custFirm").value)g("custFirm").value=c.firma||c.ad||"";
  if(c.vergiNo&&!g("custTaxNo").value)g("custTaxNo").value=c.vergiNo;
  if(c.vergiDairesi&&!g("custTaxOffice").value)g("custTaxOffice").value=c.vergiDairesi;
  saveForm();
}
function toggleInvoice(){
  var open=g("wantInvoice").checked;
  var wrap=g("invoiceFields");
  if(!wrap)return;
  wrap.className="invoice-grid"+(open?" open":"");
  wrap.style.display=open?"grid":"none";
  ["custTaxNo","custTaxOffice"].forEach(function(id){
    var inp=g(id);
    if(!inp)return;
    inp.disabled=!open;
    inp.required=open;
    if(!open)inp.value="";
  });
  renderCart();
}

function renderLogo(){
  var la=g("logoArea");
  if(!la)return;
  if(LOGO){la.innerHTML="<img src='"+LOGO+"' alt='Astera Ticaret'>";}
  else{la.innerHTML="<div class='logo-fb'>A</div>";}
}

function renderGroups(){
  var keys=Object.keys(DATA||{}).filter(function(k){
    return Object.keys((DATA[k]&&DATA[k].cats)||{}).some(function(t){return((DATA[k].cats||{})[t]||[]).length>0;});
  });
  if(!keys.length){keys=Object.keys(DATA||{});}
  if(!activeGroup&&keys.length){activeGroup=keys[0];}
  var tabsEl=g("groupTabs");
  if(!tabsEl)return;
  tabsEl.innerHTML=keys.map(function(k){
    return "<button class='tab"+(k===activeGroup?" active":"")+"' data-group='"+enc(k)+"'>"+(DATA[k]&&DATA[k].label||k)+"</button>";
  }).join("");
  tabsEl.querySelectorAll("[data-group]").forEach(function(btn){
    btn.onclick=function(){setGroup(dec(this.dataset.group));};
  });
}

function setGroup(key){
  activeGroup=key;
  var cats=Object.keys((DATA[key]&&DATA[key].cats)||{});
  activeType=cats.find(function(t){return((DATA[key].cats||{})[t]||[]).length>0;})||cats[0]||"";
  renderGroups();renderTypes();renderProducts();
}

function renderTypes(){
  var cats=Object.keys((DATA[activeGroup]&&DATA[activeGroup].cats)||{});
  if(!activeType&&cats.length){
    activeType=cats.find(function(t){return((DATA[activeGroup].cats||{})[t]||[]).length>0;})||cats[0];
  }
  var tabsEl=g("typeTabs");
  if(!tabsEl)return;
  tabsEl.innerHTML=cats.map(function(type){
    var count=(DATA[activeGroup]&&DATA[activeGroup].cats&&DATA[activeGroup].cats[type]||[]).length;
    var label=type==="Yag"?"Yağ":type==="Yakit"?"Yakıt":type;
    return "<button class='tab type-tab"+(type===activeType?" active":"")+"' data-type='"+enc(type)+"'>"+label+(count?" ("+count+")":"")+"</button>";
  }).join("");
  tabsEl.querySelectorAll("[data-type]").forEach(function(btn){
    btn.onclick=function(){setType(dec(this.dataset.type));};
  });
}

function setType(type){activeType=type;renderTypes();renderProducts();}

function filteredProducts(){
  var q=(g("search")&&g("search").value||"").toLowerCase().trim();
  var list=[];
  if(q){
    list=allProducts();
  }else{
    list=((DATA[activeGroup]&&DATA[activeGroup].cats&&DATA[activeGroup].cats[activeType])||[]).map(function(p){
      return Object.assign({},p,{groupKey:activeGroup,groupLabel:(DATA[activeGroup]&&DATA[activeGroup].label)||activeGroup,type:activeType});
    });
  }
  if(q){
    list=list.filter(function(p){
      return (p.name||"").toLowerCase().includes(q)||(p.mann||"").toLowerCase().includes(q)||(p.oem||"").toLowerCase().includes(q)||(p.groupLabel||"").toLowerCase().includes(q)||(p.modeller||"").toLowerCase().includes(q);
    });
  }
  return list;
}

function setQty(id,qty){
  qty=Math.max(0,parseInt(qty,10)||0);
  var p=allProducts().find(function(x){return x.id===id;});
  if(!p)return;
  if(qty===0)delete cart[id];
  else cart[id]={product:p,qty:qty};
  renderProducts();renderCart();
}

function sendTermin(id){
  var p=allProducts().find(function(x){return x.id===id;});
  if(!p||!WA)return;
  var msg="Merhaba, "+((p.mann||"bu ürün")+" ürününün termin tarihini öğrenebilir miyim?\nÜrün: "+(p.name||""));
  window.open("https://wa.me/"+WA+"?text="+encodeURIComponent(msg),"_blank");
}

function renderProducts(){
  var products=filteredProducts();
  var el=g("products");
  if(!el)return;
  if(!products.length){
    el.innerHTML="<div class='empty-msg'><span>🔍</span>Ürün bulunamadı.<br><small>Farklı bir arama terimi deneyin.</small></div>";
    return;
  }
  el.innerHTML=products.map(function(p){
    var qty=cart[p.id]?cart[p.id].qty:0;
    var inStock=p.stock!==false&&(p.stokAdet==null||p.stokAdet>0);
    var imgHtml=p.img
      ?"<div class='prod-img-wrap'><img src='"+p.img+"' alt='' loading='lazy' onerror=\"this.style.display='none'\"></div>"
      :"<div class='prod-img-wrap'><span class='prod-img-placeholder'>🔧</span></div>";
    var stockHtml=inStock
      ?"<div class='stock-ok'>✅ Stokta var</div>"
      :"<div class='stock-out'>❌ Stokta yok</div><button class='btn btn-termin' data-termin='"+enc(p.id)+"'>Termin tarihini sor</button>";
    var priceHtml=p.price>0
      ?"<div class='prod-price'>"+money(p.price)+"<small>KDV Hariç</small></div>"
      :"<div class='prod-price' style='font-size:14px;color:var(--muted)'>Fiyat için arayın</div>";
    return "<div class='product"+(inStock?"":" out")+"'>"
      +imgHtml
      +"<div class='prod-name'>"+(p.name||"")+"</div>"
      +"<div class='prod-meta'>"
      +"<div><strong>MANN:</strong> "+(p.mann||"–")+"</div>"
      +"<div><strong>OEM:</strong> "+(p.oem||"–")+"</div>"
      +(p.modeller?"<div><strong>Araç:</strong> "+(p.modeller).substring(0,50)+"</div>":"")
      +"</div>"
      +stockHtml
      +priceHtml
      +"<div class='qty-row'>"
      +"<input class='qty-input' type='number' min='0' value='"+qty+"' data-qty='"+enc(p.id)+"'>"
      +(p.price>0?"<button class='btn btn-brand' style='flex:1' data-add='"+enc(p.id)+"'>+ Sepete Ekle</button>":"")
      +"</div>"
      +"</div>";
  }).join("");
  el.querySelectorAll("[data-qty]").forEach(function(inp){inp.onchange=function(){setQty(dec(this.dataset.qty),this.value);};});
  el.querySelectorAll("[data-add]").forEach(function(btn){
    btn.onclick=function(){var id=dec(this.dataset.add);setQty(id,(cart[id]?cart[id].qty:0)+1);};
  });
  el.querySelectorAll("[data-termin]").forEach(function(btn){btn.onclick=function(){sendTermin(dec(this.dataset.termin));};});
}

function renderCart(){
  var ids=Object.keys(cart),inv=g("wantInvoice").checked;
  g("cartCount").textContent=ids.length+" ürün";
  if(!ids.length){
    g("cartList").innerHTML="<div class='cart-empty'>Sepetiniz boş.<br>Sol taraftan ürün ekleyin.</div>";
    g("subRow").style.display="none";
    g("vatRow").style.display="none";
    g("cartTotal").textContent="0,00 TL";
    return;
  }
  var subtotal=0;
  g("cartList").innerHTML=ids.map(function(id){
    var item=cart[id],line=(item.product.price||0)*item.qty;
    subtotal+=line;
    return "<div class='cart-item'>"
      +"<div class='cart-item-name'>"+(item.product.mann||"")+"</div>"
      +"<div class='cart-item-sub'>"+(item.product.name||"").substring(0,40)+"</div>"
      +"<div class='cart-item-sub'>"+item.qty+" adet × "+money(item.product.price||0)+"</div>"
      +"<div class='cart-item-row'>"
      +"<span class='cart-item-price'>"+money(line)+"</span>"
      +"<button class='btn-remove' data-remove='"+enc(id)+"' title='Kaldır'>×</button>"
      +"</div></div>";
  }).join("");
  var vat=inv?subtotal*0.2:0;
  g("subRow").style.display="flex";
  g("cartSubtotal").textContent=money(subtotal);
  g("vatRow").style.display=inv?"flex":"none";
  g("cartVat").textContent=money(vat);
  g("cartTotal").textContent=money(subtotal+vat);
  g("cartList").querySelectorAll("[data-remove]").forEach(function(btn){
    btn.onclick=function(){setQty(dec(this.dataset.remove),0);};
  });
}

function buildMessage(){
  var ids=Object.keys(cart),inv=g("wantInvoice").checked;
  var msg="ASTERA YENİ SİPARİŞ\n";
  msg+="Tarih: "+fmtDate()+"\n";
  msg+="Müşteri: "+(g("custName").value||g("custFirm").value||"Belirtilmedi")+"\n";
  if(g("custPhone").value)msg+="Telefon: +90 "+g("custPhone").value+"\n";
  if(g("custFirm").value)msg+="Firma: "+g("custFirm").value+"\n";
  if(inv){
    msg+="Fatura: Evet\n";
    if(g("custTaxNo").value)msg+="Vergi No: "+g("custTaxNo").value+"\n";
    if(g("custTaxOffice").value)msg+="Vergi Dairesi: "+g("custTaxOffice").value+"\n";
  }
  msg+="─────────────────\n";
  var subtotal=0;
  ids.forEach(function(id){
    var item=cart[id],line=(item.product.price||0)*item.qty;
    subtotal+=line;
    var inStock=item.product.stock!==false&&(item.product.stokAdet==null||item.product.stokAdet>0);
    msg+=item.product.mann+" × "+item.qty+" = "+money(line)+(inStock?"":" ⚠ Termin?")+"\n";
  });
  var vat=inv?subtotal*0.2:0;
  msg+="─────────────────\n";
  msg+="Ara Toplam: "+money(subtotal)+"\n";
  if(inv)msg+="KDV %20: "+money(vat)+"\n";
  msg+="GENEL TOPLAM: "+money(subtotal+vat);
  return msg;
}

function sendOrder(){
  if(!Object.keys(cart).length){alert("Önce ürün ekleyin.");return;}
  if(!g("custName").value&&!g("custFirm").value&&!g("custPhone").value){
    if(!confirm("Müşteri bilgisi girilmedi. Yine de göndermek istiyor musunuz?"))return;
  }
  window.open("https://wa.me/"+WA+"?text="+encodeURIComponent(buildMessage()),"_blank");
}

window.onload=function(){
  renderLogo();
  loadForm();
  renderGroups();renderTypes();renderProducts();renderCart();
  g("search").oninput=renderProducts;
  g("custPhone").oninput=function(){autofill();saveForm();};
  g("custName").oninput=saveForm;
  g("custFirm").oninput=saveForm;
  g("custTaxNo").oninput=saveForm;
  g("custTaxOffice").oninput=saveForm;
  g("wantInvoice").onchange=function(){toggleInvoice();saveForm();};
  g("sendBtn").onclick=sendOrder;
};
<\/script>

function buildAdminPanelHtml(){
  var source=ADMIN_PANEL_SOURCE||document.documentElement.outerHTML;
  var marker='window.__ASTERA_BOOTSTRAP__={"__placeholder__":true};';
  var payload='window.__ASTERA_BOOTSTRAP__='+JSON.stringify(currentAdminSnapshot())+';';
  return source.indexOf(marker)>=0?source.replace(marker,payload):source;
}
function downloadAdminPanel(isAuto){
  var html=buildAdminPanelHtml();
  var filename="yonetici-paneli-"+stampNow()+".html";
  APP_SETTINGS.lastBackupAt=new Date().toISOString();
  try{localStorage.setItem(K.settings,JSON.stringify(APP_SETTINGS));}catch(e){}
  downloadTextFile(filename,html,"text/html;charset=utf-8");
  notif(isAuto?"Yonetici panelinin tarihli yedegi indirildi. Telefona bunu gonderin.":"Yonetici panelinin tarihli yedegi indirildi. Kaldiginiz yerden bu dosya ile devam edebilirsiniz.","grn");

function queueCloudSync(){
  if(!APP_SETTINGS.autoCloudSync||!cloudReady())return;
  clearTimeout(cloudSyncTimer);
  cloudSyncTimer=setTimeout(function(){cloudPushNow();},900);
}
function queueDataPersistence(){
  if(isAutoPanelDownloadEnabled()){
    clearTimeout(autoPanelDownloadTimer);
    autoPanelDownloadTimer=setTimeout(function(){downloadAdminPanel(true);},250);
  }
  // Her zaman buluta gönder (autoCloudSync bağımsız)
  if(cloudReady()){
    clearTimeout(cloudSyncTimer);
    cloudSyncTimer=setTimeout(function(){cloudPushNow();},1200);
  }
}
function queueAutoCustomerPanelDownload(){
  if(!isAutoPanelDownloadEnabled())return;
  clearTimeout(autoPanelDownloadTimer);
  autoPanelDownloadTimer=setTimeout(function(){downloadAdminPanel(true);},250);
}
function downloadCustomerPanel(isAuto){
  var exportData=buildCustomerPanelData();
  var hasProducts=Object.keys(exportData).some(function(groupKey){
    return Object.keys(exportData[groupKey].cats||{}).some(function(type){
      return (exportData[groupKey].cats[type]||[]).length>0;
    });
  });
  if(!hasProducts){notif("İndirilecek ürün verisi bulunamadı","red");return;}
  var html=buildCustomerPanelHtml();
  var blob=new Blob([html],{type:"text/html;charset=utf-8"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="musteri-paneli-guncel.html";
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},1500);
  if(isAuto){return;}
  notif("Güncel müşteri paneli indirildi. Bu dosyayı müşteriye gönderebilirsiniz.","grn");
}

function applyRemoteSnapshot(payload){

  if(payload.satis!=null)localStorage.setItem(K.satis,JSON.stringify(payload.satis));
  if(payload.cari!=null)localStorage.setItem(K.cari,JSON.stringify(payload.cari));
  if(payload.musteriler!=null)localStorage.setItem(K.musteriler,JSON.stringify(payload.musteriler));
  if(payload.orders!=null)localStorage.setItem(K.orders,JSON.stringify(payload.orders));

function cloudReady(){return !!(APP_SETTINGS.supabaseUrl&&APP_SETTINGS.supabaseAnonKey&&APP_SETTINGS.supabaseTable&&APP_SETTINGS.supabaseRowId);}
function cloudBaseUrl(){return String(APP_SETTINGS.supabaseUrl||"").replace(/\/+$/,"");}
function cloudRestRowUrl(){return cloudBaseUrl()+"/rest/v1/"+encodeURIComponent(APP_SETTINGS.supabaseTable)+"?id=eq."+encodeURIComponent(APP_SETTINGS.supabaseRowId);}
function cloudHeaders(){
  return {
    "Content-Type":"application/json",
    "apikey":APP_SETTINGS.supabaseAnonKey||"",
    "Authorization":"Bearer "+(APP_SETTINGS.supabaseAnonKey||"")
  };
}
async function cloudPushNow(){
  if(!cloudReady()){return;}
  try{
    var payload={id:APP_SETTINGS.supabaseRowId,payload:currentAdminSnapshot(),updated_at:new Date().toISOString()};
    var headers=cloudHeaders();
    headers["Prefer"]="resolution=merge-duplicates,return=representation";
    var res=await fetch(cloudBaseUrl()+"/rest/v1/"+encodeURIComponent(APP_SETTINGS.supabaseTable),{method:"POST",headers:headers,body:JSON.stringify(payload)});
    if(!res.ok)throw new Error("HTTP "+res.status);
    var publicPayload={id:APP_SETTINGS.publicCatalogRowId,payload:currentPublicCatalogSnapshot(),updated_at:new Date().toISOString()};
    var publicRes=await fetch(cloudBaseUrl()+"/rest/v1/"+encodeURIComponent(APP_SETTINGS.publicCatalogTable),{method:"POST",headers:headers,body:JSON.stringify(publicPayload)});
    if(!publicRes.ok)throw new Error("HTTP "+publicRes.status);
    APP_SETTINGS.lastCloudSyncAt=new Date().toISOString();
    try{localStorage.setItem(K.settings,JSON.stringify(APP_SETTINGS));}catch(e){}
    if(g("cloudLastSync"))g("cloudLastSync").textContent=(APP_SETTINGS.lastCloudSyncAt||"").replace("T"," ").slice(0,19);
    notif("Buluta gonderildi","grn");
  }catch(e){
    var msg=(e&&e.message)||String(e)||"Bilinmeyen hata";
    notif("Bulut senkronu basarisiz: "+msg,"red");
  }
}
async function cloudPullNow(){
  if(!cloudReady()){notif("Supabase ayarlari gerekli","red");return;}
  try{
    var res=await fetch(cloudRestRowUrl()+"&select=payload,updated_at",{method:"GET",headers:cloudHeaders()});
    if(!res.ok)throw new Error("HTTP "+res.status);
    var raw=await res.json();
    if(!raw||!raw.length||!raw[0].payload){throw new Error("Bulutta kayit bulunamadi");}
    applyRemoteSnapshot(raw[0].payload);
    notif("Buluttaki son veriler yuklendi","grn");
  }catch(e){
    var msg=(e&&e.message)||String(e)||"Bilinmeyen hata";
    notif("Buluttan veri alinamadi: "+msg,"red");
  }
}

function peekNextTeslimNo(arr){
  var maxNo=0;
  (arr||[]).forEach(function(t){
    if(t.belgeNo){var n=parseInt((t.belgeNo+"").replace(/[^0-9]/g,""),10)||0;if(n>maxNo)maxNo=n;}
  });
  return "TB-"+String(maxNo+1).padStart(4,"0");
}
function syncTeslimlerFromSatis(){
  var satis=SATIS||[];
  var groups={};
  satis.forEach(function(s){
    var key=(s.musteri||"")+"\0"+(s.tarih||"");
    if(!groups[key])groups[key]=[];
    groups[key].push(s);
  });
  var teslimler=(TESLIMLER||[]).slice();
  var changed=false;
  if(!satis.length){
    var onlyManual=(teslimler||[]).filter(function(t){return !t.otomatikFiş;});
    if(onlyManual.length!==teslimler.length){
      TESLIMLER=onlyManual;
      lsSave(K.teslimler,TESLIMLER);
    }
    return;
  }
  Object.keys(groups).forEach(function(key){
    var lines=groups[key];
    if(!lines.length)return;
    var musteri=lines[0].musteri,tarih=lines[0].tarih;
    var items=lines.map(function(s){
      return {id:s.id,mann:s.mann,adet:s.adet,fiyat:s.fiyat,toplam:s.toplam,tarih:s.tarih,musteri:s.musteri,maliyet:s.maliyet,kar:s.kar,kdvOrani:s.kdvOrani};
    });
    var toplam=items.reduce(function(a,s){return a+(parseFloat(s.toplam)||0);},0);
    var matching=teslimler.filter(function(t){return t.musteri===musteri&&t.tarih===tarih;});
    if(matching.length===0){
      teslimler.push({
        id:uid(),
        belgeNo:peekNextTeslimNo(teslimler),
        tarih:tarih,
        musteri:musteri,
        items:items,
        toplam:toplam,
        signature:"",
        signedAt:"",
        kaseFoto:"",
        docHtml:"",
        tarananBelge:"",
        otomatikFiş:true
      });
      changed=true;
    }else if(matching.length===1){
      var t=matching[0];
      if(t.otomatikFiş===true){
        t.items=items;
        t.toplam=toplam;
        changed=true;
      }
      if(!t.belgeNo){
        t.belgeNo=peekNextTeslimNo(teslimler.filter(function(x){return x.id!==t.id;}));
        changed=true;
      }
    }else{
      matching.sort(function(a,b){
        var am=a.otomatikFiş?1:0,bm=b.otomatikFiş?1:0;
        if(am!==bm)return am-bm;
        return (a.id||"").localeCompare(b.id||"");
      });
      var primary=matching[0];
      for(var mi=1;mi<matching.length;mi++){
        var o=matching[mi];
        if(!primary.tarananBelge&&o.tarananBelge)primary.tarananBelge=o.tarananBelge;
        if(!primary.signature&&o.signature)primary.signature=o.signature;
        if(!primary.docHtml&&o.docHtml)primary.docHtml=o.docHtml;
        if(!primary.kaseFoto&&o.kaseFoto)primary.kaseFoto=o.kaseFoto;
      }
      primary.items=items;
      primary.toplam=toplam;
      if(primary.otomatikFiş&&matching.some(function(x){return !x.otomatikFiş;}))primary.otomatikFiş=false;
      var removeIds={};
      for(var mj=1;mj<matching.length;mj++)removeIds[matching[mj].id]=true;
      if(!primary.belgeNo)primary.belgeNo=peekNextTeslimNo(teslimler.filter(function(x){return !removeIds[x.id];}));
      teslimler=teslimler.filter(function(t){return !removeIds[t.id];});
      changed=true;
    }
  });
  var groupKeys={};
  Object.keys(groups).forEach(function(key){groupKeys[key]=true;});
  var filteredTeslimler=teslimler.filter(function(t){
    if(!t.otomatikFiş)return true;
    var key=(t.musteri||"")+"\0"+(t.tarih||"");
    return !!groupKeys[key];
  });
  if(filteredTeslimler.length!==teslimler.length){
    teslimler=filteredTeslimler;
    changed=true;
  }
  if(changed){
    TESLIMLER=teslimler;
    lsSave(K.teslimler,TESLIMLER);
  }
}

function getAllP(){var ps=[];Object.keys(DATA).forEach(function(gk){Object.keys(DATA[gk].cats).forEach(function(cat){DATA[gk].cats[cat].forEach(function(p){var x=Object.assign({},p);x.grupKey=gk;x.grupLabel=DATA[gk].label;x.cat=cat;ps.push(x);});});});return ps;}
function findById(id){return getAllP().find(function(p){return p.id===id;})||null;}
function findByMann(m){return getAllP().find(function(p){return p.mann===m;})||null;}
function getProductRefById(id){
  var ref=null;
  Object.keys(DATA||{}).forEach(function(gk){
    Object.keys((DATA[gk]&&DATA[gk].cats)||{}).forEach(function(cat){
      (DATA[gk].cats[cat]||[]).forEach(function(p){
        if(p.id===id&&!ref)ref={product:p,grupKey:gk,cat:cat};
      });
    });
  });
  return ref;
}

function syncStockDown(mann,qty){Object.keys(DATA).forEach(function(gk){Object.keys(DATA[gk].cats).forEach(function(cat){DATA[gk].cats[cat].forEach(function(p){if(p.mann===mann)p.stokAdet=Math.max(0,(p.stokAdet||0)-qty);});});});}
function addOrUpdateProd(gk,cat,pData){
  if(!DATA[gk])DATA[gk]={label:gk,subtitle:"",cats:{Hava:[],Yag:[],Polen:[],Yakit:[]}};
  if(!DATA[gk].cats[cat])DATA[gk].cats[cat]=[];
  // Önce aynı MANN kodu var mı kontrol et (tüm gruplarda)
  var mannNorm=(pData.mann||"").replace(/[\s\-]/g,"").toLowerCase();
  var oemNorm=(pData.oem||"").replace(/[\s\-]/g,"").toLowerCase();
  var existingInGroup=DATA[gk].cats[cat].find(function(p){return p.mann===pData.mann;});
  if(existingInGroup){
    // Aynı grup+cat içinde varsa güncelle
    Object.assign(existingInGroup,pData);
    saveProds();
    return;
  }
  // Diğer gruplarda aynı OEM veya MANN var mı?
  var globalDup=getAllP().find(function(p){
    var pm=(p.mann||"").replace(/[\s\-]/g,"").toLowerCase();
    var po=(p.oem||"").replace(/[\s\-]/g,"").toLowerCase();
    return pm===mannNorm||(oemNorm&&oemNorm!=="-"&&po===oemNorm);
  });
  if(globalDup){
    notif("⚠ï¸ Zaten mevcut ("+globalDup.mann+")","red");
    return;
  }
  DATA[gk].cats[cat].push(pData);
  saveProds();
}
function getMSatis(m){return SATIS.filter(function(s){return s.musteri===m;}).reduce(function(a,s){return a+s.toplam;},0);}
function getMTeslimToplam(m){

}
function sumCariByType(m,tip){
  return (CARI||[]).filter(function(c){return c.musteri===m&&c.tip===tip;}).reduce(function(a,c){return a+(parseFloat(c.tutar)||0);},0);
}
function getMOdeme(m){return sumCariByType(m,"TAHSİLAT");}
function getMIade(m){return sumCariByType(m,"İADE");}
function getCariSummary(m){
  var teslimat=getMTeslimToplam(m);
  var iade=getMIade(m);
  var tahsilat=getMOdeme(m);
  return {
    teslimat:teslimat,
    iade:iade,
    tahsilat:tahsilat,
    bakiye:teslimat-iade-tahsilat
  };
}
function getMBakiye(m){return getCariSummary(m).bakiye;}
function getCariMovements(m){
  return (CARI||[]).filter(function(c){return c.musteri===m;})
    .map(function(c){
      var tip=c.tip||"";
      var cls=tip==="TAHSİLAT"?"grn":tip==="İADE"?"red":"amb";
      return {
        id:c.id,
        tarih:c.tarih,
        tip:tip,
        tutar:parseFloat(c.tutar)||0,
        ac:c.aciklama||"",
        cls:cls
      };
    })
    .sort(function(a,b){return (b.tarih||"").localeCompare(a.tarih||"");});
}

function _readOrderQtys(idx,items){
  return (items||[]).map(function(it,ii){
    var el=document.getElementById("ord_qty_"+idx+"_"+ii);
    var teslimQty=el?Math.max(0,parseInt(el.value)||0):it.qty||0;
    return {mann:it.mann,name:it.name,oem:it.oem,fiyat:it.fiyat,orderedQty:it.qty||0,deliveredQty:teslimQty,toplam:it.fiyat*(teslimQty)};
  });
}

function importOrderToCari(idx,musteriObj){
  var orders=ls(K.orders,[]);
  var o=orders[idx];
  var musteriAd=musteriObj.ad;
  var items=_readOrderQtys(idx,o.items);
  var delivered=items.filter(function(x){return x.deliveredQty>0;});
  var notDelivered=items.filter(function(x){return x.deliveredQty<x.orderedQty;});

  if(!delivered.length){notif("Teslim edilecek ürün miktarı giriniz","red");return;}

  // Satışlara ekle (sadece teslim edilenler)
  delivered.forEach(function(it){
    var p=findByMann(it.mann);
    var toplam=it.fiyat*it.deliveredQty;
    SATIS.push({id:uid(),tarih:o.tarih,musteri:musteriAd,mann:it.mann,adet:it.deliveredQty,fiyat:it.fiyat||0,maliyet:p?p.alis||0:0,toplam:toplam,kar:toplam-(p?(p.alis||0)*it.deliveredQty:0),kdvOrani:0});
  });
  lsSave(K.satis,SATIS);

  // Eksik/bekleyen kalan kısımları kaydet
  if(notDelivered.length){
    notDelivered.forEach(function(it){
      var bekQty=it.orderedQty-it.deliveredQty;
      if(bekQty>0){
        BEKLEYEN_SIP.push({id:uid(),tarih:o.tarih,musteri:musteriAd,mann:it.mann,name:it.name,fiyat:it.fiyat,bekleyenAdet:bekQty,kaynakSiparisId:o.id||"",orijinalAdet:it.orderedQty});
      }
    });
    lsSave(K.bekleyenSiparisler,BEKLEYEN_SIP);
    // Müşteri cari hesabına "bekleyen sipariş" notu
    CARI.push({id:uid(),tarih:o.tarih,musteri:musteriAd,tip:"BEKLEYENSİPARİŞ",tutar:0,aciklama:"Bekleyen: "+notDelivered.map(function(x){return x.mann+" ("+( x.orderedQty-x.deliveredQty)+" adet)";}).join(", ")});
    lsSave(K.cari,CARI);
  }

  orders.splice(idx,1);
  lsSave(K.orders,orders);
  closeModal();
  syncTeslimlerFromSatis();
  checkOrders();
  var msg="âœ… "+delivered.length+" ürün cari hesaba aktarıldı.";
  if(notDelivered.length)msg+=" ⚠ "+notDelivered.length+" ürün bekleyende.";
  notif(msg,"grn");
  if(curPage==="siparisler"||curPage==="cari")renderPage(curPage);
}

function saveTeslimEdit(id){
  var t=(TESLIMLER||[]).find(function(x){return x.id===id;});
  if(!t){notif("Fiş bulunamadı","red");return;}
  var tbl=document.getElementById("tslEditTbl");
  if(!tbl){notif("Tablo bulunamadı","red");return;}
  var tot=0;
  var nextItems=[];
  t.items.forEach(function(s,i){
    var aEl=tbl.querySelector(".tsl-edit-adet[data-i='"+i+"']");
    var fEl=tbl.querySelector(".tsl-edit-fiyat[data-i='"+i+"']");
    if(aEl)s.adet=Math.max(0,parseFloat(aEl.value)||0);
    if(fEl)s.fiyat=Math.max(0,parseFloat(fEl.value)||0);
    s.toplam=s.adet*s.fiyat;
    var sale=(SATIS||[]).find(function(x){return x.id===s.id;});
    if(sale){
      sale.adet=s.adet;
      sale.fiyat=s.fiyat;
      sale.toplam=s.toplam;
      sale.kar=s.toplam-((parseFloat(sale.maliyet)||0)*s.adet);
    }
    if(s.adet>0){
      nextItems.push(s);
      tot+=s.toplam;
    }else{
      SATIS=(SATIS||[]).filter(function(x){return x.id!==s.id;});
    }
  });
  t.items=nextItems;
  t.toplam=tot;
  lsSave(K.satis,SATIS);
  syncTeslimlerFromSatis();
  closeModal();
  if(selMusteri)renderCariD(selMusteri);
  renderML();
  notif("Teslimat fişi güncellendi","grn");
}

function initSign(){var area=g("signArea");var canvas=g("signCanvas");if(!area||!canvas)return;signCanvas=canvas;signCtx=canvas.getContext("2d");canvas.width=area.offsetWidth;canvas.height=area.offsetHeight||90;signCtx.strokeStyle="#1a1917";signCtx.lineWidth=2.5;signCtx.lineCap="round";
  function pos(e){var r=canvas.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
  canvas.onmousedown=function(e){signDrawing=true;var p=pos(e);signCtx.beginPath();signCtx.moveTo(p.x,p.y);if(g("signPh"))g("signPh").style.display="none";};
  canvas.onmousemove=function(e){if(!signDrawing)return;var p=pos(e);signCtx.lineTo(p.x,p.y);signCtx.stroke();};

function enhanceGroupDeleteButtons(){

function saveNewP(){
  var gk=g("au_g").value,tur=g("au_t").value,name=g("au_n").value.trim(),oem=g("au_oem").value.trim(),mann=g("au_mann").value.trim(),alis=parseFloat(g("au_alis").value)||0,toptan=parseFloat(g("au_toptan").value)||0,stok=parseInt(g("au_stok").value)||0,img=g("au_img").value.trim(),cars=g("au_cars").value.trim();
  if(!name||!mann){notif("Ad ve MANN zorunludur","red");return;}
  if(!DATA[gk])return;
  // â”€â”€ OEM ve MANN tekrar kontrolü â”€â”€
  var allProds=getAllP();
  var mannNorm=mann.replace(/[\s\-]/g,"").toLowerCase();
  var oemNorm=(oem||"").replace(/[\s\-]/g,"").toLowerCase();
  var duplicate=allProds.find(function(p){
    var pm=(p.mann||"").replace(/[\s\-]/g,"").toLowerCase();
    var po=(p.oem||"").replace(/[\s\-]/g,"").toLowerCase();
    return pm===mannNorm||(oemNorm&&po===oemNorm);
  });
  if(duplicate){
    notif("⚠ï¸ Bu OEM veya MANN kodu zaten mevcut: "+duplicate.mann+" ("+duplicate.grupLabel+"â†’"+duplicate.tur+")","red");
    return;
  }
  if(!DATA[gk].cats[tur])DATA[gk].cats[tur]=[];
  DATA[gk].cats[tur].push({id:uid(),name:name,oem:oem||"-",mann:mann,price:toptan,alis:alis,maliyet:alis,stokAdet:stok,img:img,stock:stok>0,tur:tur,modeller:cars});
  saveProds();
  notif("Ürün eklendi ve müşteri paneline aktarıldı: "+mann,"grn");
  renderUrunTab();
}

function updateP(id){
  var found=null,oldGroup="",oldCat="";
  Object.keys(DATA).forEach(function(gk){Object.keys(DATA[gk].cats).forEach(function(cat){DATA[gk].cats[cat].forEach(function(p){if(p.id===id){found=p;oldGroup=gk;oldCat=cat;}});});});
  if(!found)return;
  var newGroup=g("ue_g").value,newCat=g("ue_t").value;
  DATA[newGroup].label=g("ue_group_label").value.trim()||DATA[newGroup].label;
  if(oldGroup!==newGroup||oldCat!==newCat){
    DATA[oldGroup].cats[oldCat]=DATA[oldGroup].cats[oldCat].filter(function(p){return p.id!==id;});
    if(!DATA[newGroup].cats[newCat])DATA[newGroup].cats[newCat]=[];
    DATA[newGroup].cats[newCat].push(found);
  }
  found.name=g("ue_name").value.trim()||found.name;
  found.oem=g("ue_oem").value;
  found.alis=parseFloat(g("ue_alis").value)||0;
  found.price=parseFloat(g("ue_toptan").value)||0;
  found.stokAdet=parseInt(g("ue_stok").value)||0;
  found.img=g("ue_img").value;
  found.modeller=g("ue_cars").value;
  found.tur=newCat;
  found.stock=(found.stokAdet>0);
  saveProds();
  notif("Ürün, grup ve tür güncellendi","grn");
  renderUrunTab();
}
function deleteP(id){if(!confirm("Silinsin mi?"))return;var gks=Object.keys(DATA);for(var i=0;i<gks.length;i++){var cats=DATA[gks[i]].cats;var cks=Object.keys(cats);for(var j=0;j<cks.length;j++){cats[cks[j]]=cats[cks[j]].filter(function(p){return p.id!==id;});}}saveProds();notif("Silindi","red");renderUrunTab();}
function saveGrupLabel(k){if(!DATA[k])return;DATA[k].label=g("agl_"+k).value.trim()||DATA[k].label;DATA[k].subtitle=g("ags_"+k).value.trim();saveProds();notif("Araç grubu güncellendi","grn");renderUrunTab();}
function saveGrup(){var k=(g("ag_k").value||"").toUpperCase().trim(),l=(g("ag_l").value||"").trim(),s=(g("ag_s").value||"").trim();if(!k||!l){notif("Kod ve ad zorunlu","red");return;}if(DATA[k]){notif("Bu kod zaten var","red");return;}DATA[k]={label:l,subtitle:s,cats:{Hava:[],Yag:[],Polen:[],Yakit:[]}};saveProds();notif("Grup eklendi","grn");renderUrunTab();}

function catalogSnapshot(){ensureCoreGroups();return{version:2,exportedAt:new Date().toISOString(),products:DATA};}
function downloadTextFile(filename,text,mime){
  var blob=new Blob([text],{type:mime||"text/plain;charset=utf-8"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},1200);
}
function exportCatalogBackup(){downloadTextFile("astera-katalog-yedek.json",JSON.stringify(catalogSnapshot(),null,2),"application/json;charset=utf-8");notif("Katalog yedeği indirildi","grn");}
function pickFile(accept,onload){
  var input=document.createElement("input");
  input.type="file";
  input.accept=accept;
  input.onchange=function(ev){
    var file=ev.target.files&&ev.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(){onload(String(reader.result||""),file.name||"");};
    reader.readAsText(file,"utf-8");
  };
  input.click();
}
function normalizeImportedCatalog(raw){
  if(!raw||typeof raw!=="object")throw new Error("Geçersiz katalog");
  DATA=raw.products&&typeof raw.products==="object"?raw.products:raw;
  ensureCoreGroups();
  saveProds();
  renderPage("urunler");
}
function importCatalogBackup(){
  pickFile(".json,application/json",function(text,name){
    try{normalizeImportedCatalog(JSON.parse(text));notif("Katalog yedeği yüklendi: "+name,"grn");}
    catch(e){notif("Yedek dosyası okunamadı","red");}
  });
}
function importCatalogFromCustomerHtml(){
  pickFile(".html,text/html",function(text,name){
    try{
      var match=text.match(/var DATA=([\s\S]+?);\nvar PRODUCTS_KEY/);
      if(!match)throw new Error("DATA bulunamadı");
      normalizeImportedCatalog(JSON.parse(match[1]));
      notif("Müşteri HTML kataloğu içe alındı: "+name,"grn");
    }catch(e){
      notif("Bu HTML dosyasından katalog alınamadı","red");
    }
  });
}

  var val = document.getElementById("loginPass").value;
  if(val === PASS){
    document.getElementById("loginWrap").style.display = "none";
    document.getElementById("appWrap").style.display = "flex";
    sessionStorage.setItem("astera_auth","1");
  } else {
    document.getElementById("loginErr").textContent = "Hatalı şifre";
    document.getElementById("loginPass").value = "";
  }
}
document.addEventListener("DOMContentLoaded", function(){
  startTurkishUiNormalizer();
  var inp = document.getElementById("loginPass");
  if(inp) inp.addEventListener("keydown", function(e){ if(e.key==="Enter") tryLogin(); });
  // Oturum açık mı kontrol et
  if(sessionStorage.getItem("astera_auth")==="1"){
    document.getElementById("loginWrap").style.display = "none";
    document.getElementById("appWrap").style.display = "flex";
  }
});

window.onload=function(){

  // Açılışta Supabase'den güncel verileri çek
  if(cloudReady()){
    cloudPullNow().then(function(){
      notif("Buluttan veriler yüklendi","grn");
    }).catch(function(){
      notif("Bulut bağlantısı kurulamadı, yerel veriler kullanılıyor","amb");
    });
  }
  document.querySelectorAll(".sb-item").forEach(function(el){el.addEventListener("click",function(){renderPage(this.getAttribute("data-page"));});});
  g("menuBtn").addEventListener("click",function(){g("sidebar").classList.toggle("open");g("overlay").classList.toggle("show");});
  g("modalOv").addEventListener("click",function(e){if(e.target===this)closeModal();});
  setInterval(checkOrders,30000);
};
