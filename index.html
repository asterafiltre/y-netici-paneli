<html lang="tr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ASTERA  -  Yönetici Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
<style>
:root{--bg:#eeeae3;--sur:#fff;--sur2:#f4f1eb;--bdr:#e0dbd0;--bdr2:#ccc7bb;--txt:#333333;--txt2:#5f5f5f;--txt3:#8a8a8a;--acc:#2a2118;--grn:#1a5c35;--grn-bg:#e8f5ee;--red:#b82c1f;--red-bg:#fdf0ee;--amb:#8a5a0a;--amb-bg:#fdf4e3;--blue:#1a4882;--blue-bg:#edf2fc;--pur:#5b21b6;--pur-bg:#f3f0ff;--gold:#c8a84b;--r:10px;--rs:7px;--sb:210px}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--txt);font-size:16px;display:flex;flex-direction:column}
input,select,textarea,button{font-family:"Inter",sans-serif}
.hidden{display:none!important}
.login-wrap{position:fixed;inset:0;background:var(--acc);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px}
.login-box{background:var(--sur);border-radius:14px;padding:36px 32px;max-width:360px;width:100%;text-align:center}
.login-logo{width:56px;height:56px;background:var(--gold);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--acc);font-size:26px;font-weight:800;margin:0 auto 14px}
.login-title{font-size:28px;font-weight:800;margin-bottom:6px}
.login-sub{font-size:18px;font-weight:600;color:var(--txt2);margin-bottom:22px}
.login-inp{width:100%;border:1.5px solid var(--bdr);border-radius:var(--rs);padding:11px 14px;font-size:14px;outline:none;text-align:center;letter-spacing:3px;margin-bottom:10px;background:var(--sur2);color:var(--txt)}
.login-inp:focus{border-color:var(--acc)}
.login-btn{width:100%;background:var(--acc);color:#fff;border:none;padding:11px;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer}
.login-err{font-size:11px;color:var(--red);margin-top:7px;min-height:14px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sb);background:var(--acc);color:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:transform .25s;z-index:200}
@media(max-width:720px){.sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-110%)}.sidebar.open{transform:translateX(0)}}
.sb-logo{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo-img{height:32px;width:auto;display:none;border-radius:4px}
.sb-logo-fb{width:32px;height:32px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--acc);font-size:16px;font-weight:800;flex-shrink:0}
.sb-logo-txt{margin-top:7px;font-size:12px;font-weight:800;letter-spacing:.4px}
.sb-logo-sub{font-size:9px;opacity:.5;margin-top:1px}
.sb-nav{flex:1;padding:6px 0}
.sb-grp{padding:8px 12px 3px;font-size:9px;font-weight:700;opacity:.45;text-transform:uppercase;letter-spacing:.9px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;font-size:12px;font-weight:600;opacity:.72;transition:all .15s;border-left:3px solid transparent}
.sb-item:hover{opacity:1;background:rgba(255,255,255,.07)}
.sb-item.active{opacity:1;background:rgba(255,255,255,.13);border-left-color:var(--gold)}
.sb-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-bdg{background:var(--red);color:#fff;border-radius:99px;padding:1px 5px;font-size:9px;font-weight:700;margin-left:auto;display:none}
.sb-foot{padding:10px 14px;border-top:1px solid rgba(255,255,255,.1)}
.sb-logout{display:flex;align-items:center;gap:7px;font-size:11px;opacity:.55;cursor:pointer;padding:5px 0}
.sb-logout:hover{opacity:.9}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150}
.overlay.show{display:block}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.topbar-l{display:flex;align-items:center;gap:10px}
.menu-btn{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--txt);padding:2px 4px}
@media(max-width:720px){.menu-btn{display:block}}
.page-title{font-size:28px;font-weight:800;white-space:nowrap;color:var(--txt)}
.page-acts{display:flex;gap:6px;flex-wrap:wrap}
.content{flex:1;overflow-y:auto;padding:14px 16px}
@media(max-width:600px){.content{padding:10px}}
.notif{position:fixed;top:12px;right:12px;background:var(--acc);color:#fff;padding:9px 15px;border-radius:var(--rs);font-size:12px;font-weight:600;z-index:9999;opacity:0;transform:translateY(-8px);transition:all .3s;pointer-events:none;max-width:280px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.notif.show{opacity:1;transform:translateY(0)}
.notif.grn{background:var(--grn)}.notif.red{background:var(--red)}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-hdr{padding:11px 15px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-hdr-t{font-size:19px;font-weight:700;letter-spacing:0;color:var(--txt)}
.card-body{padding:13px 15px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
@media(max-width:800px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.g2,.g3,.g4{grid-template-columns:1fr}}
.stat{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:13px 15px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.stat-lbl{font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.stat-val{font-size:20px;font-weight:800;font-family:"Space Mono",monospace;line-height:1}
.stat-sub{font-size:10px;color:var(--txt3);margin-top:3px}
.stat-val.grn{color:var(--grn)}.stat-val.red{color:var(--red)}.stat-val.amb{color:var(--amb)}.stat-val.blue{color:var(--blue)}
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 10px;text-align:left;font-size:9px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--bdr);background:var(--sur2);white-space:nowrap;cursor:pointer;user-select:none}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--bdr);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(0,0,0,.015)}
.tbl .mono{font-family:"Space Mono",monospace;font-size:11px}
.tbl .r{text-align:right}.tbl .c{text-align:center}
.badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;white-space:nowrap;letter-spacing:.3px}
.badge.grn{background:var(--grn-bg);color:var(--grn)}.badge.red{background:var(--red-bg);color:var(--red)}.badge.amb{background:var(--amb-bg);color:var(--amb)}.badge.blue{background:var(--blue-bg);color:var(--blue)}.badge.pur{background:var(--pur-bg);color:var(--pur)}.badge.gray{background:var(--sur2);color:var(--txt2)}
.btn{padding:7px 13px;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-family:"Syne",sans-serif}
.btn-acc{background:var(--acc);color:#fff}.btn-acc:hover{opacity:.87}
.btn-grn{background:var(--grn);color:#fff}.btn-grn:hover{opacity:.87}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{opacity:.87}
.btn-amb{background:var(--amb);color:#fff}.btn-amb:hover{opacity:.87}
.btn-sec{background:var(--sur);color:var(--txt);border:1.5px solid var(--bdr2)!important}.btn-sec:hover{background:var(--sur2)}
.btn-wa{background:#25D366;color:#fff}
.btn-sm{padding:4px 9px;font-size:11px}.btn-xs{padding:2px 7px;font-size:10px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.fr.c1{grid-template-columns:1fr}.fr.c3{grid-template-columns:1fr 1fr 1fr}.fr.c4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:600px){.fr,.fr.c3,.fr.c4{grid-template-columns:1fr 1fr}}
@media(max-width:380px){.fr,.fr.c1,.fr.c3,.fr.c4{grid-template-columns:1fr}}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:18px;font-weight:600;color:var(--txt2);letter-spacing:0}
.fg input,.fg select,.fg textarea{border:1.5px solid var(--bdr);border-radius:var(--rs);padding:10px 12px;font-size:16px;color:var(--txt);background:var(--sur);outline:none;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc)}
.fg textarea{resize:vertical;min-height:56px}
.srch{border:1.5px solid var(--bdr);border-radius:var(--rs);padding:7px 10px;font-size:12px;outline:none;background:var(--sur);font-family:"Syne",sans-serif;color:var(--txt)}
.srch:focus{border-color:var(--acc)}
.toolbar{display:flex;gap:7px;margin-bottom:11px;flex-wrap:wrap;align-items:center}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:12px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-ov.open{opacity:1;pointer-events:auto}
.modal{background:var(--sur);border-radius:var(--r);width:100%;max-width:540px;max-height:93vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25);transform:translateY(8px);transition:transform .2s;overflow:hidden}
.modal-ov.open .modal{transform:translateY(0)}
.modal.wide{max-width:780px}
.modal-hdr{padding:13px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-hdr h3{font-size:14px;font-weight:800}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--txt2);line-height:1}
.modal-body{padding:15px 16px;overflow-y:auto;flex:1}
.modal-foot{padding:11px 16px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:7px;flex-shrink:0;flex-wrap:wrap}
.ctabs{display:flex;gap:3px;border-bottom:2px solid var(--bdr);margin-bottom:13px;overflow-x:auto}
.ct{padding:7px 13px;font-size:12px;font-weight:700;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;letter-spacing:.2px;white-space:nowrap;flex-shrink:0}
.ct:hover{color:var(--txt)}.ct.active{color:var(--acc);border-bottom-color:var(--acc)}
/* DOC STYLES */
.doc-wrap{background:#fff;border:2px solid var(--bdr);border-radius:var(--r);padding:26px;font-size:13px}
.doc-hdr-row{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--acc);padding-bottom:13px;margin-bottom:16px}
.doc-co{font-size:17px;font-weight:800;color:var(--acc)}
.doc-co small{display:block;font-size:10px;font-weight:400;color:var(--txt2)}
.doc-no-block{text-align:right;font-family:"Space Mono",monospace;font-size:11px;color:var(--txt2)}
.doc-no-block strong{display:block;font-size:13px;color:var(--txt);margin-bottom:2px}
.doc-tbl{width:100%;border-collapse:collapse;margin:11px 0}
.doc-tbl th{padding:6px 9px;background:var(--sur2);border:1px solid var(--bdr);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;text-align:left}
.doc-tbl td{padding:6px 9px;border:1px solid var(--bdr)}
.doc-tbl .r{text-align:right;font-family:"Space Mono",monospace}
.doc-totals{display:flex;flex-direction:column;align-items:flex-end;gap:3px;border-top:2px solid var(--bdr);padding-top:10px;margin-top:3px}
.doc-tr-row{display:flex;justify-content:space-between;gap:40px;font-size:12px}
.doc-tr-row.grand{font-weight:800;font-size:14px;padding-top:5px;border-top:1px solid var(--bdr);margin-top:3px}
.doc-footer{margin-top:17px;padding-top:11px;border-top:1px dashed var(--bdr);font-size:10px;color:var(--txt3);text-align:center}
.sign-grid{display:grid;grid-template-columns:minmax(180px,.85fr) minmax(360px,1.65fr);gap:24px;margin-top:22px;align-items:start}
@media(max-width:500px){.sign-grid{grid-template-columns:1fr}}
.sign-lbl{font-size:10px;font-weight:700;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.sign-area{border:2px dashed var(--bdr);border-radius:var(--rs);height:150px;position:relative;background:#fafafa;overflow:hidden;cursor:crosshair}
.sign-area canvas{position:absolute;inset:0;width:100%;height:100%;z-index:3}
.sign-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block}
.sign-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--txt3);pointer-events:none;z-index:4}
.kase-overlay{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0.55;filter:contrast(1.08);z-index:1}
.uploaded-stamp{z-index:2;opacity:.72;filter:contrast(1.1)}
.signature-overlay{z-index:5;opacity:1;filter:none}
.stamp-photo-wrap{display:flex;flex-direction:column;align-items:flex-start;gap:8px}
.stamp-photo{width:320px;max-width:100%;height:200px;border:1px solid var(--bdr);border-radius:var(--rs);display:block;object-fit:contain;background:#fff;padding:4px}
/* PRINT */
@media print{
  .login-wrap,.sidebar,.topbar,.no-print,.modal-ov,.overlay{display:none!important}
  .main{overflow:visible!important}
  .content{overflow:visible!important;padding:0!important}
  .print-show{display:block!important}
  body,html{overflow:visible!important;height:auto!important}
  .doc-wrap{border:none;padding:0;box-shadow:none}
  /* Panelin tamamı yazdırılmasın  -  sadece doc-wrap göster */
  .app,.sidebar,.topbar,.page-acts,.card:not(.print-target),.toolbar,.tbl-wrap:not(.print-target){display:none!important}
  .doc-wrap{display:block!important}
  #tslDocContent,#ftPreview{display:block!important}
  .kase-overlay{opacity:.8!important;filter:contrast(1.12)!important}
  .stamp-photo{max-width:360px!important;max-height:240px!important}
}
.print-show{display:none}
/* utils */
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}
.flex{display:flex}.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.flex1{flex:1}.ic{align-items:center}.jb{justify-content:space-between}
.fw7{font-weight:700}.fw8{font-weight:800}.fz10{font-size:10px}.fz11{font-size:11px}.fz12{font-size:12px}
.txt2{color:var(--txt2)}.txt3{color:var(--txt3)}
.mono{font-family:"Space Mono",monospace}
.sep{border:none;border-top:1px solid var(--bdr);margin:13px 0}
.sec-t{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--bdr)}
.empty-st{text-align:center;padding:30px 14px;color:var(--txt3);font-size:12px}
.m-link{color:var(--blue);cursor:pointer;font-weight:700;border-bottom:1.5px dashed var(--blue-bg);transition:all .15s;white-space:nowrap}
.m-link:hover{color:var(--acc);border-bottom-color:var(--acc);background:var(--blue-bg);border-radius:3px;padding:0 2px}
</style>
</head>
<body>

<div id="loginWrap" style="position:fixed;inset:0;background:#2a2118;display:none;align-items:center;justify-content:center;z-index:9999;padding:16px">
  <div style="background:#fff;border-radius:14px;padding:36px 32px;max-width:360px;width:100%;text-align:center">
    <div style="width:56px;height:56px;background:#c8a84b;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#2a2118;font-size:26px;font-weight:800;margin:0 auto 14px">A</div>
    <div style="font-size:24px;font-weight:800;margin-bottom:6px">ASTERA</div>
    <div style="font-size:15px;font-weight:600;color:#666;margin-bottom:22px">Yönetici Paneli</div>
    <input id="loginPass" type="password" placeholder="Şifre" style="width:100%;border:1.5px solid #e0dbd0;border-radius:8px;padding:11px 14px;font-size:15px;outline:none;text-align:center;letter-spacing:3px;margin-bottom:10px;background:#f4f1eb;font-family:inherit">
    <button onclick="tryLogin()" style="width:100%;background:#2a2118;color:#fff;border:none;padding:12px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">Giriş Yap</button>
    <div id="loginErr" style="font-size:12px;color:#b82c1f;margin-top:8px;min-height:16px"></div>
  </div>
</div>
<div class="notif" id="notif"></div>
<div class="overlay" id="overlay" onclick="closeSB()"></div>
<!-- APP -->
<div class="app" id="appWrap" style="display:flex">
  <div class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="flex ic gap8"><img id="sbLogoImg" class="sb-logo-img" alt=""><div id="sbLogoFb" class="sb-logo-fb">A</div><div><div class="sb-logo-txt">ASTERA</div><div class="sb-logo-sub">Yönetici</div></div></div>
    </div>
    <nav class="sb-nav">
      <div class="sb-grp">Genel</div>
      <div class="sb-item active" data-page="dashboard"><span class="sb-icon">📊</span>Dashboard</div>
      <div class="sb-grp">Satış</div>
      <div class="sb-item" data-page="siparisler"><span class="sb-icon">🛒</span>Siparişler <span class="sb-bdg" id="sipBdg">0</span></div>
      <div class="sb-item" data-page="bekleyenSip"><span class="sb-icon">⏳</span>Bekleyen Sip. <span class="sb-bdg" id="bekBdg" style="display:none">0</span></div>
      <div class="sb-item" data-page="performans"><span class="sb-icon">📈</span>Performans</div>
      <div class="sb-item" data-page="teslim"><span class="sb-icon">📋</span>Teslim Belgesi</div>
      <div class="sb-item" data-page="fatura"><span class="sb-icon">🧾</span>Fatura</div>
      <div class="sb-grp">Müşteri</div>
      <div class="sb-item" data-page="cari"><span class="sb-icon">👥</span>Cari Hesaplar</div>
      <div class="sb-grp">Stok &amp; Finans</div>
      <div class="sb-item" data-page="stok"><span class="sb-icon">📦</span>Stok Takip</div>
      <div class="sb-item" data-page="satinalma"><span class="sb-icon">🛍️</span>Satın Alma</div>
      <div class="sb-item" data-page="karlar"><span class="sb-icon">💰</span>Kâr / Zarar</div>
      <div class="sb-grp">Ayarlar</div>
      <div class="sb-item" data-page="urunler"><span class="sb-icon">⚙️</span>Ürün Yönetimi</div>
      <div class="sb-item" data-page="ayarlar"><span class="sb-icon">⚙️</span>Ayarlar</div>
    </nav>
    <div class="sb-foot"><div class="sb-logout" style="opacity:.4;cursor:default">ASTERA YÖNETİCİ</div></div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-l"><button class="menu-btn" id="menuBtn">☰</button><div class="page-title" id="pageTitle">Dashboard</div></div>
      <div class="page-acts" id="pageActs"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="modal-ov" id="modalOv">
  <div class="modal" id="modalBox">
    <div class="modal-hdr"><h3 id="modalTitle">Modal</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>

function getCustomerPanelSourceData(){
  // DATA is always current (updated by initProds + user actions)
  // Use DATA directly to ensure the customer panel reflects the current admin state
  return DATA||{};
}
function buildCustomerPanelData(){
  var out={};
  getAllP().forEach(function(p){
    if(!p)return;
    if(p.active===false)return;
    var groupKey=p.grupKey||"DIGER";
    var group=DATA[groupKey]||{};
    var type=p.cat||p.tur||"Hava";
    if(!out[groupKey]){
      out[groupKey]={
        label:group.label||p.grupLabel||groupKey,
        subtitle:group.subtitle||"",
        cats:{}
      };
    }
    if(!out[groupKey].cats[type])out[groupKey].cats[type]=[];
    var stokAdet=p.stokAdet==null?null:Math.max(0,parseInt(p.stokAdet,10)||0);
    out[groupKey].cats[type].push({
      id:p.id||uid(),
      name:p.name||"",
      oem:p.oem||"",
      mann:p.mann||"",
      price:parseFloat(p.price||0),
      img:p.img||"",
      modeller:p.modeller||"",
      active:p.active!==false,
      stock:stokAdet==null?(p.stock!==false):stokAdet>0,
      stokAdet:stokAdet
    });
  });
  return out;
}
function isPlaceholderCustomerRecord(m){
  if(!m)return false;
  var ad=String(m.ad||"").trim().toUpperCase();
  var firma=String(m.firma||"").trim().toUpperCase();
  var tel=String(m.tel||"").replace(/\D/g,"");
  var adres=String(m.adres||"").trim();
  var vergiNo=String(m.vergiNo||"").trim();
  var vergiDairesi=String(m.vergiDairesi||"").trim();
  var iskonto=parseFloat(m.iskonto||0)||0;
  return ad==="TABA TİCARET"&&firma==="TABA TİCARET"&&!tel&&!adres&&!vergiNo&&!vergiDairesi&&!iskonto;
}
function buildCustomerPanelCustomers(){
  return (MUSTERILER||[]).filter(function(m){ return !isPlaceholderCustomerRecord(m); }).map(function(m){
    return {
      id:m&&m.id||uid(),
      ad:m&&m.ad||"",
      tel:m&&m.tel||"",
      firma:m&&m.firma||"",
      adres:m&&m.adres||"",
      vergiNo:m&&m.vergiNo||"",
      vergiDairesi:m&&m.vergiDairesi||"",
      iskonto:parseFloat(m&&m.iskonto||0)||0
    };
  });
}

var DEFAULT_GROUPS={
  "VAG":{label:"VAG Grubu",subtitle:"VW·Audi·Seat·Skoda",cats:{}},
  "RENAULT":{label:"Renault / Dacia",subtitle:"Renault·Dacia",cats:{}},

function makeEmptyCats(){
  return {Hava:[],Yag:[],Polen:[],Yakit:[]};
}
function groupProductCount(key){
  if(!DATA[key]||!DATA[key].cats)return 0;
  return Object.keys(DATA[key].cats).reduce(function(sum,cat){
    return sum + ((DATA[key].cats[cat]||[]).length||0);
  },0);
}
function normalizeGroupLabel(v){
  return String(v||"").toLowerCase().replace(/[^a-z0-9]+/g,"");
}
function cleanupDuplicateEmptyGroups(){
  var seen={};
  Object.keys(DATA||{}).forEach(function(key){
    var grp=DATA[key]||{};
    var labelKey=normalizeGroupLabel(grp.label||key);
    var count=groupProductCount(key);
    if(!labelKey)return;
    if(!seen[labelKey]){
      seen[labelKey]={key:key,count:count};
      return;
    }
    if(count===0){
      delete DATA[key];
      return;
    }
    if(seen[labelKey].count===0){
      delete DATA[seen[labelKey].key];
      seen[labelKey]={key:key,count:count};
    }
  });
}
function ensureCoreGroups(){
  Object.keys(DEFAULT_GROUPS).forEach(function(key){
    if(!DATA[key]){
      DATA[key]={label:DEFAULT_GROUPS[key].label,subtitle:DEFAULT_GROUPS[key].subtitle,cats:makeEmptyCats()};
      return;
    }
    if(!DATA[key].label)DATA[key].label=DEFAULT_GROUPS[key].label;
    if(DATA[key].subtitle==null)DATA[key].subtitle=DEFAULT_GROUPS[key].subtitle;
    if(!DATA[key].cats)DATA[key].cats={};
    PRODUCT_TYPE_ORDER.forEach(function(type){
      if(!Array.isArray(DATA[key].cats[type]))DATA[key].cats[type]=[];
    });
  });
  cleanupDuplicateEmptyGroups();
}

<style>
:root{
  --bg:#edf4f8;--card:#fff;--line:#c4d3dd;--text:#18384f;--muted:#60798c;
  --brand:#1d5279;--green:#2e6f52;--soft:#e6f0f6;--accent:#4f8db5;
  --hava:#2d7ab5;--yag:#5a7a90;--polen:#7a92ac;--yakit:#1d4d66;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",sans-serif;background:linear-gradient(135deg,#edf4f8 0%,#f5f9fc 100%);color:var(--text);font-size:15px;min-height:100vh}
.wrap{max-width:1240px;margin:0 auto;padding:16px;display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:16px}
@media(max-width:920px){.wrap{grid-template-columns:1fr}}
/* Card */
.card{background:#fff;border:1px solid rgba(100,155,195,.22);border-radius:20px;box-shadow:0 8px 32px rgba(29,82,121,.07);overflow:hidden}
/* Header */
.head{padding:20px 22px;border-bottom:1px solid rgba(100,155,195,.18);display:flex;align-items:center;gap:20px;background:linear-gradient(135deg,#1d5279 0%,#2d7ab5 100%)}
.logo-wrap{flex-shrink:0}
.logo-wrap img{height:80px;max-width:220px;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,.25))}
.logo-fb{width:72px;height:72px;border-radius:16px;background:rgba(255,255,255,.2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:28px;border:2px solid rgba(255,255,255,.35)}
.head-text{color:#fff}
.head-title{font-size:26px;font-weight:900;letter-spacing:-.01em;line-height:1.1}
.head-sub{font-size:14px;font-weight:600;opacity:.75;margin-top:3px}
/* Body */
.body{padding:18px 20px}
/* Form */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.fg input,.fg select{padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;color:var(--text);background:#fff;transition:border-color .15s}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,141,181,.12)}
.check-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--line);border-radius:10px;background:#f8fbfd;cursor:pointer;font-size:14px;font-weight:600}
.check-row input{width:16px;height:16px;accent-color:var(--brand)}
.invoice-grid{display:none;margin-top:10px}
.invoice-grid.open{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
/* Search */
.search-wrap{margin-top:14px;position:relative}
.search{width:100%;padding:11px 14px 11px 38px;border:1.5px solid var(--line);border-radius:12px;font-size:14px;font-family:inherit;background:#fff;color:var(--text);transition:border-color .15s}
.search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,141,181,.12)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
/* Tabs */
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-top:14px;border-bottom:2px solid var(--line);padding-bottom:0}
.tab{padding:9px 14px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;border-radius:8px 8px 0 0;transition:all .15s;font-family:inherit}
.tab:hover{color:var(--text);background:rgba(79,141,181,.07)}
.tab.active{color:var(--brand);border-bottom-color:var(--brand);background:rgba(29,82,121,.05)}
.type-tab[data-type="Hava"].active,.type-tab[data-type="Hava"].active{color:var(--hava);border-bottom-color:var(--hava)}
.type-tab[data-type="Yag"].active,.type-tab[data-type="Yag"].active{color:var(--yag);border-bottom-color:var(--yag)}
.type-tab[data-type="Polen"].active{color:var(--polen);border-bottom-color:var(--polen)}
.type-tab[data-type="Yakit"].active,.type-tab[data-type="Yakit"].active{color:var(--yakit);border-bottom-color:var(--yakit)}
/* Products */
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-top:14px}
.product{background:#fff;border:1.5px solid rgba(100,155,195,.2);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:8px;transition:box-shadow .18s,transform .18s}
.product:hover{box-shadow:0 8px 28px rgba(29,82,121,.12);transform:translateY(-2px)}
.product.out{opacity:.7;border-color:rgba(180,77,63,.2)}
.prod-img-wrap{width:100%;height:130px;border-radius:12px;background:linear-gradient(135deg,#f2f8fc,#e8f2f8);display:flex;align-items:center;justify-content:center;overflow:hidden}
.prod-img-wrap img{max-width:100%;max-height:100%;object-fit:contain}
.prod-img-placeholder{font-size:40px;opacity:.3}
.prod-name{font-weight:800;font-size:14px;line-height:1.35;color:var(--text)}
.prod-meta{font-size:12px;color:var(--muted);line-height:1.7}
.prod-meta strong{color:var(--text);font-weight:700}
.stock-ok{font-size:12px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:4px}
.stock-out{font-size:12px;font-weight:700;color:#b24d3f;display:flex;align-items:center;gap:4px}
.prod-price{font-size:22px;font-weight:900;color:var(--brand)}
.prod-price small{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-top:1px}
.qty-row{display:flex;align-items:center;gap:8px;margin-top:auto}
.qty-input{width:60px;padding:8px 6px;border:1.5px solid var(--line);border-radius:8px;font-size:14px;text-align:center;font-family:inherit}
.qty-input:focus{outline:none;border-color:var(--accent)}
.btn{border:none;border-radius:10px;padding:9px 14px;font-weight:800;cursor:pointer;font-family:inherit;font-size:13px;transition:all .15s}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.btn-brand{background:linear-gradient(135deg,var(--brand),var(--accent));color:#fff;box-shadow:0 6px 18px rgba(29,82,121,.2)}
.btn-soft{background:var(--soft);color:var(--text)}
.btn-green{background:linear-gradient(135deg,var(--green),#3a8a66);color:#fff;box-shadow:0 6px 18px rgba(46,111,82,.2)}
.btn-termin{background:#fff;border:1.5px solid var(--line);color:var(--muted);padding:6px 10px;font-size:12px}
.empty-msg{text-align:center;padding:40px 20px;color:var(--muted);border:2px dashed rgba(100,155,195,.25);border-radius:16px;background:rgba(255,255,255,.6)}
.empty-msg span{font-size:36px;display:block;margin-bottom:10px}
/* Cart */
.cart-sticky{position:sticky;top:16px}
.cart-head{padding:18px 20px;border-bottom:1px solid rgba(100,155,195,.18);display:flex;align-items:center;justify-content:space-between}
.cart-title{font-size:18px;font-weight:900;color:var(--text)}
.cart-count{font-size:13px;font-weight:700;color:var(--muted);background:var(--soft);padding:3px 10px;border-radius:99px}
.cart-body{padding:16px 18px}
.cart-list{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto}
.cart-item{padding:10px 12px;border:1px solid rgba(100,155,195,.18);border-radius:12px;background:linear-gradient(180deg,#fcfeff,#f4f8fb)}
.cart-item-name{font-weight:800;font-size:13px}
.cart-item-sub{font-size:12px;color:var(--muted);margin-top:2px}
.cart-item-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.cart-item-price{font-weight:800;font-size:14px;color:var(--brand)}
.btn-remove{background:none;border:none;color:#b24d3f;cursor:pointer;font-size:18px;padding:2px 4px;line-height:1}
.cart-empty{text-align:center;padding:28px 12px;color:var(--muted);font-size:13px}
/* Summary */
.summary{margin-top:14px;padding:16px;border:1px solid rgba(100,155,195,.2);border-radius:16px;background:linear-gradient(180deg,#f8fbfd,#edf4f8)}
.summary-label{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#8b6b2e;margin-bottom:10px}
.sum-row{display:flex;justify-content:space-between;font-size:14px;font-weight:700;padding:7px 0;border-top:1px solid rgba(100,155,195,.15)}
.sum-row:first-of-type{border-top:none;padding-top:0}
.sum-grand{padding:14px 16px;border-radius:14px;background:linear-gradient(135deg,var(--brand),var(--accent));color:#fff;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.sum-grand-label{font-size:14px;font-weight:800}
.sum-grand-val{font-size:22px;font-weight:900}
/* Order button */
.order-btn{width:100%;margin-top:12px;padding:14px;font-size:15px;font-weight:900;border:none;border-radius:14px;background:linear-gradient(135deg,#25D366,#1da851);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 20px rgba(37,211,102,.25);transition:all .18s;font-family:inherit}
.order-btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(37,211,102,.35)}
</style>
</head>
<body>
<div class="wrap">
  <!-- Sol: Ürünler -->
  <div>
    <div class="card">
      <div class="head">
        <div class="logo-wrap" id="logoArea"></div>
        <div class="head-text">
          <div class="head-title">ASTERA TİCARET</div>
          <div class="head-sub">Filtre Tedarikçiniz  -  Online Sipariş</div>
        </div>
      </div>
      <div class="body">
        <!-- Müşteri formu -->
        <div class="form-grid">
          <div class="fg"><label>Telefon / Cari Kodu</label><input id="custPhone" type="tel" placeholder="5xx xxx xx xx" inputmode="tel"></div>
          <div class="fg"><label>Ad Soyad</label><input id="custName" placeholder="Müşteri adı"></div>
          <div class="fg"><label>Firma</label><input id="custFirm" placeholder="Firma adı"></div>
        </div>
        <label class="check-row"><input type="checkbox" id="wantInvoice"> Fatura istiyorum</label>
        <div id="invoiceFields" class="invoice-grid" style="display:none">
          <div class="fg"><label>Vergi Numarası</label><input id="custTaxNo" placeholder="Vergi numarası" disabled></div>
          <div class="fg"><label>Vergi Dairesi</label><input id="custTaxOffice" placeholder="Vergi dairesi" disabled></div>
        </div>
        <!-- Arama -->
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input id="search" class="search" placeholder="MANN, OEM, araç modeli veya ürün adı ara...">
        </div>
        <!-- Grup sekmeleri -->
        <div id="groupTabs" class="tabs"></div>
        <!-- Tür sekmeleri -->
        <div id="typeTabs" class="tabs" style="margin-top:6px;border-bottom:none"></div>
        <!-- Ürünler -->

  </div>
  <!-- Sağ: Sepet -->
  <div>
    <div class="card cart-sticky">
      <div class="cart-head">
        <div class="cart-title">🛒 Sepetim</div>
        <div class="cart-count" id="cartCount">0 ürün</div>

          <div class="cart-empty">Sepetiniz boş.<br>Sol taraftan ürün ekleyin.</div>
        </div>
        <div class="summary" id="summaryBox">
          <div class="summary-label">Sipariş Özeti</div>
          <div class="sum-row" id="subRow" style="display:none"><span>Ara Toplam</span><span id="cartSubtotal">0,00 TL</span></div>
          <div class="sum-row" id="discountRow" style="display:none"><span id="cartDiscountLabel">Özel İskonto</span><span id="cartDiscount">0,00 TL</span></div>
          <div class="sum-row" id="discountedSubRow" style="display:none"><span>İskontolu Ara Toplam</span><span id="cartDiscountedSubtotal">0,00 TL</span></div>
          <div class="sum-row" id="vatRow" style="display:none"><span>KDV %20</span><span id="cartVat">0,00 TL</span></div>
          <div class="sum-grand" id="grandRow"><span class="sum-grand-label">Genel Toplam</span><span class="sum-grand-val" id="cartTotal">0,00 TL</span></div>
        </div>
        <button class="order-btn" id="sendBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.121 1.534 5.856L0 24l6.288-1.507C7.985 23.454 9.953 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.848 0-3.573-.497-5.063-1.366l-.363-.213-3.73.895.944-3.629-.236-.374C2.54 15.71 2 13.916 2 12 2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
          WhatsApp ile Sipariş Ver
        </button>
      </div>
    </div>
  </div>
</div>
<script>
var WA=__WA__;
var LOGO=__LOGO__;
var CUSTOMERS=[];
var DATA={};
var CLOUD_PUBLIC={supabaseUrl:__CFG_URL__,supabaseAnonKey:__CFG_KEY__,table:__CFG_TABLE__,rowId:__CFG_ROWID__};
var CLOUD_ADMIN={supabaseUrl:__CFG_URL__,supabaseAnonKey:__CFG_KEY__,table:__ADMIN_CFG_TABLE__,rowId:__ADMIN_CFG_ROWID__};
var activeGroup="";
var activeType="";
var cart={};
var catalogTimer=0;
var lastRemoteUpdatedAt="";
var lastCatalogRevision=0;
var catalogBusy=false;
var catalogReady=false;

function g(id){return document.getElementById(id);}
function money(n){return parseFloat(n||0).toLocaleString("tr-TR",{minimumFractionDigits:2,maximumFractionDigits:2})+" TL";}
function fmtDate(){return new Date().toLocaleDateString("tr-TR");}
function fmtDateTime(){return new Date().toLocaleString("tr-TR");}
function enc(v){return encodeURIComponent(v||"");}
function dec(v){return decodeURIComponent(v||"");}
function uid(){
  return "ord_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,8);
}
function countCatalogProducts(data){
  var total=0;
  Object.keys(data||{}).forEach(function(groupKey){
    var group=data[groupKey]||{};
    Object.keys(group.cats||{}).forEach(function(type){
      var items=Array.isArray(group.cats[type])?group.cats[type]:Object.values(group.cats[type]||{});
      total+=items.filter(function(item){return item&&typeof item==="object";}).length;
    });
  });
  return total;
}
function sanitizeCatalogData(raw){
  var out={};
  Object.keys(raw||{}).forEach(function(groupKey){
    var group=raw[groupKey];
    if(!group||typeof group!=="object")return;
    var cats={};
    Object.keys(group.cats||{}).forEach(function(type){
      var items=Array.isArray(group.cats[type])?group.cats[type]:Object.values(group.cats[type]||{});
      cats[type]=items.filter(function(item){return item&&typeof item==="object";});
    });
    out[groupKey]={label:group.label||groupKey,subtitle:group.subtitle||"",cats:cats};
  });
  return out;
}
function normalizeCatalogPayload(source){
  var row=source&&typeof source==="object"&&source.payload&&typeof source.payload==="object"?source.payload:source;
  if(!row||typeof row!=="object")return null;
  var normalizedData=sanitizeCatalogData(row.data!=null?row.data:row.products);
  var productCount=countCatalogProducts(normalizedData);
  var groupCount=Object.keys(normalizedData||{}).length;
  return {
    wa:row.wa!=null?row.wa:(row.settings&&row.settings.wa!=null?row.settings.wa:""),
    logo:row.logo||"",
    customers:Array.isArray(row.customers)?row.customers:(Array.isArray(row.musteriler)?row.musteriler:[]),
    data:normalizedData,
    groupCount:groupCount,
    productCount:productCount,
    updatedAt:row.updatedAt||row.updated_at||"",
    revision:parseInt(row.revision,10)||0
  };
}
function normalizePhone(v){
  var digits=String(v==null?"":v).replace(/\D/g,"");
  if(digits.indexOf("90")===0&&digits.length===12)digits=digits.slice(2);
  if(digits.indexOf("0")===0&&digits.length===11)digits=digits.slice(1);
  return digits;
}
function sanitizedCustomers(){
  return (CUSTOMERS||[]).map(function(c){
    return {
      id:c&&c.id||"",
      ad:c&&c.ad||"",
      tel:normalizePhone(c&&c.tel||""),
      firma:c&&c.firma||"",
      vergiNo:c&&c.vergiNo||"",
      vergiDairesi:c&&c.vergiDairesi||"",
      iskonto:parseFloat(c&&c.iskonto||0)||0
    };
  });
}
function currentCustomer(){
  var clean=normalizePhone(g("custPhone")&&g("custPhone").value||"");
  if(!clean)return null;
  return sanitizedCustomers().find(function(c){ return c.tel===clean; })||null;
}
function orderTotals(){
  var subtotal=0;
  Object.keys(cart).forEach(function(id){
    var item=cart[id];
    subtotal+=(parseFloat(item.product&&item.product.price||0)||0)*(parseInt(item.qty,10)||0);
  });
  var customer=currentCustomer();
  var discountRate=customer?Math.max(0,parseFloat(customer.iskonto||0)||0):0;
  var discount=subtotal*discountRate/100;
  var discountedSubtotal=Math.max(0,subtotal-discount);
  var inv=g("wantInvoice").checked;
  var vat=inv?discountedSubtotal*0.2:0;
  return {subtotal:subtotal,discountRate:discountRate,discount:discount,discountedSubtotal:discountedSubtotal,vat:vat,total:discountedSubtotal+vat,customer:customer};
}
function cloudReady(cfg){
  return !!(cfg&&cfg.supabaseUrl&&cfg.supabaseAnonKey&&cfg.table&&cfg.rowId);
}
function cloudBaseUrl(cfg){
  return String(cfg&&cfg.supabaseUrl||"").replace(/\/+$/,"");
}
function cloudHeaders(cfg){
  return {
    "Content-Type":"application/json",
    "apikey":cfg&&cfg.supabaseAnonKey||"",
    "Authorization":"Bearer "+(cfg&&cfg.supabaseAnonKey||""),
    "Cache-Control":"no-store"
  };
}
function cloudTableUrl(cfg){
  return cloudBaseUrl(cfg)+"/rest/v1/"+encodeURIComponent(cfg.table);
}
function cloudRowUrl(cfg){
  return cloudTableUrl(cfg)+"?id=eq."+encodeURIComponent(cfg.rowId)+"&select=id,payload,updated_at";
}
function setCatalogStatus(message,isError){
  var el=g("products");
  if(!el)return;
  el.innerHTML=message?"<div class='empty-msg' style='color:"+(isError?"#b24d3f":"inherit")+"'>"+message+"</div>":"";
}
function renderCatalogUi(){
  renderLogo();
  autofill(true);
  renderGroups();
  renderTypes();
  renderProducts();
  renderCart();
  setCatalogStatus("",false);
}
function updateCustomerPanelState(){
  var btn=g("sendBtn");
  if(btn)btn.disabled=!catalogReady||catalogBusy;
}
function clearCustomerFields(){
  g("custName").value="";
  g("custFirm").value="";
  g("custTaxNo").value="";
  g("custTaxOffice").value="";
}
function clearCatalogState(message){
  catalogReady=false;
  DATA={};
  CUSTOMERS=[];
  WA="";
  LOGO="";
  activeGroup="";
  activeType="";
  renderLogo();
  renderGroups();
  renderTypes();
  renderProducts();
  renderCart();
  setCatalogStatus(message||"Güncel katalog yüklenemedi. Lütfen daha sonra tekrar deneyin.",true);
  updateCustomerPanelState();
}
function applyCatalogPayload(payload,label){
  var normalized=payload&&payload.data&&payload.groupCount!=null&&payload.productCount!=null?payload:normalizeCatalogPayload(payload);
  if(!normalized||normalized.productCount<=0){
    console.warn("ASTERA customer catalog rejected",label||"unknown",normalized?{groups:normalized.groupCount,products:normalized.productCount}:null);
    return false;
  }
  if(normalized.wa!=null)WA=normalized.wa||"";
  if(normalized.logo!=null)LOGO=normalized.logo||"";
  CUSTOMERS=Array.isArray(normalized.customers)?normalized.customers:[];
  DATA=sanitizeCatalogData(normalized.data||{});
  catalogReady=normalized.productCount>0;
  lastCatalogRevision=normalized.revision||lastCatalogRevision;
  console.info("ASTERA customer catalog applied",label||"unknown",{groups:normalized.groupCount,products:normalized.productCount});
  if(catalogReady){
    if(!activeGroup||!DATA[activeGroup])activeGroup=Object.keys(DATA)[0]||"";
    if(activeGroup){
      var nextTypes=Object.keys((DATA[activeGroup]&&DATA[activeGroup].cats)||{});
      if(!activeType||nextTypes.indexOf(activeType)<0){
        activeType=nextTypes.find(function(t){return ((DATA[activeGroup].cats||{})[t]||[]).length>0;})||nextTypes[0]||"";
      }
    }
  }
  return catalogReady;
}
async function fetchCloudPayload(cfg){
  if(!cloudReady(cfg))return null;
  var url=cloudRowUrl(cfg);
  console.info("ASTERA customer catalog fetch",url);
  var res=await fetch(url,{method:"GET",headers:cloudHeaders(cfg),cache:"no-store"});
  console.info("ASTERA customer catalog response",url,res.status);
  if(!res.ok)throw new Error("HTTP "+res.status);
  var raw=await res.json();
  var row=Array.isArray(raw)?(raw[0]||null):raw;
  console.info("ASTERA customer catalog row",url,{hasRow:!!row,hasPayload:!!(row&&row.payload),shape:Array.isArray(raw)?"array":"object"});
  return row;
}
async function upsertCloudPayload(cfg,payload){
  if(!cloudReady(cfg))return false;
  var headers=cloudHeaders(cfg);
  headers["Prefer"]="resolution=merge-duplicates,return=representation";
  var stampedAt=payload&&payload.updated_at||new Date().toISOString();
  var body={id:cfg.rowId,payload:Object.assign({},payload,{updated_at:stampedAt}),updated_at:stampedAt};
  var res=await fetch(cloudTableUrl(cfg),{method:"POST",headers:headers,body:JSON.stringify(body),cache:"no-store"});
  if(!res.ok)throw new Error("HTTP "+res.status);
  var raw=await res.json().catch(function(){return [];});
  return Array.isArray(raw)?(raw[0]||null):raw;
}
async function loadCatalog(force){
  if(!cloudReady(CLOUD_PUBLIC)){
    console.warn("ASTERA customer catalog cloud config missing");
    clearCatalogState("Güncel katalog yüklenemedi. Lütfen daha sonra tekrar deneyin.");
    return false;
  }
  if(catalogBusy&&!force)return false;
  catalogBusy=true;
  updateCustomerPanelState();
  try{
    setCatalogStatus("Güncel katalog yükleniyor...",false);
    var row=await fetchCloudPayload(CLOUD_PUBLIC);
    var normalized=normalizeCatalogPayload(row);
    console.info("ASTERA customer catalog normalize summary",{groups:normalized&&normalized.groupCount||0,products:normalized&&normalized.productCount||0,updatedAt:normalized&&normalized.updatedAt||String(row&&row&&((row.updatedAt||row.updated_at)||""))});
    if(!normalized)throw new Error("Katalog satiri bulunamadi");
    if(normalized.productCount<=0)throw new Error("Katalogta urun bulunamadi");
    var updated=String(normalized.updatedAt||row&&row.updated_at||row&&row.updatedAt||"");
    if(!force&&catalogReady&&updated&&updated===lastRemoteUpdatedAt&&normalized.revision===lastCatalogRevision)return false;
    lastRemoteUpdatedAt=updated||lastRemoteUpdatedAt;
    lastCatalogRevision=normalized.revision||lastCatalogRevision;
    if(!applyCatalogPayload(normalized,"cloud"))throw new Error("Katalog normalize edilemedi");
    renderCatalogUi();
    return true;
  }catch(e){
    console.error("ASTERA customer catalog load failed",e);
    clearCatalogState("Güncel katalog yüklenemedi. Lütfen daha sonra tekrar deneyin.");
    return false;
  }finally{
    catalogBusy=false;
    updateCustomerPanelState();
  }
}

  return {

async function appendOrderToCloud(cfg,order){
  if(!cloudReady(cfg))throw new Error("Sipariş kaydı için bulut ayarları eksik.");
  for(var attempt=0;attempt<2;attempt++){
    var row=await fetchCloudPayload(cfg);
    var payload=row&&row.payload&&typeof row.payload==="object"?row.payload:{};
    if(!payload||typeof payload!=="object")payload={};
    var orders=Array.isArray(payload.orders)?payload.orders.slice():[];
    if(orders.some(function(x){return x&&x.id===order.id;}))return true;
    var baseRevision=parseInt(payload.revision,10)||0;
    var stampedAt=new Date().toISOString();
    await upsertCloudPayload(cfg,Object.assign({},payload,{orders:orders.concat([order]),revision:baseRevision+1,updated_at:stampedAt}));
    var verify=await fetchCloudPayload(cfg);
    var verifyPayload=verify&&verify.payload&&typeof verify.payload==="object"?verify.payload:{};
    if(Array.isArray(verifyPayload.orders)&&verifyPayload.orders.some(function(x){return x&&x.id===order.id;}))return true;
    if((parseInt(verifyPayload.revision,10)||0)>baseRevision)throw new Error("Sipariş kaydı sırasında veri güncellendi, lütfen tekrar deneyin.");
  }
  throw new Error("Sipariş kaydı tamamlanamadı.");
}
async function submitOrderToPanels(order){

    var grp=DATA[gk]||{};
    Object.keys(grp.cats||{}).forEach(function(type){
      (grp.cats[type]||[]).forEach(function(p){
        if(!p||typeof p!=="object")return;
        var item=Object.assign({},p);
        item.groupKey=gk;
        item.groupLabel=grp.label||gk;
        item.type=type;
        out.push(item);
      });
    });
  });
  return out;
}

function buildMessage(){

  var msg="ASTERA YENİ SİPARİŞ\\n";
  msg+="Tarih: "+fmtDate()+"\\n";
  msg+="Müşteri: "+(g("custName").value||g("custFirm").value||"Belirtilmedi")+"\\n";
  if(g("custPhone").value)msg+="Cari Kod / Telefon: "+g("custPhone").value+"\\n";
  if(g("custFirm").value)msg+="Firma: "+g("custFirm").value+"\\n";
  if(inv){
    msg+="Fatura: Evet\\n";
    if(g("custTaxNo").value)msg+="Vergi No: "+g("custTaxNo").value+"\\n";
    if(g("custTaxOffice").value)msg+="Vergi Dairesi: "+g("custTaxOffice").value+"\\n";
  }
  msg+="─────────────────\\n";
  ids.forEach(function(id){
    var item=cart[id],line=(item.product.price||0)*item.qty;
    var inStock=item.product.stock!==false&&(item.product.stokAdet==null||item.product.stokAdet>0);
    msg+=item.product.mann+" × "+item.qty+" = "+money(line)+(inStock?"":" ⚠ Termin?")+"\\n";
  });
  msg+="─────────────────\\n";
  msg+="Ara Toplam: "+money(totals.subtotal)+"\\n";
  if(totals.discountRate>0){
    msg+="Özel İskonto (%"+totals.discountRate.toLocaleString("tr-TR",{minimumFractionDigits:0,maximumFractionDigits:2})+"): -"+money(totals.discount)+"\\n";
    msg+="İskontolu Ara Toplam: "+money(totals.discountedSubtotal)+"\\n";
  }
  if(inv)msg+="KDV %20: "+money(totals.vat)+"\\n";
  msg+="GENEL TOPLAM: "+money(totals.total);
  return msg;
}

async function sendOrder(){
  if(!Object.keys(cart).length){alert("Önce ürün ekleyin.");return;}
  if(!catalogReady||!cloudReady(CLOUD_PUBLIC)||!cloudReady(CLOUD_ADMIN)){alert("Sipariş kaydı şu anda kullanılamıyor. Lütfen daha sonra tekrar deneyin.");return;}
  if(!WA){alert("WhatsApp numarası tanımlı değil.");return;}
  if(!g("custPhone").value||(!g("custName").value&&!g("custFirm").value)){alert("Lütfen müşteri telefonu ve ad/firma bilgisini girin.");return;}
  var order=makeOrderPayload();
  var message=buildMessage();
  var btn=g("sendBtn");
  var oldText=btn.innerHTML;
  btn.disabled=true;
  btn.textContent="Sipariş kaydediliyor...";
  try{
    await loadCatalog(true);
    if(!catalogReady)throw new Error("Güncel katalog yüklenemedi. Lütfen daha sonra tekrar deneyin.");
    await submitOrderToPanels(order);
    cart={};
    renderProducts();
    renderCart();
    alert("Sipariş yönetici paneline kaydedildi.");
    window.open("https://wa.me/"+WA+"?text="+encodeURIComponent(message),"_blank");
  }catch(err){
    alert((err&&err.message)||"Sipariş panel kaydı başarısız oldu.");
  }finally{
    btn.disabled=false;
    btn.innerHTML=oldText;
    updateCustomerPanelState();
  }
}

  function esc(v){

  function todayISO(){

function cloudReady(){return !!(APP_SETTINGS.supabaseUrl&&APP_SETTINGS.supabaseAnonKey&&APP_SETTINGS.supabaseTable&&APP_SETTINGS.supabaseRowId);}
function cloudBaseUrl(){return String(APP_SETTINGS.supabaseUrl||"").replace(/\/+$/,"");}
// _ts query param removed because Supabase row filters were returning HTTP 400 in startup pulls.
function cloudRestRowUrl(){return cloudBaseUrl()+"/rest/v1/"+encodeURIComponent(APP_SETTINGS.supabaseTable)+"?id=eq."+encodeURIComponent(APP_SETTINGS.supabaseRowId);}
function cloudHeaders(){
  return {
    "Content-Type":"application/json",
    "apikey":APP_SETTINGS.supabaseAnonKey||"",
    "Authorization":"Bearer "+(APP_SETTINGS.supabaseAnonKey||""),
    "Cache-Control":"no-store"
  };
}
function formatCloudDateTime(value){
  if(!value)return "Henüz yok";
  var dt=new Date(value);
  if(isNaN(+dt))return String(value).replace("T"," ").slice(0,19);
  return dt.toLocaleString("tr-TR",{dateStyle:"short",timeStyle:"medium"});
}
function updateCloudSyncLabel(adminUpdatedAt,publicUpdatedAt){
  var parts=[];
  if(publicUpdatedAt)parts.push("Sipariş paneli: "+formatCloudDateTime(publicUpdatedAt));
  if(adminUpdatedAt)parts.push("Yönetici: "+formatCloudDateTime(adminUpdatedAt));
  var text=parts.join(" | ")||formatCloudDateTime(APP_SETTINGS.lastCloudSyncAt||"");
  if(g("cloudLastSync"))g("cloudLastSync").textContent=text;
  if(adminUpdatedAt)ASTERA_SYNC_STATE.lastPulledAdminAt=adminUpdatedAt;
  if(publicUpdatedAt)ASTERA_SYNC_STATE.lastPulledPublicAt=publicUpdatedAt;
  APP_SETTINGS.lastCloudSyncAt=publicUpdatedAt||adminUpdatedAt||APP_SETTINGS.lastCloudSyncAt||"";
  try{localStorage.setItem(K.settings,JSON.stringify(APP_SETTINGS));}catch(e){}
}
async function fetchCloudRowMeta(table,rowId){
  if(!APP_SETTINGS.supabaseUrl||!APP_SETTINGS.supabaseAnonKey||!table||!rowId)return null;
  var url=cloudBaseUrl()+"/rest/v1/"+encodeURIComponent(table)+"?id=eq."+encodeURIComponent(rowId)+"&select=updated_at";
  var res=await fetch(url,{method:"GET",headers:cloudHeaders(),cache:"no-store"});
  if(!res.ok)throw new Error("HTTP "+res.status);
  var raw=await res.json();
  return raw&&raw[0]?raw[0]:null;
}
async function refreshCloudSyncStatus(silent){
  if(!APP_SETTINGS.supabaseUrl||!APP_SETTINGS.supabaseAnonKey){
    if(g("cloudLastSync"))g("cloudLastSync").textContent="Supabase ayarları girilmedi";
    return null;
  }
  try{
    var results=await Promise.allSettled([
      fetchCloudRowMeta(APP_SETTINGS.supabaseTable,APP_SETTINGS.supabaseRowId),
      fetchCloudRowMeta(APP_SETTINGS.publicCatalogTable,APP_SETTINGS.publicCatalogRowId)
    ]);
    var adminRow=results[0].status==="fulfilled"?results[0].value:null;
    var publicRow=results[1].status==="fulfilled"?results[1].value:null;
    updateCloudSyncLabel(adminRow&&adminRow.updated_at||"",publicRow&&publicRow.updated_at||"");
    return {admin:adminRow,public:publicRow};
  }catch(e){
    if(!silent&&g("cloudLastSync"))g("cloudLastSync").textContent="Bulut zamanı okunamadı";
    return null;
  }
}
async function cloudPushNow(silent){
  if(!cloudReady()){return;}
  if(!ASTERA_SYNC_STATE.initialCloudPullCompleted){
    return;
  }
  if(ASTERA_RUNTIME_FLAGS.startupCloudHydrating||ASTERA_RUNTIME_FLAGS.applyingRemoteSnapshot||ASTERA_RUNTIME_FLAGS.initializingFromCloud||cloudPullBusy){
    return;
  }
  if(ASTERA_SYNC_STATE.pushBusy){
    ASTERA_SYNC_STATE.pendingPush=true;
    return;
  }
  ASTERA_SYNC_STATE.pushBusy=true;
  try{
    var meta=await refreshCloudSyncStatus(true);
    var remoteAdminAt=meta&&meta.admin&&meta.admin.updated_at||"";
    var remotePublicAt=meta&&meta.public&&meta.public.updated_at||"";
    if((remoteAdminAt&&isRemoteNewer(remoteAdminAt,ASTERA_SYNC_STATE.localDirtyAt))||(remotePublicAt&&isRemoteNewer(remotePublicAt,ASTERA_SYNC_STATE.localDirtyAt))){
      ASTERA_SYNC_STATE.pendingPush=false;
      await cloudPullNow(true);
      if(!silent)notif("Bulutta daha yeni veri bulundu, once buluttan guncel veri alindi","grn");
      return;
    }
    var adminSnapshot=currentAdminSnapshot();
    var adminHash=adminSnapshot&&adminSnapshot._meta&&adminSnapshot._meta.hash||"";
    var publicSnapshot=currentPublicCatalogSnapshot();
    var publicHash=publicSnapshot&&publicSnapshot._meta&&publicSnapshot._meta.hash||"";
    if(adminHash&&publicHash&&adminHash===ASTERA_SYNC_STATE.lastPushedAdminHash&&publicHash===ASTERA_SYNC_STATE.lastPushedPublicHash&&!ASTERA_SYNC_STATE.localDirtyAt){
      return;
    }
    if(adminHash&&publicHash&&adminHash===ASTERA_SYNC_STATE.lastPulledAdminHash&&publicHash===ASTERA_SYNC_STATE.lastPulledPublicHash&&!ASTERA_SYNC_STATE.localDirtyAt){
      return;
    }
    adminSnapshot.orders=filterDeletedOrders((ls(K.orders,[])||[]).slice());
    var payload={id:APP_SETTINGS.supabaseRowId,payload:adminSnapshot,updated_at:new Date().toISOString()};
    var headers=cloudHeaders();
    headers["Prefer"]="resolution=merge-duplicates,return=representation";
    var res=await fetch(cloudBaseUrl()+"/rest/v1/"+encodeURIComponent(APP_SETTINGS.supabaseTable),{method:"POST",headers:headers,body:JSON.stringify(payload),cache:"no-store"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    var adminRaw=await res.json().catch(function(){return [];});
    var verifyAdmin=await fetch(cloudRestRowUrl()+"&select=updated_at",{method:"GET",headers:cloudHeaders(),cache:"no-store"});
    if(!verifyAdmin.ok)throw new Error("HTTP "+verifyAdmin.status);
    var publicPayload={id:APP_SETTINGS.publicCatalogRowId,payload:publicSnapshot,updated_at:new Date().toISOString()};
    var publicRes=await fetch(cloudBaseUrl()+"/rest/v1/"+encodeURIComponent(APP_SETTINGS.publicCatalogTable),{method:"POST",headers:headers,body:JSON.stringify(publicPayload),cache:"no-store"});
    if(!publicRes.ok)throw new Error("HTTP "+publicRes.status);
    var publicRaw=await publicRes.json().catch(function(){return [];});
    var verifyPublic=await fetch(cloudBaseUrl()+"/rest/v1/"+encodeURIComponent(APP_SETTINGS.publicCatalogTable)+"?id=eq."+encodeURIComponent(APP_SETTINGS.publicCatalogRowId)+"&select=updated_at",{method:"GET",headers:cloudHeaders(),cache:"no-store"});
    if(!verifyPublic.ok)throw new Error("HTTP "+verifyPublic.status);
    updateCloudSyncLabel(
      adminRaw&&adminRaw[0]&&adminRaw[0].updated_at||payload.updated_at,
      publicRaw&&publicRaw[0]&&publicRaw[0].updated_at||publicPayload.updated_at
    );
    ASTERA_SYNC_STATE.lastPushedAdminAt=adminRaw&&adminRaw[0]&&adminRaw[0].updated_at||payload.updated_at;
    ASTERA_SYNC_STATE.lastPushedPublicAt=publicRaw&&publicRaw[0]&&publicRaw[0].updated_at||publicPayload.updated_at;
    ASTERA_SYNC_STATE.lastPushedAdminHash=adminHash;
    ASTERA_SYNC_STATE.lastPushedPublicHash=publicHash;
    ASTERA_SYNC_STATE.localDirtyAt="";
    if(!silent)notif("Buluta gonderildi","grn");
  }catch(e){
    var msg=(e&&e.message)||String(e)||"Bilinmeyen hata";
    if(!silent)notif("Bulut senkronu basarisiz: "+msg,"red");
  }finally{
    ASTERA_SYNC_STATE.pushBusy=false;
    if(ASTERA_SYNC_STATE.pendingPush){
      ASTERA_SYNC_STATE.pendingPush=false;
      clearTimeout(cloudSyncTimer);
      cloudSyncTimer=setTimeout(function(){cloudPushNow(true);},200);
    }
  }
}
var cloudPullBusy=false;
async function cloudPullNow(silent){
  if(!cloudReady()){if(!silent)notif("Supabase ayarlari gerekli","red");return;}
  if(cloudPullBusy)return;
  cloudPullBusy=true;
  try{
    var startupMode=!!ASTERA_RUNTIME_FLAGS.startupCloudHydrating;
    var res=await fetch(cloudRestRowUrl()+"&select=payload,updated_at",{method:"GET",headers:cloudHeaders(),cache:"no-store"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    var raw=await res.json();
    if(!raw||!raw.length||!raw[0].payload){throw new Error("Bulutta kayit bulunamadi");}
    var remoteAdminUpdatedAt=raw[0].updated_at||"";
    if(!startupMode){
      if(hasRecentLocalMutation())return;
      if(ASTERA_SYNC_STATE.localDirtyAt&&remoteAdminUpdatedAt&&!isRemoteNewer(remoteAdminUpdatedAt,ASTERA_SYNC_STATE.localDirtyAt))return;
    }
    applyRemoteSnapshot(raw[0].payload,remoteAdminUpdatedAt,APP_SETTINGS.lastCloudSyncAt||"");
    updateCloudSyncLabel(raw[0].updated_at||"",APP_SETTINGS.lastCloudSyncAt||"");
    refreshCloudSyncStatus(true);
    if(startupMode)ASTERA_SYNC_STATE.initialCloudPullCompleted=true;
    if(!silent)notif("Buluttaki son veriler yuklendi","grn");
  }catch(e){
    var msg=(e&&e.message)||String(e)||"Bilinmeyen hata";
    if(ASTERA_RUNTIME_FLAGS.startupCloudHydrating)ASTERA_SYNC_STATE.initialCloudPullCompleted=false;
    if(!silent)notif("Buluttan veri alinamadi: "+msg,"red");
    throw e;
  }finally{
    cloudPullBusy=false;
    if(ASTERA_SYNC_STATE.pendingPush&&!ASTERA_RUNTIME_FLAGS.startupCloudHydrating&&ASTERA_SYNC_STATE.initialCloudPullCompleted){
      ASTERA_SYNC_STATE.pendingPush=false;
      clearTimeout(cloudSyncTimer);
      cloudSyncTimer=setTimeout(function(){cloudPushNow(true);},200);
    }
  }
}
function mergeIncomingOrders(remoteOrders){
  var localOrders=ls(K.orders,[])||[];
  var deleted={};
  getDeletedOrderIds().forEach(function(id){deleted[id]=true;});
  var byId={};
  localOrders.forEach(function(order){
    if(order&&order.id)byId[order.id]=order;
  });
  var added=0;
  (remoteOrders||[]).forEach(function(order){
    if(!order||!order.id)return;
    if(deleted[order.id])return;
    if(byId[order.id])return;
    localOrders.push(order);
    byId[order.id]=order;
    added++;
  });
  if(added){
    lsSave(K.orders,localOrders);
    checkOrders();
  }
  return added;
}
async function pullIncomingOrdersFromCloud(silent){
  if(!cloudReady())return 0;
  try{
    var res=await fetch(cloudRestRowUrl()+"&select=payload",{method:"GET",headers:cloudHeaders()});
    if(!res.ok)throw new Error("HTTP "+res.status);
    var raw=await res.json();
    var payload=raw&&raw[0]&&raw[0].payload||null;
    var added=mergeIncomingOrders(payload&&payload.orders||[]);
    if(added&&!silent)notif(added+" yeni sipariş buluttan alındı","grn");
    return added;
  }catch(e){
    if(!silent){
      var msg=(e&&e.message)||String(e)||"Bilinmeyen hata";
      notif("Yeni siparişler alınamadı: "+msg,"red");
    }
    return 0;
  }
}

function peekNextTeslimNo(arr){
  var maxNo=0;
  (arr||[]).forEach(function(t){
    if(t.belgeNo){var n=parseInt((t.belgeNo+"").replace(/[^0-9]/g,""),10)||0;if(n>maxNo)maxNo=n;}
  });
  return "TB-"+String(maxNo+1).padStart(4,"0");
}
function syncTeslimlerFromSatis(){

function normalizeCustomerToken(v){
  return String(v==null?"":v)
    .toLocaleLowerCase("tr-TR")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9\u00e7\u011f\u0131\u00f6\u015f\u00fc]+/g,"");
}
function normalizePhoneNumber(v){
  var digits=String(v==null?"":v).replace(/\D/g,"");
  if(digits.indexOf("90")===0&&digits.length===12)digits=digits.slice(2);
  if(digits.indexOf("0")===0&&digits.length===11)digits=digits.slice(1);
  return digits;
}
function customerIdentityKeys(v){
  var raw=String(v==null?"":v).trim();
  if(!raw)return [];
  var out=[raw];
  var compact=raw.replace(/\s+/g," ").trim();
  if(compact!==raw)out.push(compact);
  var noParens=raw.replace(/\([^)]*\)/g," ").replace(/\s+/g," ").trim();
  if(noParens&&out.indexOf(noParens)<0)out.push(noParens);
  var norm=normalizeCustomerToken(raw);
  if(norm&&out.indexOf(norm)<0)out.push(norm);
  return out.filter(Boolean);
}
function getCustomerAliases(mu){
  if(!mu)return [];
  var vals=[mu.ad,mu.firma,mu.tel].concat(mu.aliaslar||[]);
  var map={};
  vals.forEach(function(v){
    customerIdentityKeys(v).forEach(function(key){ map[key]=true; });
  });
  return Object.keys(map);
}
function findCustomerByIdentity(input){
  var keys=customerIdentityKeys(input);
  if(!keys.length)return null;
  for(var i=0;i<MUSTERILER.length;i++){
    var mu=MUSTERILER[i];
    var aliases=getCustomerAliases(mu);
    for(var j=0;j<keys.length;j++){
      var key=keys[j];
      if(aliases.indexOf(key)>=0)return mu;
      if(key&&aliases.some(function(alias){ return alias&&((alias.indexOf(key)>=0&&key.length>=6)||(key.indexOf(alias)>=0&&alias.length>=6)); }))return mu;
    }
  }
  return null;
}
function customerMatchesIdentity(mu,input){
  if(!mu)return false;
  var found=findCustomerByIdentity(input);
  return !!found&&found.id===mu.id;
}

function buildSaleRecord(args){
  var p=args.product||findByMann(args.mann)||null;
  var qty=Math.max(1,parseInt(args.qty,10)||1);
  var unitPrice=parseFloat(args.unitPrice)||0;
  var kdvR=parseFloat(args.kdvOrani)||0;
  var iskontoOrani=Math.max(0,Math.min(100,parseFloat(args.iskontoOrani)||0));
  var unitCost=getProductUnitCost(p);
  var brutRevenue=unitPrice*qty;
  var iskontoTutari=brutRevenue*iskontoOrani/100;
  var netRevenue=Math.max(0,brutRevenue-iskontoTutari);
  return {
    id:args.id||uid(),
    tarih:args.tarih||today(),
    musteri:args.musteri||"Belirtilmedi",
    mann:args.mann||(p?p.mann:""),
    adet:qty,
    fiyat:unitPrice,
    maliyet:unitCost,
    araToplam:brutRevenue,
    iskontoOrani:iskontoOrani,
    iskontoTutari:iskontoTutari,
    toplam:netRevenue*(1+kdvR),
    kar:netRevenue-(unitCost*qty),
    kdvOrani:kdvR
  };
}
function getSaleGuardResult(customerName,product,qty,unitPrice){
  qty=Math.max(0,parseInt(qty,10)||0);
  unitPrice=parseFloat(unitPrice)||0;
  var iskontoOrani=Math.max(0,Math.min(100,parseFloat(arguments[4])||0));
  var brutRevenue=unitPrice*qty;
  var iskontoTutari=brutRevenue*iskontoOrani/100;
  var revenue=Math.max(0,brutRevenue-iskontoTutari);
  var unitCost=getProductUnitCost(product);
  var costTotal=unitCost*qty;
  var profit=revenue-costTotal;
  var marginPct=revenue?((profit/revenue)*100):0;
  var limit=getCustomerCreditLimit(customerName);
  var currentRisk=getCustomerOpenRisk(customerName);
  var projectedRisk=currentRisk+revenue;
  return {
    musteri:customerName,
    mann:product&&product.mann?product.mann:"",
    qty:qty,
    unitPrice:unitPrice,
    iskontoOrani:iskontoOrani,
    iskontoTutari:iskontoTutari,
    brutRevenue:brutRevenue,
    revenue:revenue,
    unitCost:unitCost,
    costTotal:costTotal,
    profit:profit,
    marginPct:marginPct,
    limit:limit,
    currentRisk:currentRisk,
    projectedRisk:projectedRisk,
    negativeMargin:profit<0,
    lowMargin:marginPct<FINANS_POLICY.minMarginPct,
    limitExceeded:limit>0&&projectedRisk>(limit+0.0001)
  };
}
function evaluateBatchSale(customerName,rows){
  var currentRisk=getCustomerOpenRisk(customerName);
  var limit=getCustomerCreditLimit(customerName);
  var totalRevenue=0;
  var negativeItems=[];
  var lowMarginItems=[];
  (rows||[]).forEach(function(row){
    var product=row.product||findByMann(row.mann)||null;
    var r=getSaleGuardResult(customerName,product,row.qty,row.unitPrice,row.iskontoOrani);
    r.mann=row.mann||(product?product.mann:"");
    totalRevenue+=r.revenue;
    if(r.negativeMargin)negativeItems.push(r);
    else if(r.lowMargin)lowMarginItems.push(r);
  });
  var projectedRisk=currentRisk+totalRevenue;
  return {
    musteri:customerName,
    currentRisk:currentRisk,
    limit:limit,
    totalRevenue:totalRevenue,
    projectedRisk:projectedRisk,
    limitExceeded:limit>0&&projectedRisk>(limit+0.0001),
    negativeItems:negativeItems,
    lowMarginItems:lowMarginItems
  };
}
function confirmBatchSaleGuard(summary){
  if(summary.negativeItems.length&&FINANS_POLICY.blockNegativeMargin){
    notif("Zararına satış engellendi: "+summary.negativeItems.map(function(x){return x.mann||"-";}).join(", "),"red");
    return false;
  }
  if(summary.lowMarginItems.length){
    var lowMsg="Düşük marjlı ürünler var:\n"+summary.lowMarginItems.map(function(x){
      return "- "+(x.mann||"-")+" | Marj %"+fmt(x.marginPct);
    }).join("\n")+"\n\nDevam edilsin mi?";
    if(!confirm(lowMsg))return false;
  }
  if(summary.limitExceeded){
    var limMsg="Müşteri kredi limiti aşılacak.\n\n"
      +"Müşteri: "+summary.musteri+"\n"
      +"Mevcut Risk: "+fmt(summary.currentRisk)+"₺\n"
      +"Yeni Satış: "+fmt(summary.totalRevenue)+"₺\n"
      +"Projeksiyon: "+fmt(summary.projectedRisk)+"₺\n"
      +"Limit: "+fmt(summary.limit)+"₺\n\n"
      +"Yine de devam edilsin mi?";
    if(!confirm(limMsg))return false;
  }
  return true;
}

function formatIncomingOrderDateTime(v){
  if(!v)return "-";
  var d=new Date(v);
  if(isNaN(+d))return fD(v);
  return d.toLocaleString("tr-TR",{dateStyle:"short",timeStyle:"short"});
}

async function removeOrderFromCloudById(cfg,orderId){
  if(!orderId||!cfg||!cfg.supabaseUrl||!cfg.supabaseAnonKey||!cfg.table||!cfg.rowId)return false;
  try{
    var payload=await fetchCloudPayload(cfg)||{};
    var before=Array.isArray(payload.orders)?payload.orders:[];
    payload.orders=before.filter(function(order){return !(order&&order.id===orderId);});
    if(payload.orders.length===before.length)return true;
    await upsertCloudPayload(cfg,payload);
    return true;
  }catch(e){
    return false;
  }
}

function removeIncomingOrderEverywhere(orderId){
  if(!orderId)return;
  markOrderDeleted(orderId);
  Promise.allSettled([
    removeOrderFromCloudById({
      supabaseUrl:APP_SETTINGS.supabaseUrl||"",
      supabaseAnonKey:APP_SETTINGS.supabaseAnonKey||"",
      table:APP_SETTINGS.supabaseTable||"app_state",
      rowId:APP_SETTINGS.supabaseRowId||"main"
    },orderId),
    removeOrderFromCloudById({
      supabaseUrl:APP_SETTINGS.supabaseUrl||"",
      supabaseAnonKey:APP_SETTINGS.supabaseAnonKey||"",
      table:APP_SETTINGS.publicCatalogTable||"customer_catalog",
      rowId:APP_SETTINGS.publicCatalogRowId||"main_catalog"
    },orderId)
  ]).finally(function(){
    if(typeof queueDataPersistence==="function")queueDataPersistence();
    if(typeof cloudPushNow==="function")cloudPushNow(true);
  });
}

function _readOrderQtys(idx,items){
  return (items||[]).map(function(it,ii){
    var el=document.getElementById("ord_qty_"+idx+"_"+ii);
    var teslimQty=el?Math.max(0,parseInt(el.value)||0):it.qty||0;
    return {mann:it.mann,name:it.name,oem:it.oem,fiyat:it.fiyat,orderedQty:it.qty||0,deliveredQty:teslimQty,toplam:it.fiyat*(teslimQty)};
  });
}

function importOrderToCari(idx,musteriObj){
  var orders=ls(K.orders,[]);
  var o=orders[idx];
  var musteriAd=musteriObj.ad;
  var items=_readOrderQtys(idx,o.items);
  var delivered=items.filter(function(x){return x.deliveredQty>0;});
  var notDelivered=items.filter(function(x){return x.deliveredQty<x.orderedQty;});

  if(!delivered.length){notif("Teslim edilecek ürün miktarı giriniz","red");return;}
  var summary=evaluateBatchSale(musteriAd,delivered.map(function(it){
    return {mann:it.mann,product:findByMann(it.mann),qty:it.deliveredQty,unitPrice:it.fiyat};
  }));
  if(!confirmBatchSaleGuard(summary))return;
  delivered.forEach(function(it){
    var p=findByMann(it.mann);
    SATIS.push(buildSaleRecord({tarih:o.tarih,musteri:musteriAd,mann:it.mann,qty:it.deliveredQty,unitPrice:it.fiyat||0,kdvOrani:0,product:p}));
  });
  lsSave(K.satis,SATIS);
  if(window.AppState){AppState.set("satis",SATIS);AppState.save("satis");}

  // Eksik/bekleyen kalan kısımları kaydet
  if(notDelivered.length){
    notDelivered.forEach(function(it){
      var bekQty=it.orderedQty-it.deliveredQty;
      if(bekQty>0){
        BEKLEYEN_SIP.push({id:uid(),tarih:o.tarih,musteri:musteriAd,mann:it.mann,name:it.name,fiyat:it.fiyat,bekleyenAdet:bekQty,kaynakSiparisId:o.id||"",orijinalAdet:it.orderedQty});
      }
    });
    lsSave(K.bekleyenSiparisler,BEKLEYEN_SIP);
    if(window.AppState){AppState.set("bekleyenSiparisler",BEKLEYEN_SIP);AppState.save("bekleyenSiparisler");}
    // Müşteri cari hesabına "bekleyen sipariş" notu
    CARI.push({id:uid(),tarih:o.tarih,musteri:musteriAd,tip:"BEKLEYENSİPARİŞ",tutar:0,aciklama:"Bekleyen: "+notDelivered.map(function(x){return x.mann+" ("+( x.orderedQty-x.deliveredQty)+" adet)";}).join(", ")});
    lsSave(K.cari,CARI);
    if(window.AppState){AppState.set("cari",CARI);AppState.save("cari");}
  }

  orders.splice(idx,1);
  if(o&&o.id)markOrderDeleted(o.id);
  lsSave(K.orders,orders);
  if(window.AppState){AppState.set("orders",orders);AppState.save("orders");}
  removeIncomingOrderEverywhere(o.id||"");
  syncTeslimlerFromSatis();
  if(window.AppState){AppState.set("teslimler",TESLIMLER);AppState.save("teslimler");}
  if(typeof queueDataPersistence==="function")queueDataPersistence();
  closeModal();
  checkOrders();
  var msg="✅ "+delivered.length+" ürün cari hesaba aktarıldı.";
  if(notDelivered.length)msg+=" ⚠ "+notDelivered.length+" ürün bekleyende.";
  notif(msg,"grn");
  if(curPage==="siparisler"||curPage==="cari")renderPage(curPage);
}

function updateEditSipTotals(){

function saveEditSip(id){
  var s=SATIS.find(function(x){return x.id===id;});
  if(!s)return;
  var m=g("es_m").value;
  var t=g("es_t").value;
  var mn=g("es_mn").value;
  var a=parseInt(g("es_a").value)||1;
  var f=parseFloat(g("es_f").value)||0;
  var kdvR=parseFloat(g("es_kdv").value)||0;
  var iskR=Math.max(0,Math.min(100,parseFloat(g("es_isk")&&g("es_isk").value)||0));
  var p=findByMann(mn);
  var summary=evaluateBatchSale(m,[{mann:mn,product:p,qty:a,unitPrice:f,iskontoOrani:iskR}]);
  if(s.musteri===m){
    var oldAra=(parseFloat(s.araToplam)||((parseFloat(s.fiyat)||0)*(parseInt(s.adet)||0)));
    var oldIsk=(parseFloat(s.iskontoTutari)||0);
    var oldNet=Math.max(0,oldAra-oldIsk);
    summary.currentRisk=Math.max(0,summary.currentRisk-oldNet);
    summary.projectedRisk=summary.currentRisk+Math.max(0,((parseFloat(f)||0)*(parseInt(a)||0))-(((parseFloat(f)||0)*(parseInt(a)||0))*(iskR/100)));
    summary.limitExceeded=summary.limit>0&&summary.projectedRisk>(summary.limit+0.0001);
  }
  if(!confirmBatchSaleGuard(summary))return;
  var updated=buildSaleRecord({id:s.id,tarih:t,musteri:m,mann:mn,qty:a,unitPrice:f,kdvOrani:kdvR,iskontoOrani:iskR,product:p});
  Object.assign(s,updated);
  saveSalesState();
  syncTeslimlerFromSatis();
  closeModal();
  renderSipTbl();
  renderML();
  if(curPage==="stok"&&typeof filterStok==="function")filterStok();
  if(selMusteri)renderCariD(selMusteri);
  notif("Güncellendi","grn");
}

  else if(perfFlt==="aylik"){t1=now.getFullYear()+"-"+(String(now.getMonth()+1).padStart(2,"0"))+"-01";}

    +"<div class='stat'><div class='stat-lbl'>Satış Cirosu</div><div class='stat-val'>"+fmt(totSat)+"₺</div></div>"

    +"<div class='stat'><div class='stat-lbl'>İşlem Sayısı</div><div class='stat-val blue'>"+filtered.length+"</div></div>"
    +"</div>"
    +"<div class='card'><div class='card-hdr'><div class='card-hdr-t'>Ürün Performansı (SKU)</div></div><div class='tbl-wrap'><table class='tbl'><thead><tr><th>MANN NO</th><th>ÜRÜN</th><th class='c'>STOĞA GİREN</th><th class='c'>SATILAN</th><th class='c'>KALAN</th><th class='r'>CİRO</th><th class='c'>ORAN</th><th class='c'>DURUM</th></tr></thead><tbody>"

function saveStokQuickEdit(id){
  var ref=getProductRefById(id);

  var p=ref.product;
  p.price=Math.max(0,parseFloat((g("sq_price")&&g("sq_price").value)||0)||0);
  p.stokAdet=Math.max(0,parseInt((g("sq_stock")&&g("sq_stock").value)||0,10)||0);
  p.stock=p.stokAdet>0;
  saveProds();
  closeModal();
  filterStok();
  notif("Stok ve fiyat güncellendi. Müşteri paneli verisi de yenilendi","grn");
}
function filterStok(){
  var q=(g("stokQ")&&g("stokQ").value||"").toLowerCase(),gf=g("stokG")&&g("stokG").value||"",tf=g("stokT")&&g("stokT").value||"",df=g("stokD")&&g("stokD").value||"";

    var mq=!q||p.mann.toLowerCase().includes(q)||p.oem.toLowerCase().includes(q)||(p.name||"").toLowerCase().includes(q)||(p.modeller||"").toLowerCase().includes(q);
    return mq&&(!gf||p.grupKey===gf)&&(!tf||p.tur===tf)&&(!df||stokDurKey(p.stokAdet||0)===df);
  }).sort(function(a,b){var va=a[stokSrt.col]||0,vb=b[stokSrt.col]||0;return typeof va==="string"?va.localeCompare(vb)*stokSrt.dir:(va-vb)*stokSrt.dir;});
  var turBadge={"Hava":"grn","Yag":"amb","Polen":"pur","Yakit":"blue"};
  if(g("stokTbody"))g("stokTbody").innerHTML=ps.map(function(p){var n=p.stokAdet||0;return"<tr><td class='mono fw7'>"+p.mann+"</td><td class='mono fz11'>"+p.oem+"</td><td><span class='badge blue'>"+p.grupLabel+"</span></td><td><span class='badge "+(turBadge[p.tur]||"gray")+"'>"+p.tur+"</span></td><td class='fz11 txt2' style='max-width:180px'>"+((p.modeller||p.name)||"").substring(0,60)+"</td><td class='r'><button class='btn btn-sec btn-xs mono' onclick=\"openStokQuickEdit('"+p.id+"')\">"+n+"</button></td><td class='mono r'>"+fmt(p.alis||0)+"₺</td><td class='r'><button class='btn btn-acc btn-xs mono' onclick=\"openStokQuickEdit('"+p.id+"')\">"+fmt(p.price||0)+"₺</button></td><td class='c' style='font-size:18px'>"+stokEmoji(n)+"</td></tr>";}).join("")||"<tr><td colspan='9' class='empty-st'>Sonuç bulunamadı.</td></tr>";
}

// Bir teslimatın satır toplamını döndür (items üzerinden)
function teslimTutar(t){
  if(t.toplam)return parseFloat(t.toplam)||0;
  return (t.items||[]).reduce(function(a,s){return a+(parseFloat(s.toplam)||0);},0);
}

function loadFtByMusteri(){
  var m=g("ftM").value;
  if(!m){g("ftTeslimListArea").style.display="none";return;}
  var faturaliIds=getFaturaliTeslimIds();
  var mu=findCustomerByIdentity(m);
  var teslimler=(TESLIMLER||[]).filter(function(t){return (mu?customerMatchesIdentity(mu,t.musteri):t.musteri===m)&&faturaliIds.indexOf(t.id)<0;})
    .sort(function(a,b){return (a.tarih||"").localeCompare(b.tarih||"");});
  mu=mu||{};
  if(teslimler.length){g("ftVD").value=mu.vergiDairesi||"";g("ftVN").value=mu.vergiNo||"";}
  renderFtTeslimList(teslimler,"Fatura Edilmemiş Teslimatlar  -  "+m,m);
}

function loadFtByTarih(){
  var t1=g("ftT1").value,t2=g("ftT2").value;
  if(!t1||!t2){notif("Başlangıç ve bitiş tarihi seçin","red");return;}
  var faturaliIds=getFaturaliTeslimIds();
  var teslimler=(TESLIMLER||[]).filter(function(t){
    return t.tarih>=t1&&t.tarih<=t2&&faturaliIds.indexOf(t.id)<0;
  }).sort(function(a,b){return (a.tarih||"").localeCompare(b.tarih||"");});
  renderFtTeslimList(teslimler,fD(t1)+(t1!==t2?"  -  "+fD(t2):"")+" tarihli teslimatlar",null);
}

function genFatura(){
  function roundMoneyValue(v){return Math.round((parseFloat(v)||0)*100)/100;}
  var fno=(g("ftNo")&&g("ftNo").value)||"ASTERA-"+(today().replace(/-/g,""));
  var vd=(g("ftVD")&&g("ftVD").value)||"";
  var vn=(g("ftVN")&&g("ftVN").value)||"";
  var kdvR=parseFloat(g("ftKdv")&&g("ftKdv").value)||0;
  var fatTarih=(g("ftFatTarih")&&g("ftFatTarih").value)||today();

  var selectedRows=document.querySelectorAll(".ft-teslim-row.selected");
  if(!selectedRows.length){notif("En az bir teslimat seçin","red");return;}

  // Seçili teslim ID'leri ve müşteri
  var selectedTids=[];
  var musterilerSet={};
  selectedRows.forEach(function(el){
    selectedTids.push(el.getAttribute("data-tid"));
    musterilerSet[el.getAttribute("data-musteri")]=true;
  });
  lastFaturaTeslimIds=selectedTids;

  // Seçili teslimatlardaki tüm kalemleri topla
  var allItems=[];
  var iskontoToplam=0;
  var araToplamBelgeler=0;
  selectedTids.forEach(function(tid){
    var t=(TESLIMLER||[]).find(function(x){return x.id===tid;});
    if(t){
      var belgeItems=t.items||[];
      var belgeAraToplam=parseFloat(t.araToplam);
      if(!(belgeAraToplam>0))belgeAraToplam=belgeItems.reduce(function(sum,s){return sum+(parseFloat(s.toplam)||s.adet*(parseFloat(s.fiyat)||0));},0);
      var belgeIskonto=roundMoneyValue(parseFloat(t.iskontoTutari)||0);
      var allocatedDiscount=0;
      araToplamBelgeler+=belgeAraToplam;
      belgeItems.forEach(function(s,idx){
        var brutToplam=parseFloat(s.toplam)||s.adet*(parseFloat(s.fiyat)||0);
        var rowDiscount=0;
        if(belgeIskonto>0&&belgeAraToplam>0){
          if(idx===belgeItems.length-1)rowDiscount=roundMoneyValue(Math.max(0,belgeIskonto-allocatedDiscount));
          else rowDiscount=roundMoneyValue((brutToplam/belgeAraToplam)*belgeIskonto);
          allocatedDiscount=roundMoneyValue(allocatedDiscount+rowDiscount);
        }
        rowDiscount=Math.min(rowDiscount,brutToplam);
        iskontoToplam=roundMoneyValue(iskontoToplam+rowDiscount);
        allItems.push({
          mann:s.mann,
          adet:s.adet,
          fiyat:parseFloat(s.fiyat)||0,
          brutToplam:brutToplam,
          iskontoTutari:rowDiscount,
          netToplam:roundMoneyValue(brutToplam-rowDiscount),
          tarih:t.tarih,
          belgeNo:t.belgeNo||t.id.slice(-6).toUpperCase(),
          musteri:t.musteri
        });
      });
    }
  });
  if(!allItems.length){notif("Seçili teslimatların ürün bilgisi yok","red");return;}

  // Müşteri adı: tek müşteri ise o, birden fazla ise listele
  var musteriler=Object.keys(musterilerSet);
  var musteriLabel=musteriler.length===1?musteriler[0]:musteriler.join(", ");
  var mu=findCustomerByIdentity(musteriler[0])||{};
  if(!vd&&mu.vergiDairesi)vd=mu.vergiDairesi;

  var kdvsizBrut=roundMoneyValue(allItems.reduce(function(a,s){return a+s.brutToplam;},0));
  var kdvsiz=roundMoneyValue(Math.max(0,kdvsizBrut-iskontoToplam));

  // Preview HTML (panel içinde gösterim)

    supabaseAnonKey: String(raw.supabaseAnonKey || "").trim()

function getAiProfitReadiness(){
  var s = getAppSettingsSafe();
  var issues = [];
  var salesCount = (SATIS || []).length;
  var expenseCount = (HARCAMALAR || []).length;
  var stockCount = getAllP().filter(function(p){
    return Math.max(0, parseInt(p && p.stokAdet, 10) || 0) > 0;
  }).length;

  if(!s.supabaseUrl) issues.push("Supabase URL eksik.");
  if(!s.supabaseAnonKey) issues.push("Supabase Anon Key eksik.");
  if(!salesCount) issues.push("Analiz için en az bir satış kaydı gerekli.");
  if(!stockCount) issues.push("Stok riski analizi için stok kartlarında adet/maliyet olmalı.");

  return {
    ready: issues.length === 0,
    issues: issues,
    stats: {
      salesCount: salesCount,
      expenseCount: expenseCount,
      stockCount: stockCount
    }
  };
}
