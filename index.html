function aiMakePriceCandidate(row){
  if(!row || !row.adet) return null;

  var unitSale = row.satis / row.adet;
  var unitCost = row.maliyet / row.adet;
  var marginPct = karPct(row.kar, row.satis);

  if(!unitSale || !unitCost) return null;

  var targetMargin = null;
  if(marginPct < 0) targetMargin = 18;
  else if(marginPct < 8) targetMargin = 16;
  else if(marginPct < 12) targetMargin = 14;

  if(targetMargin == null) return null;

  var suggestedUnitPrice = unitCost / (1 - targetMargin / 100);
  return {
    code: row.mann || "-",
    current_unit_price: aiRound(unitSale),
    suggested_unit_price: aiRound(suggestedUnitPrice),
    current_margin_pct: aiRound(marginPct),
    target_margin_pct: aiRound(targetMargin),
    delta_pct: aiRound(((suggestedUnitPrice - unitSale) / unitSale) * 100)
  };
}

function buildProfitSnapshotForAI(){
  var t1 = karGetStartDate();
  var periodLabel = karGetPeriodLabel(t1);

  var filteredSales = (SATIS || []).filter(function(s){ return karInRange(s.tarih, t1); });
  var filteredExpenses = (HARCAMALAR || []).filter(function(h){ return karInRange(h.tarih, t1); });
  var filteredTahsilat = (CARI || []).filter(function(c){
    return karInRange(c.tarih, t1) && String(c.tip || "").toUpperCase().indexOf("TAHS") === 0;
  });

  var salesNet = filteredSales.reduce(function(a,s){ return a + karNetSale(s); }, 0);
  var cogs = filteredSales.reduce(function(a,s){ return a + karCostOfSale(s); }, 0);
  var grossProfit = filteredSales.reduce(function(a,s){ return a + karLineProfit(s); }, 0);
  var expensesTotal = filteredExpenses.reduce(function(a,h){ return a + karNum(h.tutar); }, 0);
  var netProfit = grossProfit - expensesTotal;
  var collectionsTotal = filteredTahsilat.reduce(function(a,c){ return a + karNum(c.tutar); }, 0);

  var productMap = {};
  filteredSales.forEach(function(s){
    var key = s.mann || "-";
    if(!productMap[key]) productMap[key] = { mann:key, adet:0, satis:0, maliyet:0, kar:0 };
    productMap[key].adet += karNum(s.adet || 1);
    productMap[key].satis += karNetSale(s);
    productMap[key].maliyet += karCostOfSale(s);
    productMap[key].kar += karLineProfit(s);
  });

  var productRows = Object.values(productMap).map(function(r){
    return {
      mann: r.mann,
      adet: aiRound(r.adet),
      satis: aiRound(r.satis),
      maliyet: aiRound(r.maliyet),
      kar: aiRound(r.kar),
      margin_pct: aiRound(karPct(r.kar, r.satis))
    };
  });

  var customerMap = {};
  filteredSales.forEach(function(s){
    var key = s.musteri || "Belirtilmedi";
    if(!customerMap[key]) customerMap[key] = { customer:key, adet:0, satis:0, maliyet:0, kar:0 };
    customerMap[key].adet += karNum(s.adet || 1);
    customerMap[key].satis += karNetSale(s);
    customerMap[key].maliyet += karCostOfSale(s);
    customerMap[key].kar += karLineProfit(s);
  });

  var customerRows = Object.values(customerMap).map(function(r){
    return {
      customer: r.customer,
      adet: aiRound(r.adet),
      satis: aiRound(r.satis),
      maliyet: aiRound(r.maliyet),
      kar: aiRound(r.kar),
      margin_pct: aiRound(karPct(r.kar, r.satis))
    };
  });

  var tahsilatMap = {};
  (CARI || []).forEach(function(c){
    if(String(c.tip || "").toUpperCase().indexOf("TAHS") !== 0) return;
    var key = c.musteri || "Belirtilmedi";
    tahsilatMap[key] = (tahsilatMap[key] || 0) + karNum(c.tutar);
  });

  var receivables = {};
  (SATIS || []).forEach(function(s){
    var key = s.musteri || "Belirtilmedi";
    if(!receivables[key]) receivables[key] = {
      customer: key,
      sales_total: 0,
      collection_total: 0,
      open_balance: 0
    };
    receivables[key].sales_total += karNum(s.toplam);
  });

  Object.keys(receivables).forEach(function(key){
    receivables[key].collection_total = aiRound(karNum(tahsilatMap[key] || 0));
    receivables[key].sales_total = aiRound(receivables[key].sales_total);
    receivables[key].open_balance = aiRound(receivables[key].sales_total - receivables[key].collection_total);
  });

  var receivableRows = Object.values(receivables)
    .filter(function(r){ return r.open_balance > 0; })
    .sort(function(a,b){ return b.open_balance - a.open_balance; })
    .slice(0, 20);

  var stockRows = getAllP().map(function(p){
    var units = Math.max(0, parseInt(p.stokAdet, 10) || 0);
    var unitCost = karNum(p.alis || p.birimAlis || p.maliyet);
    return {
      code: p.mann || "-",
      product: p.name || "",
      units: units,
      unit_cost: aiRound(unitCost),
      capital_locked: aiRound(units * unitCost)
    };
  }).filter(function(r){
    return r.units > 0;
  }).sort(function(a,b){
    return b.capital_locked - a.capital_locked;
  }).slice(0, 20);

  var expenseMap = {};
  filteredExpenses.forEach(function(h){
    var k = h.kategori || "Diğer";
    expenseMap[k] = (expenseMap[k] || 0) + karNum(h.tutar);
  });

  var expenseRows = Object.keys(expenseMap).map(function(k){
    return { category:k, total:aiRound(expenseMap[k]) };
  }).sort(function(a,b){ return b.total - a.total; });

  var weakProducts = productRows.slice().sort(function(a,b){ return a.margin_pct - b.margin_pct; }).slice(0,15);
  var topProducts = productRows.slice().sort(function(a,b){ return b.kar - a.kar; }).slice(0,15);
  var weakCustomers = customerRows.filter(function(c){ return c.margin_pct < 10 || c.kar <= 0; }).sort(function(a,b){ return a.margin_pct - b.margin_pct; }).slice(0,15);
  var topCustomers = customerRows.slice().sort(function(a,b){ return b.kar - a.kar; }).slice(0,15);
  var priceCandidates = productRows.map(aiMakePriceCandidate).filter(Boolean).sort(function(a,b){ return b.delta_pct - a.delta_pct; }).slice(0,15);

  return {
    period: {
      filter: karFlt,
      label: periodLabel,
      start_date: t1 || null
    },
    summary: {
      sales_count: filteredSales.length,
      sales_net: aiRound(salesNet),
      cogs: aiRound(cogs),
      gross_profit: aiRound(grossProfit),
      gross_margin_pct: aiRound(karPct(grossProfit, salesNet)),
      expenses_total: aiRound(expensesTotal),
      net_profit: aiRound(netProfit),
      net_margin_pct: aiRound(karPct(netProfit, salesNet)),
      collections_total: aiRound(collectionsTotal),
      receivables_open_total: aiRound(receivableRows.reduce(function(a,r){ return a + r.open_balance; }, 0)),
      stock_capital_total: aiRound(stockRows.reduce(function(a,r){ return a + r.capital_locked; }, 0))
    },
    top_products: topProducts,
    weak_products: weakProducts,
    top_customers: topCustomers,
    weak_customers: weakCustomers,
    receivables: receivableRows,
    stock_risk: stockRows,
    expense_categories: expenseRows,
    price_candidates: priceCandidates
  };
}

function resetAiProfitAnalysis(){
  AI_PROFIT_STATE.loading = false;
  AI_PROFIT_STATE.error = "";
  AI_PROFIT_STATE.report = null;
  AI_PROFIT_STATE.lastRunAt = "";
  if(g("karContent")) renderKar();
}

async function runAiProfitAnalysis(){
  if(AI_PROFIT_STATE.loading) return;

  try{
    var readiness = getAiProfitReadiness();
    if(!readiness.ready){
      throw new Error(readiness.issues.join(" "));
    }

    AI_PROFIT_STATE.loading = true;
    AI_PROFIT_STATE.error = "";
    if(g("karContent")) renderKar();

    var snapshot = buildProfitSnapshotForAI();

    var res = await fetch(aiFunctionUrl(), {
      method: "POST",
      headers: aiHeaders(),
      body: JSON.stringify({
        provider: AI_PROFIT_STATE.provider,
        model: AI_PROFIT_STATE.model,
        snapshot: snapshot
      })
    });

    var json = await res.json().catch(function(){ return {}; });

    if(!res.ok){
      throw new Error(json.error || ("AI analiz başarısız. HTTP " + res.status));
    }

    if(!json.report){
      throw new Error("AI raporu boş döndü.");
    }

    AI_PROFIT_STATE.report = json.report;
    AI_PROFIT_STATE.lastRunAt = json.generated_at || new Date().toISOString();

    notif("AI kâr analizi hazır", "grn");
  }catch(err){
    AI_PROFIT_STATE.error = err && err.message ? err.message : "Bilinmeyen hata";
    notif("AI analiz hatası", "red");
  }finally{
    AI_PROFIT_STATE.loading = false;
    if(g("karContent")) renderKar();
  }
}

    .replace(/&/g,"&amp;")

    .replace(/>/g,"&gt;")
    .replace(/\"/g,"&quot;")

}

  }else if(karFlt==="yillik"){

function karNetSale(s){
  var oran=karNum(s&&s.kdvOrani||0);

function karCostOfSale(s){return karNum(s&&s.maliyet)*karNum(s&&s.adet||1);}
function karLineProfit(s){return karNetSale(s)-karCostOfSale(s);}
function karPct(val,base){return base?((val/base)*100):0;}

function enhanceGroupDeleteButtons(){
  Object.keys(DATA||{}).forEach(function(k){
    var input=g("agl_"+k);
    if(!input)return;
    var row=input.closest("div[style*='border-bottom']");
    if(!row||row.querySelector("[data-del-group]"))return;
    var saveBtn=row.querySelector("button");
    if(!saveBtn)return;
    var delBtn=document.createElement("button");
    delBtn.className="btn btn-red btn-sm";
    delBtn.textContent="Sil";
    delBtn.setAttribute("data-del-group",k);
    delBtn.onclick=function(){deleteGroup(k);};
    saveBtn.insertAdjacentElement("afterend",delBtn);
    saveBtn.style.marginRight="8px";
  });
}
function deleteGroup(k){
  if(!DATA[k])return;
  var total=groupProductCount(k);
  var msg=total>0?("Bu grupta "+total+" urun var. Grup silinirse icindeki tum urunler de silinecek. Devam edilsin mi?"):"Bu bos grup silinsin mi?";
  if(!confirm(msg))return;
  delete DATA[k];
  saveProds();
  notif("Grup silindi","red");
  renderUrunTab();
}
function saveNewP(){
  var gk=g("au_g").value,tur=g("au_t").value,name=g("au_n").value.trim(),oem=g("au_oem").value.trim(),mann=g("au_mann").value.trim(),alis=parseFloat(g("au_alis").value)||0,toptan=parseFloat(g("au_toptan").value)||0,stok=parseInt(g("au_stok").value)||0,img=g("au_img").value.trim(),cars=g("au_cars").value.trim();
  if(!name||!mann){notif("Ad ve MANN zorunludur","red");return;}
  if(!DATA[gk])return;
  // ââ€â‚¬ââ€â‚¬ OEM ve MANN tekrar kontrolü ââ€â‚¬ââ€â‚¬
  var allProds=getAllP();
  var mannNorm=mann.replace(/[\s\-]/g,"").toLowerCase();
  var oemNorm=(oem||"").replace(/[\s\-]/g,"").toLowerCase();
  var duplicate=allProds.find(function(p){
    var pm=(p.mann||"").replace(/[\s\-]/g,"").toLowerCase();
    var po=(p.oem||"").replace(/[\s\-]/g,"").toLowerCase();
    return pm===mannNorm||(oemNorm&&po===oemNorm);
  });
  if(duplicate){
    notif("⚠️ Bu OEM veya MANN kodu zaten mevcut: "+duplicate.mann+" ("+duplicate.grupLabel+"→"+duplicate.tur+")","red");
    return;
  }
  var newProduct={id:uid(),name:name,oem:oem||"-",mann:mann,price:toptan,alis:alis,maliyet:alis,stokAdet:stok,img:img,stock:stok>0,tur:tur,modeller:cars};
  addOrUpdateProd(gk,tur,newProduct);
  var savedRef=findById(newProduct.id)||findByMann(mann);
  if(!savedRef){
    if(!DATA[gk].cats[tur])DATA[gk].cats[tur]=[];
    DATA[gk].cats[tur].push(newProduct);
    saveProds();
    savedRef=findById(newProduct.id)||findByMann(mann);
  }
  window.DATA=DATA;
  if(window.AppState&&typeof window.AppState.set==="function"){
    try{window.AppState.set("products",DATA);}catch(e){}
  }
  if(typeof queueDataPersistence==="function"){
    try{queueDataPersistence();}catch(e){}
  }
  if(typeof cloudReady==="function"&&cloudReady()&&typeof cloudPushNow==="function"){
    try{cloudPushNow(true);}catch(e){}
  }
  if(!savedRef){
    notif("Ürün kaydı doğrulanamadı, lütfen tekrar deneyin","red");
    return;
  }
  notif("Ürün eklendi ve müşteri paneline aktarıldı: "+mann,"grn");
  renderUrunTab();
}

function updateP(id){
  var found=null,oldGroup="",oldCat="";
  Object.keys(DATA).forEach(function(gk){Object.keys(DATA[gk].cats).forEach(function(cat){DATA[gk].cats[cat].forEach(function(p){if(p.id===id){found=p;oldGroup=gk;oldCat=cat;}});});});
  if(!found)return;
  var newGroup=g("ue_g").value,newCat=g("ue_t").value;
  DATA[newGroup].label=g("ue_group_label").value.trim()||DATA[newGroup].label;
  if(oldGroup!==newGroup||oldCat!==newCat){
    DATA[oldGroup].cats[oldCat]=DATA[oldGroup].cats[oldCat].filter(function(p){return p.id!==id;});
    if(!DATA[newGroup].cats[newCat])DATA[newGroup].cats[newCat]=[];
    DATA[newGroup].cats[newCat].push(found);
  }
  found.name=g("ue_name").value.trim()||found.name;
  found.oem=g("ue_oem").value;
  found.alis=parseFloat(g("ue_alis").value)||0;

var DEVIR_LOOKBACK_DAYS=90;
stokSrt={col:"devirScore",dir:-1};
function finNum(v){return parseFloat(v)||0;}
function isoToday(){return new Date().toISOString().split("T")[0];}
function parseISODateSafe(iso){
  if(!iso)return null;
  var p=String(iso).split("-");
  if(p.length!==3)return null;
  return new Date(Number(p[0]),Number(p[1])-1,Number(p[2]));
}
function diffDaysISO(fromIso,toIso){
  var a=parseISODateSafe(fromIso);
  var b=parseISODateSafe(toIso||isoToday());
  if(!a||!b)return 0;
  var ms=b.setHours(0,0,0,0)-a.setHours(0,0,0,0);
  return Math.max(0,Math.floor(ms/86400000));
}
function getMonthStartISO(){
  var d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-01";
}
function saleLineProfitSafe(s){
  if(s&&s.kar!=null&&s.kar!=="")return finNum(s.kar);
  var qty=finNum(s.adet||1);
  var unitCost=finNum(s.maliyet||0);
  return finNum(s.toplam)-(qty*unitCost);
}
function getCurrentMonthSales(){
  var t1=getMonthStartISO();
  return (SATIS||[]).filter(function(s){return !t1||(s.tarih||"")>=t1;});
}
function getCurrentMonthExpenses(){
  var t1=getMonthStartISO();
  return (HARCAMALAR||[]).filter(function(h){return !t1||(h.tarih||"")>=t1;});
}
function getCurrentMonthDashboardFinancials(){
  var sales=getCurrentMonthSales();
  var expenses=getCurrentMonthExpenses();
  var gross=sales.reduce(function(a,s){return a+saleLineProfitSafe(s);},0);
  var expense=expenses.reduce(function(a,h){return a+finNum(h.tutar);},0);
  var net=gross-expense;
  var minMarginPct=(typeof FINANS_POLICY!=="undefined"&&FINANS_POLICY&&FINANS_POLICY.minMarginPct!=null)?finNum(FINANS_POLICY.minMarginPct):12;
  var lowMarginCount=sales.filter(function(s){
    var revenue=finNum(s.toplam);
    var profit=saleLineProfitSafe(s);
    var marginPct=revenue?((profit/revenue)*100):0;
    return marginPct<minMarginPct;
  }).length;
  return {gross:gross,expense:expense,net:net,lowMarginCount:lowMarginCount,salesCount:sales.length};
}
function getCustomerNamesUniverse(){
  var map={};
  (MUSTERILER||[]).forEach(function(m){if(m&&m.ad)map[m.ad]=1;});
  (TESLIMLER||[]).forEach(function(t){if(t&&t.musteri)map[t.musteri]=1;});
  (CARI||[]).forEach(function(c){if(c&&c.musteri)map[c.musteri]=1;});
  return Object.keys(map);
}
function getCustomerCreditLimitSafe(name){
  var mu=(MUSTERILER||[]).find(function(m){return m.ad===name;});
  return finNum(mu&&mu.krediLimit);
}
function getReceivableChargeRows(customerName){
  var mu=findCustomerByIdentity(customerName);
  return (TESLIMLER||[]).filter(function(t){return mu?customerMatchesIdentity(mu,t.musteri):t.musteri===customerName;}).map(function(t){
    return {tarih:t.tarih||"",tutar:finNum(t.toplam),acik:finNum(t.toplam),ref:t.belgeNo||t.id||""};
  }).sort(function(a,b){return (a.tarih||"").localeCompare(b.tarih||"");});
}
function getReceivableCreditTotal(customerName){
  var mu=findCustomerByIdentity(customerName);
  return (CARI||[]).filter(function(c){
    return (mu?customerMatchesIdentity(mu,c.musteri):c.musteri===customerName)&&(c.tip==="TAHSİLAT"||c.tip==="İADE");
  }).reduce(function(a,c){return a+finNum(c.tutar);},0);
}
function getCustomerAgingDetail(customerName,refDate){
  var charges=getReceivableChargeRows(customerName);
  var totalCredit=getReceivableCreditTotal(customerName);
  var remainingCredit=totalCredit;
  charges.forEach(function(ch){
    if(remainingCredit<=0)return;
    var applied=Math.min(ch.acik,remainingCredit);
    ch.acik-=applied;
    remainingCredit-=applied;
  });
  var buckets={b0_15:0,b16_30:0,b31_45:0,b46p:0,total:0};
  var openDocs=[];
  charges.forEach(function(ch){
    if(ch.acik<=0.0001)return;
    var age=diffDaysISO(ch.tarih,refDate);
    var row={tarih:ch.tarih,ref:ch.ref,age:age,acik:ch.acik};
    openDocs.push(row);
    if(age<=15)buckets.b0_15+=ch.acik;
    else if(age<=30)buckets.b16_30+=ch.acik;
    else if(age<=45)buckets.b31_45+=ch.acik;
    else buckets.b46p+=ch.acik;
    buckets.total+=ch.acik;
  });
  return {musteri:customerName,limit:getCustomerCreditLimitSafe(customerName),bakiye:buckets.total,buckets:buckets,overdue:buckets.b31_45+buckets.b46p,openDocs:openDocs};
}
function getGlobalAgingSummary(refDate){
  var totals={b0_15:0,b16_30:0,b31_45:0,b46p:0,total:0,overdue:0};
  var rows=getCustomerNamesUniverse().map(function(name){return getCustomerAgingDetail(name,refDate);}).filter(function(r){return r.bakiye>0.0001;}).sort(function(a,b){return b.bakiye-a.bakiye;});
  rows.forEach(function(r){
    totals.b0_15+=r.buckets.b0_15;
    totals.b16_30+=r.buckets.b16_30;
    totals.b31_45+=r.buckets.b31_45;
    totals.b46p+=r.buckets.b46p;
    totals.total+=r.buckets.total;
    totals.overdue+=r.overdue;
  });
  return {rows:rows,totals:totals};
}

function getLookbackStartISO(days){

function getStockTurnoverMeta(p,salesQtyMap,days){
  days=days||DEVIR_LOOKBACK_DAYS;
  var stock=Math.max(0,parseInt(p.stokAdet,10)||0);
  var soldQty=finNum((salesQtyMap||{})[p.mann]||0);
  var avgDaily=soldQty>0?(soldQty/days):0;
  var avgMonthly=soldQty>0?(soldQty/(days/30)):0;
  var coverDays=soldQty>0?(stock/avgDaily):(stock>0?9999:0);
  var unitCost=finNum(p.alis||p.birimAlis||p.maliyet);
  var tiedCapital=stock*unitCost;
  var devirScore=0;
  if(stock===0&&soldQty>0)devirScore=95;
  else if(stock===0&&soldQty===0)devirScore=50;
  else if(soldQty===0&&stock>0)devirScore=0;
  else if(coverDays<=15)devirScore=100;
  else if(coverDays<=30)devirScore=90;
  else if(coverDays<=60)devirScore=75;
  else if(coverDays<=90)devirScore=60;
  else if(coverDays<=120)devirScore=45;
  else if(coverDays<=180)devirScore=25;
  else devirScore=10;
  var skorKey="normal",skorText="Normal",skorCls="blue";
  if(stock>0&&soldQty===0){
    skorKey="olu";skorText="Ölü Stok";skorCls="red";
  }else if(devirScore<40){
    skorKey="agir";skorText="Ağır";skorCls="red";
  }else if(devirScore<75){
    skorKey="normal";skorText="Normal";skorCls="amb";
  }else{
    skorKey="hizli";skorText="Hızlı";skorCls="grn";
  }
  return {mann:p.mann||"-",name:p.name||"",grupLabel:p.grupLabel||"",tur:p.tur||"",stock:stock,soldQty:soldQty,avgMonthly:avgMonthly,avgDaily:avgDaily,coverDays:coverDays,unitCost:unitCost,tiedCapital:tiedCapital,devirScore:devirScore,skorKey:skorKey,skorText:skorText,skorCls:skorCls};
}

function filterStok(){
  var q=(g("stokQ")&&g("stokQ").value||"").toLowerCase();
  var gf=g("stokG")&&g("stokG").value||"";
  var tf=g("stokT")&&g("stokT").value||"";
  var df=g("stokD")&&g("stokD").value||"";
  var sf=g("stokSkor")&&g("stokSkor").value||"";
  var rows=getAllStockTurnoverRows(DEVIR_LOOKBACK_DAYS).filter(function(p){
    var text=((p.name||"")+" "+(p.modeller||"")).toLowerCase();
    var mq=!q||(p.mann||"").toLowerCase().includes(q)||(p.oem||"").toLowerCase().includes(q)||text.includes(q);
    return mq&&(!gf||p.grupKey===gf)&&(!tf||p.tur===tf)&&(!df||stokDurKey(p.stokAdet||0)===df)&&(!sf||p.skorKey===sf);
  }).sort(function(a,b){
    var va=a[stokSrt.col],vb=b[stokSrt.col];
    if(stokSrt.col==="coverDays"){va=(a.soldQty>0?a.coverDays:999999);vb=(b.soldQty>0?b.coverDays:999999);}
    if(typeof va==="string")return String(va).localeCompare(String(vb))*stokSrt.dir;
    return (finNum(va)-finNum(vb))*stokSrt.dir;
  });
  var visibleBound=rows.reduce(function(a,p){return a+p.tiedCapital;},0);
  var visibleFast=rows.filter(function(p){return p.skorKey==="hizli";}).length;
  var visibleSlow=rows.filter(function(p){return p.stock>0&&(p.skorKey==="olu"||p.skorKey==="agir");}).length;
  if(g("stokStats"))g("stokStats").innerHTML="<div class='stat'><div class='stat-lbl'>Filtreli Ürün</div><div class='stat-val'>"+rows.length+"</div><div class='stat-sub'>Listelenen SKU</div></div><div class='stat'><div class='stat-lbl'>Bağlı Sermaye</div><div class='stat-val amb'>"+fmt(visibleBound)+"₺</div><div class='stat-sub'>Filtre görünümü</div></div><div class='stat'><div class='stat-lbl'>Yavaş / Ölü Stok</div><div class='stat-val red'>"+visibleSlow+"</div><div class='stat-sub'>Müdahale gereken</div></div><div class='stat'><div class='stat-lbl'>Hızlı Devir</div><div class='stat-val grn'>"+visibleFast+"</div><div class='stat-sub'>Sağlıklı ürün</div></div>";
  if(g("stokTbody"))g("stokTbody").innerHTML=rows.map(function(p){
    var coverText=p.soldQty>0?fmt(p.coverDays)+" gün":(p.stock>0?"âˆ":"0");
    return "<tr><td class='mono fw7'>"+p.mann+"</td><td class='mono fz11'>"+(p.oem||"")+"</td><td><span class='badge blue'>"+(p.grupLabel||"")+"</span></td><td><span class='badge "+({Hava:'grn',Yag:'amb',Polen:'pur',Yakit:'blue'}[p.tur]||'gray')+"'>"+(p.tur||"")+"</span></td><td class='fz11 txt2' style='max-width:180px'>"+(((p.modeller||p.name)||"")).substring(0,60)+"</td><td class='c mono'>"+fmt(p.soldQty)+"</td><td class='r'><button class='btn btn-sec btn-xs mono' onclick=\"openStokQuickEdit('"+p.id+"')\">"+p.stock+"</button></td><td class='mono r'>"+coverText+"</td><td class='mono r'>"+fmt(p.devirScore)+"</td><td class='mono r' style='color:var(--amb)'>"+fmt(p.tiedCapital)+"₺</td><td class='mono r'>"+fmt(p.alis||0)+"₺</td><td class='r'><button class='btn btn-acc btn-xs mono' onclick=\"openStokQuickEdit('"+p.id+"')\">"+fmt(p.price||0)+"₺</button></td><td class='c'><span class='badge "+p.skorCls+"'>"+p.skorText+"</span></td></tr>";
  }).join("")||"<tr><td colspan='13' class='empty-st'>Sonuç bulunamadı.</td></tr>";
}

function dashPriorityBadge(row){
  if(row.limitExceeded&&row.overdueAge>=31)return "<span class='badge red'>Acil</span>";
  if(row.limitExceeded)return "<span class='badge red'>Limit Aşıldı</span>";
  if(row.overdueAge>=31)return "<span class='badge amb'>Gecikmiş</span>";
  return "<span class='badge blue'>Takip</span>";
}
function getTahsilatOncelikRows(){
  var todayRef=(typeof isoToday==="function")?isoToday():new Date().toISOString().split("T")[0];
  var rows=getCustomerNamesUniverse().map(function(name){
    var detail=(typeof getCustomerAgingDetail==="function")?getCustomerAgingDetail(name,todayRef):{musteri:name,bakiye:Math.max(0,dashSafeNum(getMBakiye(name))),overdue:0,buckets:{b46p:0,b31_45:0,b16_30:0,b0_15:0},openDocs:[]};
    var oldestOpenAge=(detail.openDocs||[]).reduce(function(maxAge,doc){return Math.max(maxAge,dashSafeNum(doc.age));},0);
    var limit=dashSafeNum(detail.limit!=null?detail.limit:getCustomerCreditLimitSafe(name));
    var bakiye=dashSafeNum(detail.bakiye);
    var overdue=dashSafeNum(detail.overdue);
    var risk=Math.max(0,dashSafeNum(getMBakiye(name)));
    var limitExceeded=limit>0&&risk>(limit+0.0001);
    var excess=limitExceeded?(risk-limit):0;
    var score=(overdue*2.0)+(bakiye*0.35)+(oldestOpenAge*45)+(limitExceeded?5000:0)+(excess*0.75);
    return {musteri:name,bakiye:bakiye,overdue:overdue,overdueAge:oldestOpenAge,limit:limit,risk:risk,excess:excess,limitExceeded:limitExceeded,score:score,buckets:detail.buckets||{b46p:0,b31_45:0,b16_30:0,b0_15:0}};
  }).filter(function(r){return r.bakiye>0.0001;}).sort(function(a,b){
    if(b.score!==a.score)return b.score-a.score;
    if(b.overdue!==a.overdue)return b.overdue-a.overdue;
    return b.bakiye-a.bakiye;
  });
  return rows;
}
function getDashboardLimitAlarmSummary(){
  var exceeded=getLimitExceededCustomers();

    count:exceeded.length,

    top:exceeded.length?exceeded[0]:null
  };
}

function deepClone(v){
  try{return JSON.parse(JSON.stringify(v));}

}

function collectFullBackupPayload(reason){

    schema:"ASTERA_BACKUP_V2",

    reason:reason||"manual",
    products:deepClone(DATA||{}),
    satis:deepClone(SATIS||[]),
    cari:deepClone(CARI||[]),
    musteriler:deepClone(MUSTERILER||[]),
    orders:deepClone(getOrdersNow()),
    logo:deepClone(ls(K.logo,"")||""),

    harcamalar:deepClone(HARCAMALAR||[]),

  };
}
function persistBackupPayload(payload){
  if(!payload||!payload.products||!payload.settings){
    notif("Yedek dosyası geçersiz","red");
    return false;
  }
  DATA=deepClone(payload.products||{});
  SATIS=deepClone(payload.satis||[]);
  CARI=deepClone(payload.cari||[]);
  MUSTERILER=deepClone(payload.musteriler||[]);
  SATINALMA=deepClone(payload.satinalma||[]);
  HARCAMALAR=deepClone(payload.harcamalar||[]);
  TESLIMLER=deepClone(payload.teslimler||[]);
  BEKLEYEN_SIP=deepClone(payload.bekleyenSiparisler||[]);
  APP_SETTINGS=Object.assign({},APP_SETTINGS||{},deepClone(payload.settings||{}));
  WA=APP_SETTINGS.wa||WA;
  lsSave(K.products,DATA);
  lsSave(K.satis,SATIS);
  lsSave(K.cari,CARI);
  lsSave(K.musteriler,MUSTERILER);
  lsSave(K.orders,deepClone(payload.orders||[]));
  lsSave(K.logo,payload.logo||"");
  lsSave(K.satinalma,SATINALMA);
  lsSave(K.harcamalar,HARCAMALAR);
  lsSave(K.teslimler,TESLIMLER);
  lsSave(K.panelAutoDownload,!!payload.panelAutoDownload);
  persistAppSettings();
  lsSave(K.bekleyenSiparisler,BEKLEYEN_SIP);
  try{
    loadLogo2();
    checkOrders();
    if(typeof syncTeslimlerFromSatis==="function"){
      syncTeslimlerFromSatis();
      lsSave(K.teslimler,TESLIMLER);
    }
  }catch(e){}
  if(selMusteri&&typeof renderCariD==="function"){try{renderCariD(selMusteri);}catch(e){}}
  if(typeof renderML==="function"){try{renderML();}catch(e){}}
  if(typeof renderPage==="function"){try{renderPage(curPage||"dashboard");}catch(e){}}
  return true;
}
function saveLocalBackupSnapshot(reason){
  var payload=collectFullBackupPayload(reason||"manual_snapshot");
  try{
    localStorage.setItem(ASTERA_LOCAL_BACKUP_KEY,JSON.stringify(payload));
    APP_SETTINGS.lastBackupAt=payload.exportedAt;
    persistAppSettings();
    if(g("bkLastAt"))g("bkLastAt").textContent=payload.exportedAt;
    notif("Yerel yedek oluşturuldu","grn");
    return payload;
  }catch(e){
    notif("Yerel yedek oluşturulamadı","red");
    return null;
  }
}
function getLocalBackupSnapshot(){

  }
}
function downloadBackupFile(){
  var payload=collectFullBackupPayload("manual_export");
  saveLocalBackupSnapshot("manual_export");
  var text=JSON.stringify(payload,null,2);
  var blob=new Blob([text],{type:"application/json;charset=utf-8"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="astera-backup-"+today()+".json";
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},200);

function importBackupFromFile(input){
  var file=input&&input.files&&input.files[0];
  if(!file){notif("Dosya seçilmedi","red");return;}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var payload=JSON.parse(e.target.result||"{}");
      if(!payload||payload.schema!=="ASTERA_BACKUP_V2"){
        if(!confirm("Yedek dosyası ASTERA_BACKUP_V2 görünmüyor. Yine de içe aktarmayı denemek ister misiniz?"))return;
      }
      if(!confirm("İçe aktarma mevcut verilerin üzerine yazacak. Devam edilsin mi?"))return;
      saveLocalBackupSnapshot("before_import");
      pushUndoSnapshot("full_backup_restore","İçe aktarma öncesi",{backup:collectFullBackupPayload("undo_before_import")});
      if(persistBackupPayload(payload))notif("Yedek içe aktarıldı","grn");
    }catch(err){
      notif("Yedek dosyası okunamadı","red");
    }finally{
      try{input.value="";}catch(_){}
    }
  };
  reader.readAsText(file,"utf-8");
}

function restoreEmbeddedDataIfNeeded(){
  if(cloudReady())return false;
  var restored=false;
  function copyData(val){
    if(typeof deepClone==="function") return deepClone(val);
    return JSON.parse(JSON.stringify(val));
  }
  function restoreArray(globalName, storageKeyName, bootstrapKey){
    var boot=bootstrapVal(bootstrapKey,null);
    if(!Array.isArray(boot) || !boot.length) return;
    if(Array.isArray(window[globalName]) && window[globalName].length) return;
    window[globalName]=copyData(boot);
    try{lsSave(K[storageKeyName],window[globalName]);}catch(e){}
    restored=true;
  }
  restoreArray("SATIS","satis","satis");
  restoreArray("CARI","cari","cari");
  restoreArray("MUSTERILER","musteriler","musteriler");
  restoreArray("SATINALMA","satinalma","satinalma");
  restoreArray("HARCAMALAR","harcamalar","harcamalar");
  restoreArray("TESLIMLER","teslimler","teslimler");
  restoreArray("BEKLEYEN_SIP","bekleyenSiparisler","bekleyenSiparisler");
  var bootProducts=bootstrapVal("products",null);
  if(bootProducts && (!DATA || !Object.keys(DATA).length)){
    DATA=copyData(bootProducts);
    try{lsSave(K.products,DATA);}catch(e){}
    restored=true;
  }
  return restored;
}

}

window.onload=async function(){
  ASTERA_RUNTIME_FLAGS.suppressStartupShippingNotice=true;
  ASTERA_RUNTIME_FLAGS.startupCloudHydrating=true;
  ASTERA_SYNC_STATE.localDirtyAt="";
  ASTERA_SYNC_STATE.pendingPush=false;
  ASTERA_SYNC_STATE.pushBusy=false;
  ASTERA_SYNC_STATE.initialCloudPullCompleted=false;
  loadAppSettings();
  if(cloudReady()){
    initData();
    initProds();
  }else{
    initData();initProds();
  }
  loadLogo2();checkOrders();
  if(cloudReady()){
    try{
      await cloudPullNow(true);
      renderPage(curPage||"dashboard");
    }catch(e){
      console.error("ASTERA startup cloud pull failed, opening with local state fallback:",e);
      ASTERA_RUNTIME_FLAGS.suppressStartupShippingNotice=false;
      ASTERA_RUNTIME_FLAGS.startupCloudHydrating=false;
      try{
        initData();
        initProds();
        loadLogo2();
        renderPage(curPage||"dashboard");
      }catch(renderErr){
        renderStartupBlockingError((renderErr&&renderErr.message)||(e&&e.message)||"Supabase verisi okunamadi");
        return;
      }
      notif("Buluttan guncel veri simdilik alinamadi. Panel yerel verilerle acildi.","red");
    }
  }else{
    renderPage("dashboard");
  }
  if(!cloudReady()&&restoreEmbeddedDataIfNeeded()){
    try{renderPage(curPage||"dashboard");}catch(e){}
    notif("Gomulu yedekten veriler geri yuklendi","grn");
  }else if(!cloudReady()){
    try{renderPage(curPage||"dashboard");}catch(e){renderPage("dashboard");}
  }
  if(cloudReady()){
    pullIncomingOrdersFromCloud(true);
  }
  document.querySelectorAll(".sb-item").forEach(function(el){el.addEventListener("click",function(){renderPage(this.getAttribute("data-page"));});});
  g("menuBtn").addEventListener("click",function(){g("sidebar").classList.toggle("open");g("overlay").classList.toggle("show");});
  g("modalOv").addEventListener("click",function(e){if(e.target===this)closeModal();});
  setInterval(checkOrders,30000);
  setInterval(function(){
    if(cloudReady())pullIncomingOrdersFromCloud(true);
  },15000);
  setInterval(function(){
    if(cloudReady())cloudPullNow(true);
  },8000);
  setInterval(function(){
    if(ASTERA_RUNTIME_FLAGS.pendingUiRefresh)flushPendingUiRefresh(false);
  },1200);
  document.addEventListener("visibilitychange",function(){
    if(!document.hidden&&cloudReady())cloudPullNow(true);
  });
  window.addEventListener("focus",function(){
    if(cloudReady())cloudPullNow(true);
  });
  window.addEventListener("pageshow",function(){
    if(cloudReady())cloudPullNow(true);
  });
  // Startup no longer hard-locks immediately; if cloud is briefly unavailable we continue with a safe local fallback.
  setTimeout(function(){ASTERA_RUNTIME_FLAGS.suppressStartupShippingNotice=false;ASTERA_RUNTIME_FLAGS.startupCloudHydrating=false;},4000);
};

  function salesWithin(days){
    var cutoff=daysAgo(days||ABCD_DAYS);
    return (window.SATIS||[]).filter(function(s){
      var d=parseDateSafe(s.tarih);
      return !d || d>=cutoff;
    });
  }
  function allProducts(){
    try{return typeof getAllP==="function" ? (getAllP()||[]) : [];}catch(e){return [];}
  }
  function norm(val,min,max){
    if(!isFinite(val)) return 0;
    if(!isFinite(min)||!isFinite(max)||max<=min) return val>0?100:0;
    return Math.max(0,Math.min(100,((val-min)/(max-min))*100));
  }
  function quantize(rows){
    rows=rows.slice().sort(function(a,b){ return (b.score||0)-(a.score||0); });
    var total=rows.reduce(function(a,x){ return a+(x.score||0); },0);
    if(total<=0){
      var n=rows.length||1;
      rows.forEach(function(x,i){
        x.autoClass = i < Math.ceil(n*0.15) ? "A" : i < Math.ceil(n*0.40) ? "B" : i < Math.ceil(n*0.75) ? "C" : "D";
      });
      return rows;
    }
    var running=0;
    rows.forEach(function(x){
      running += (x.score||0);
      var share = running/total;
      x.autoClass = share<=0.60 ? "A" : share<=0.85 ? "B" : share<=0.97 ? "C" : "D";
    });
    return rows;
  }
  function customerMetrics(days){
    var rows=(window.MUSTERILER||[]).map(function(m){
      var related=salesWithin(days).filter(function(s){ return (s.musteri||"")===(m.ad||""); });
      var revenue=related.reduce(function(a,s){ return a+(parseFloat(s.toplam)||0); },0);
      var profit=related.reduce(function(a,s){ return a+(parseFloat(s.kar)||0); },0);
      var orders=related.length;
      var balance=0;
      try{ balance = typeof getMBakiye==="function" ? (parseFloat(getMBakiye(m.ad))||0) : 0; }catch(e){ balance=0; }
      var tahsilatSaglik = revenue>0 ? Math.max(0,Math.min(100,100-((Math.max(balance,0)/revenue)*100))) : 0;
      return { key:m.ad, name:m.ad, revenue:revenue, profit:profit, orders:orders, balance:balance, pay:tahsilatSaglik, ref:m };
    });
    var revs=rows.map(function(x){return x.revenue;}),
        profs=rows.map(function(x){return x.profit;}),
        ords=rows.map(function(x){return x.orders;}),
        pays=rows.map(function(x){return x.pay;});
    var revMin=Math.min.apply(null,revs.concat([0])), revMax=Math.max.apply(null,revs.concat([0]));
    var prMin=Math.min.apply(null,profs.concat([0])), prMax=Math.max.apply(null,profs.concat([0]));
    var orMin=Math.min.apply(null,ords.concat([0])), orMax=Math.max.apply(null,ords.concat([0]));
    var paMin=Math.min.apply(null,pays.concat([0])), paMax=Math.max.apply(null,pays.concat([0]));
    rows.forEach(function(x){
      x.score = norm(x.revenue,revMin,revMax)*0.55
              + norm(x.profit,prMin,prMax)*0.20
              + norm(x.orders,orMin,orMax)*0.15
              + norm(x.pay,paMin,paMax)*0.10;
    });
    return quantize(rows);
  }
  function productMetrics(days){
    var prods=allProducts();
    var rows=prods.map(function(p){
      var key=(p.mann||"").trim();
      var related=salesWithin(days).filter(function(s){ return ((s.mann||"").trim())===key; });
      var revenue=related.reduce(function(a,s){ return a+(parseFloat(s.toplam)||0); },0);
      var profit=related.reduce(function(a,s){ return a+(parseFloat(s.kar)||0); },0);
      var qty=related.reduce(function(a,s){ return a+(parseFloat(s.adet)||0); },0);
      var freq=related.length;
      var stock=parseFloat(p.stokAdet)||0;
      var turn = qty>0 ? (qty/(stock+1)) : 0;
      return { key:p.id||p.mann, mann:p.mann||"", name:p.name||"", group:p.grupLabel||p.grupKey||"", revenue:revenue, profit:profit, qty:qty, freq:freq, stock:stock, turn:turn, ref:p };
    });
    var revs=rows.map(function(x){return x.revenue;}),
        profs=rows.map(function(x){return x.profit;}),
        qtys=rows.map(function(x){return x.qty;}),
        turns=rows.map(function(x){return x.turn;});
    var revMin=Math.min.apply(null,revs.concat([0])), revMax=Math.max.apply(null,revs.concat([0]));
    var prMin=Math.min.apply(null,profs.concat([0])), prMax=Math.max.apply(null,profs.concat([0]));
    var qtMin=Math.min.apply(null,qtys.concat([0])), qtMax=Math.max.apply(null,qtys.concat([0]));
    var tuMin=Math.min.apply(null,turns.concat([0])), tuMax=Math.max.apply(null,turns.concat([0]));
    rows.forEach(function(x){
      x.score = norm(x.revenue,revMin,revMax)*0.45
              + norm(x.profit,prMin,prMax)*0.20
              + norm(x.qty,qtMin,qtMax)*0.20
              + norm(x.turn,tuMin,tuMax)*0.15;
    });
    return quantize(rows);
  }

        var p=findProductById(id);
        if(p){
          p.sinif=safeLetter(cls);
          p.sinifModu="manuel";
          saveDataOnly();
        }
      };
      window.updateP.__abcdPatched=true;
    }
    if(window.loadUEdit && !window.loadUEdit.__abcdRepatch){
      var origLoadUEdit=window.loadUEdit;
      window.loadUEdit=function(){
        origLoadUEdit.apply(this,arguments);
        setTimeout(function(){
          if(typeof renderUrunTab==="function" && window.urunTab==="guncelle"){
            var editForm=document.getElementById("uEditForm");

              var pId=document.getElementById("ug_p") && document.getElementById("ug_p").value;
              var p=findProductById(pId);
              if(p){
                var area=editForm.querySelector(".flex.gap7") || editForm.lastElementChild;
                var row=document.createElement("div");
                row.className="fr";
                row.innerHTML="<div class='fg'><label>Ürün Sınıfı</label><select id='ue_sinif'>"
                  +["A","B","C","D"].map(function(x){ return "<option"+(safeLetter(p.sinif||"D")===x?" selected":"")+">"+x+"</option>"; }).join("")
                  +"</select></div><div class='fg'><label>Sınıf Modu</label><input type='text' value='"+((p.sinifModu||"manuel")==="manuel"?"Manuel":"Otomatik")+"' disabled></div>";
                if(area) area.insertAdjacentElement("beforebegin",row);
              }
            }
          }
        },0);
      };
      window.loadUEdit.__abcdRepatch=true;
    }
  }

  function patchCustomerListBadges(){
    if(!window.renderML || window.renderML.__abcdPatched) return;
    var orig=window.renderML;
    window.renderML=function(){
      orig.apply(this,arguments);
      var list=document.getElementById("mList");
      if(!list) return;
      Array.prototype.forEach.call(list.children,function(item){
        var nameEl=item.querySelector(".fz12.fw7");
        if(!nameEl || item.querySelector("[data-abcd-badge]")) return;
        var name=nameEl.textContent.trim();
        var m=(window.MUSTERILER||[]).find(function(x){ return (x.ad||"")===name; });
        if(!m) return;
        var badge=document.createElement("span");
        badge.setAttribute("data-abcd-badge","1");
        badge.className="badge "+({A:"grn",B:"blue",C:"amb",D:"red"}[safeLetter(m.sinif||"D")]);
        badge.style.marginLeft="6px";
        badge.textContent=safeLetter(m.sinif||"D");
        nameEl.appendChild(badge);
      });
    };
    window.renderML.__abcdPatched=true;
  }

  function boot(){
    ensureFields();
    sidebarEnsure();
    patchRenderPage();
    patchCustomerModals();
    patchProductForms();
    patchCustomerListBadges();
    if(typeof renderPage==="function" && window.curPage){
      // current page re-render not forced unless one of patched pages
    }
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", boot);
  else setTimeout(boot,0);
})();
</script>
<script>
(function(){
  'use strict';

  var VENDOR_PAGE='tedarikciCari';
  var DEFAULT_TERMS_DAYS=30;
  var vendorFilter={q:'',status:''};
  var selectedVendor='';

  function fin(v){ var n=parseFloat(v); return Number.isFinite(n)?n:0; }
  function text(v){ return (typeof normalizeTurkishText==='function' ? normalizeTurkishText(v) : String(v==null?'':v)).trim(); }
  function esc(v){ return text(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function slugify(v){ return text(v).toLowerCase().replace(/ı/g,'i').replace(/ş/g,'s').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ö/g,'o').replace(/ç/g,'c').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') || ('id-'+Math.random().toString(36).slice(2,8)); }
  function todayISO(){ return typeof isoToday==='function' ? isoToday() : new Date().toISOString().slice(0,10); }
  function parseISODate(v){ if(typeof parseISODateSafe==='function') return parseISODateSafe(v); var s=text(v); if(!/^\d{4}-\d{2}-\d{2}$/.test(s)) return null; var d=new Date(s+'T00:00:00'); return Number.isNaN(d.getTime())?null:d; }
  function addDaysISO(iso,days){ var base=parseISODate(iso)||new Date(); var d=new Date(base.getTime()); d.setDate(d.getDate()+(parseInt(days,10)||0)); return d.toISOString().slice(0,10); }
  function diffDays(a,b){ var da=parseISODate(a), db=parseISODate(b||todayISO()); if(!da||!db) return 0; return Math.round((db.getTime()-da.getTime())/86400000); }
  function moneyFmt(v){ return (typeof fmt==='function'?fmt(fin(v)):fin(v).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}))+'₺'; }
  function dateFmt(v){ return typeof fD==='function' ? fD(v) : text(v); }
  function noteBadgeClass(v){ return v>0.0001 ? 'red' : 'grn'; }
  function persistIfPossible(key,val){ try{ if(typeof lsSave==='function'&&window.K&&key) lsSave(key,val); }catch(e){} }

  function ensureVendorStorageKeys(){
    if(!window.K) window.K={};
    if(!K.tedarikciler) K.tedarikciler='astera_tedarikciler_v1';
    if(!K.tedarikciCari) K.tedarikciCari='astera_tedarikci_cari_v1';
  }
  function loadVendorData(){
    ensureVendorStorageKeys();
    window.TEDARIKCILER=Array.isArray(window.TEDARIKCILER)?window.TEDARIKCILER:(typeof ls==='function'?ls(K.tedarikciler,[]):[]);
    window.TEDARIKCI_CARI=Array.isArray(window.TEDARIKCI_CARI)?window.TEDARIKCI_CARI:(typeof ls==='function'?ls(K.tedarikciCari,[]):[]);
  }
  function saveVendorMasters(){
    window.TEDARIKCILER=(window.TEDARIKCILER||[]).map(function(v){
      return {id:text(v.id)||('vd-'+slugify(v.ad||v.firma||'')),ad:text(v.ad||v.firma),yetkili:text(v.yetkili),tel:text(v.tel),iban:text(v.iban),vergiNo:text(v.vergiNo),vergiDairesi:text(v.vergiDairesi),vadeGun:Math.max(0,parseInt(v.vadeGun,10)||0),limit:fin(v.limit),not:text(v.not)};
    }).filter(function(v){ return v.ad; }).sort(function(a,b){ return a.ad.localeCompare(b.ad,'tr'); });
    persistIfPossible(K.tedarikciler,TEDARIKCILER);
  }
  function saveVendorLedger(){
    window.TEDARIKCI_CARI=(window.TEDARIKCI_CARI||[]).map(function(m){
      return {id:text(m.id)||uid(),tedarikci:text(m.tedarikci),tip:text(m.tip||'ÖDEME'),tarih:text(m.tarih)||todayISO(),vadeTarihi:text(m.vadeTarihi),tutar:fin(m.tutar),aciklama:text(m.aciklama),belgeNo:text(m.belgeNo),kaynakId:text(m.kaynakId),kaynakTip:text(m.kaynakTip),otomatik:!!m.otomatik,createdAt:text(m.createdAt)||new Date().toISOString()};
    }).filter(function(m){ return m.tedarikci&&m.tutar>=0; }).sort(function(a,b){ return (b.tarih||'').localeCompare(a.tarih||'') || (b.createdAt||'').localeCompare(a.createdAt||''); });
    persistIfPossible(K.tedarikciCari,TEDARIKCI_CARI);
  }
  function ensureVendorMaster(name){
    name=text(name);
    if(!name) return null;
    var found=(TEDARIKCILER||[]).find(function(v){ return v.ad===name; });
    if(found) return found;
    var row={id:'vd-'+slugify(name),ad:name,yetkili:'',tel:'',iban:'',vergiNo:'',vergiDairesi:'',vadeGun:DEFAULT_TERMS_DAYS,limit:0,not:''};
    TEDARIKCILER.push(row);
    saveVendorMasters();
    return row;
  }
  function vendorNamesUniverse(){
    var map={};
    var SATINALMA=window.SATINALMA||[];
    (TEDARIKCILER||[]).forEach(function(v){ if(v&&v.ad) map[v.ad]=true; });
    (SATINALMA||[]).forEach(function(s){ if(s&&s.firma) map[text(s.firma)]=true; });
    (TEDARIKCI_CARI||[]).forEach(function(m){ if(m&&m.tedarikci) map[text(m.tedarikci)]=true; });
    return Object.keys(map).sort(function(a,b){ return a.localeCompare(b,'tr'); });
  }
  function purchaseTotalDebt(purchase){ return fin(purchase.tutarBrut); }
  function debtMovementLabel(purchase){ var no=text(purchase.faturaNo); return text(purchase.aciklama)||('Hammadde faturası'+(no?' - '+no:'')); }
  function ensureVendorStructures(){
    loadVendorData();
    var SATINALMA=window.SATINALMA||[];
    var activePurchaseIds={};
    (SATINALMA||[]).forEach(function(sa){
      var firm=text(sa&&sa.firma);
      if(!firm) return;
      activePurchaseIds[text(sa.id)]=true;
      var vendor=ensureVendorMaster(firm)||{vadeGun:DEFAULT_TERMS_DAYS};
      var amount=purchaseTotalDebt(sa);
      var movement=(TEDARIKCI_CARI||[]).find(function(m){ return m.otomatik&&m.kaynakTip==='satinalma'&&text(m.kaynakId)===text(sa.id); });
      var payload={id:movement?movement.id:uid(),tedarikci:firm,tip:'BORÇ',tarih:text(sa.tarih)||todayISO(),vadeTarihi:addDaysISO(text(sa.tarih)||todayISO(),vendor.vadeGun),tutar:amount,aciklama:debtMovementLabel(sa),belgeNo:text(sa.faturaNo),kaynakId:text(sa.id),kaynakTip:'satinalma',otomatik:true,createdAt:movement&&movement.createdAt?movement.createdAt:new Date().toISOString()};
      if(movement) Object.assign(movement,payload); else TEDARIKCI_CARI.push(payload);
    });
    TEDARIKCI_CARI=(TEDARIKCI_CARI||[]).filter(function(m){ if(!(m&&m.otomatik&&m.kaynakTip==='satinalma')) return true; return !!activePurchaseIds[text(m.kaynakId)]; });
    saveVendorMasters();
    saveVendorLedger();
  }
  function getVendor(name){ return (TEDARIKCILER||[]).find(function(v){ return v.ad===name; })||null; }
  function getVendorMovements(name){ return (TEDARIKCI_CARI||[]).filter(function(m){ return m.tedarikci===name; }).sort(function(a,b){ return (b.tarih||'').localeCompare(a.tarih||'') || (b.createdAt||'').localeCompare(a.createdAt||''); }); }
  function getVendorSummary(name){
    var borc=0,odeme=0,iade=0,manuel=0,dueDebt=0;
    getVendorMovements(name).forEach(function(m){
      var tutar=fin(m.tutar);
      if(m.tip==='BORÇ') borc+=tutar;
      else if(m.tip==='MANUEL BORÇ') manuel+=tutar;
      else if(m.tip==='ÖDEME') odeme+=tutar;
      else if(m.tip==='İADE') iade+=tutar;
      if((m.tip==='BORÇ'||m.tip==='MANUEL BORÇ')&&m.vadeTarihi&&diffDays(m.vadeTarihi,todayISO())>0) dueDebt+=tutar;
    });
    var totalDebt=borc+manuel, bakiye=totalDebt-odeme-iade;
    return {tedarikci:name,borc:totalDebt,odeme:odeme,iade:iade,bakiye:bakiye,vadesiGecen:Math.max(0,Math.min(bakiye,dueDebt))};
  }
  function getVendorGlobalSummary(){
    var totals={borc:0,odeme:0,iade:0,bakiye:0,vadesiGecen:0};
    var rows=vendorNamesUniverse().map(getVendorSummary).filter(function(r){ return r.borc>0.0001||r.odeme>0.0001||r.bakiye>0.0001; }).sort(function(a,b){ return b.bakiye-a.bakiye; });
    rows.forEach(function(r){ totals.borc+=r.borc; totals.odeme+=r.odeme; totals.iade+=r.iade; totals.bakiye+=r.bakiye; totals.vadesiGecen+=r.vadesiGecen; });
    return {rows:rows,totals:totals};
  }

  function injectVendorMenu(){
    if(document.querySelector('.sb-item[data-page="'+VENDOR_PAGE+'"]')) return;
    var anchor=document.querySelector('.sb-item[data-page="satinalma"]')||document.querySelector('.sb-nav');
    if(!anchor||!anchor.parentNode) return;
    var item=document.createElement('div');
    item.className='sb-item';
    item.setAttribute('data-page',VENDOR_PAGE);
    item.innerHTML="<span class='sb-icon'>🏭</span>Tedarikçi Cari";
    anchor.parentNode.insertBefore(item,anchor.nextSibling);
    item.addEventListener('click',function(){ if(typeof renderPage==='function') renderPage(VENDOR_PAGE); });
  }

  function openVendorModal(name){
    var vendor=name?getVendor(name):null;
    var foot="<button class='btn btn-sec' onclick='closeModal()'>İptal</button>"
      +"<button class='btn btn-grn' onclick=\"saveVendorModal('"+esc(name||"").replace(/\"/g,'&quot;')+"')\">"+(vendor?'💾 Güncelle':'💾 Kaydet')+"</button>";
    openModal(vendor?'Tedarikçi Düzenle':'Yeni Tedarikçi',
      "<div class='fr'><div class='fg'><label>Firma / Tedarikçi</label><input id='vd_ad' value='"+esc(vendor&&vendor.ad||'')+"'></div><div class='fg'><label>Yetkili</label><input id='vd_yetkili' value='"+esc(vendor&&vendor.yetkili||'')+"'></div></div>"
      +"<div class='fr'><div class='fg'><label>Telefon</label><input id='vd_tel' value='"+esc(vendor&&vendor.tel||'')+"'></div><div class='fg'><label>Standart Vade (gün)</label><input type='number' min='0' id='vd_vade' value='"+esc((vendor&&vendor.vadeGun)!=null?vendor.vadeGun:DEFAULT_TERMS_DAYS)+"'></div></div>"
      +"<div class='fr'><div class='fg'><label>IBAN</label><input id='vd_iban' value='"+esc(vendor&&vendor.iban||'')+"'></div><div class='fg'><label>Risk / Limit</label><input type='number' step='0.01' id='vd_limit' value='"+esc(vendor&&vendor.limit||0)+"'></div></div>"
      +"<div class='fr'><div class='fg'><label>Vergi Dairesi</label><input id='vd_vd' value='"+esc(vendor&&vendor.vergiDairesi||'')+"'></div><div class='fg'><label>Vergi No</label><input id='vd_vn' value='"+esc(vendor&&vendor.vergiNo||'')+"'></div></div>"
      +"<div class='fr c1'><div class='fg'><label>Not</label><textarea id='vd_not'>"+esc(vendor&&vendor.not||'')+"</textarea></div></div>",
      foot

    );
  }
  function saveVendorModal(prevName){
    var ad=text(g('vd_ad')&&g('vd_ad').value);
    if(!ad){ notif('Tedarikçi adı zorunludur','red'); return; }
    var existing=prevName?getVendor(prevName):null;
    var row=existing||{id:'vd-'+slugify(ad)};
    row.ad=ad; row.yetkili=text(g('vd_yetkili')&&g('vd_yetkili').value); row.tel=text(g('vd_tel')&&g('vd_tel').value); row.vadeGun=Math.max(0,parseInt(g('vd_vade')&&g('vd_vade').value,10)||0); row.iban=text(g('vd_iban')&&g('vd_iban').value); row.limit=fin(g('vd_limit')&&g('vd_limit').value); row.vergiDairesi=text(g('vd_vd')&&g('vd_vd').value); row.vergiNo=text(g('vd_vn')&&g('vd_vn').value); row.not=text(g('vd_not')&&g('vd_not').value);
    if(!existing) TEDARIKCILER.push(row);
    if(prevName&&prevName!==ad){
      (TEDARIKCI_CARI||[]).forEach(function(m){ if(m.tedarikci===prevName) m.tedarikci=ad; });
      (SATINALMA||[]).forEach(function(s){ if(text(s.firma)===prevName) s.firma=ad; });
      persistIfPossible(K.satinalma,SATINALMA);
    }
    saveVendorMasters();
    ensureVendorStructures();
    closeModal();
    selectedVendor=ad;
    if(curPage===VENDOR_PAGE) pgVendorCari(); else if(curPage==='satinalma'&&typeof renderSATbl==='function') renderSATbl();
    notif(existing?'Tedarikçi güncellendi':'Tedarikçi eklendi','grn');
  }

  function openVendorMovementModal(name,movementId){
    var mv=movementId?(TEDARIKCI_CARI||[]).find(function(x){ return x.id===movementId; }):null;
    var currentName=name||(mv&&mv.tedarikci)||selectedVendor||'';
    var foot="<button class='btn btn-sec' onclick='closeModal()'>İptal</button>"
      +"<button class='btn btn-grn' onclick=\"saveVendorMovement('"+esc(movementId||"").replace(/\"/g,'&quot;')+"')\">"+(mv?'💾 Güncelle':'💾 Kaydet')+"</button>";
    openModal(mv?'Cari Hareket Düzenle':'Ödeme / İade Ekle',
      "<div class='fr'><div class='fg'><label>Tedarikçi</label><select id='vm_vendor'>"+vendorNamesUniverse().map(function(v){ return "<option value='"+esc(v)+"'"+(v===currentName?' selected':'')+">"+esc(v)+"</option>"; }).join('')+"</select></div><div class='fg'><label>Tip</label><select id='vm_tip'>"+['ÖDEME','İADE','MANUEL BORÇ'].map(function(t){ return "<option value='"+esc(t)+"'"+((mv&&mv.tip===t)||(!mv&&t==='ÖDEME')?' selected':'')+">"+esc(t)+"</option>"; }).join('')+"</select></div></div>"
      +"<div class='fr'><div class='fg'><label>Tarih</label><input type='date' id='vm_tarih' value='"+esc(mv&&mv.tarih||todayISO())+"'></div><div class='fg'><label>Vade Tarihi</label><input type='date' id='vm_vade' value='"+esc(mv&&mv.vadeTarihi||'')+"'></div></div>"
      +"<div class='fr'><div class='fg'><label>Tutar</label><input type='number' step='0.01' id='vm_tutar' value='"+esc(mv&&mv.tutar||0)+"'></div><div class='fg'><label>Belge No</label><input id='vm_belge' value='"+esc(mv&&mv.belgeNo||'')+"'></div></div>"
      +"<div class='fr c1'><div class='fg'><label>Açıklama</label><textarea id='vm_aciklama'>"+esc(mv&&mv.aciklama||'')+"</textarea></div></div>",
      foot

    );
  }
  function saveVendorMovement(movementId){
    var tedarikci=text(g('vm_vendor')&&g('vm_vendor').value), tip=text(g('vm_tip')&&g('vm_tip').value), tarih=text(g('vm_tarih')&&g('vm_tarih').value)||todayISO(), vade=text(g('vm_vade')&&g('vm_vade').value), tutar=fin(g('vm_tutar')&&g('vm_tutar').value);
    if(!tedarikci){ notif('Tedarikçi seçin','red'); return; }
    if(tutar<=0){ notif('Tutar sıfırdan büyük olmalı','red'); return; }
    ensureVendorMaster(tedarikci);
    var mv=movementId?(TEDARIKCI_CARI||[]).find(function(x){ return x.id===movementId; }):null;
    var row=mv||{id:uid(),createdAt:new Date().toISOString(),otomatik:false};
    row.tedarikci=tedarikci; row.tip=tip; row.tarih=tarih; row.vadeTarihi=vade; row.tutar=tutar; row.belgeNo=text(g('vm_belge')&&g('vm_belge').value); row.aciklama=text(g('vm_aciklama')&&g('vm_aciklama').value); row.kaynakId=''; row.kaynakTip='manuel'; row.otomatik=false;
    if(!mv) TEDARIKCI_CARI.push(row);
    saveVendorLedger();
    closeModal();
    selectedVendor=tedarikci;
    if(curPage===VENDOR_PAGE) pgVendorCari();
    notif(mv?'Hareket güncellendi':'Hareket kaydedildi','grn');
  }
  function deleteVendorMovement(id){
    var mv=(TEDARIKCI_CARI||[]).find(function(x){ return x.id===id; });
    if(!mv||mv.otomatik){ notif('Otomatik hareket silinemez','red'); return; }
    if(!confirm('Bu hareket silinsin mi?')) return;
    TEDARIKCI_CARI=TEDARIKCI_CARI.filter(function(x){ return x.id!==id; });
    saveVendorLedger();
    if(curPage===VENDOR_PAGE) pgVendorCari();
    notif('Hareket silindi','grn');
  }

  window.openVendorModal = openVendorModal;
  window.saveVendorModal = saveVendorModal;
  window.openVendorMovementModal = openVendorMovementModal;
  window.saveVendorMovement = saveVendorMovement;
  window.deleteVendorMovement = deleteVendorMovement;

  function renderVendorList(){
    var list=document.getElementById('vdList');
    if(!list) return;
    var q=text(vendorFilter.q).toLocaleLowerCase('tr');
    var rows=vendorNamesUniverse().map(function(name){ var summary=getVendorSummary(name); var vendor=getVendor(name)||{}; return {name:name,summary:summary,vendor:vendor}; }).filter(function(row){
      var hay=[row.name,row.vendor.yetkili,row.vendor.tel,row.vendor.iban].join(' ').toLocaleLowerCase('tr');
      if(q&&hay.indexOf(q)<0) return false;
      if(vendorFilter.status==='borclu') return row.summary.bakiye>0.0001;
      if(vendorFilter.status==='vadesiGecen') return row.summary.vadesiGecen>0.0001;
      return true;
    }).sort(function(a,b){ return b.summary.bakiye-a.summary.bakiye || a.name.localeCompare(b.name,'tr'); });
    if(!selectedVendor&&rows.length) selectedVendor=rows[0].name;
    if(selectedVendor&&!rows.some(function(r){ return r.name===selectedVendor; })) selectedVendor=rows.length?rows[0].name:'';
    if(!rows.length){
      list.innerHTML="<div class='empty-st'>Tedarikçi kaydı bulunamadı</div>";
      var detail=document.getElementById('vendorDetail');
      if(detail) detail.innerHTML="<div class='empty-st'><div style='font-size:32px;margin-bottom:8px'>🏭</div>Kayıt ekleyerek başlayın</div>";
      return;
    }
    list.innerHTML=rows.map(function(row){
      var active=row.name===selectedVendor, bakiye=row.summary.bakiye, overdue=row.summary.vadesiGecen;
      return "<div class='card' data-vendor='"+esc(row.name)+"' style='margin-bottom:8px;cursor:pointer;border-color:"+(active?'var(--gold)':'var(--bdr)')+";background:"+(active?'var(--sur2)':'var(--sur)')+"'><div class='card-body' style='padding:10px 12px'><div class='flex jb ic gap8'><div class='fw8 fz12'>"+esc(row.name)+"</div>"+(overdue>0?"<span class='badge red'>Vadesi Geçti</span>":(bakiye>0?"<span class='badge amb'>Borçlu</span>":"<span class='badge grn'>Temiz</span>"))+"</div>"+(row.vendor.yetkili?"<div class='fz10 txt2 mt8'>Yetkili: "+esc(row.vendor.yetkili)+"</div>":'')+"<div class='flex jb ic mt8'><span class='fz10 txt2'>Açık Bakiye</span><span class='mono fw8' style='color:"+(bakiye>0?'var(--red)':'var(--grn)')+"'>"+moneyFmt(bakiye)+"</span></div>"+(overdue>0?"<div class='flex jb ic mt8'><span class='fz10 txt2'>Vadesi Geçen</span><span class='mono fw8' style='color:var(--red)'>"+moneyFmt(overdue)+"</span></div>":'')+"</div></div>";
    }).join('');
    list.querySelectorAll('[data-vendor]').forEach(function(el){ el.onclick=function(){ selectedVendor=this.getAttribute('data-vendor'); renderVendorList(); renderVendorDetail(selectedVendor); }; });
    renderVendorDetail(selectedVendor);
  }
  function renderVendorDetail(name){
    var detail=document.getElementById('vendorDetail');
    if(!detail) return;
    name=text(name);

  function todayValue(){

  }

  function syncTeslimlerSafe(){
    if (bridge) return bridge.call("syncTeslimlerFromSatis", [], function(){});
    if (typeof global.syncTeslimlerFromSatis === "function") return global.syncTeslimlerFromSatis();
  }

  function getCariSummarySafe(m){
    if (bridge) return bridge.call("getCariSummary", [m], function(){ return { teslimat: 0, iade: 0, tahsilat: 0, bakiye: 0 }; });
    return typeof global.getCariSummary === "function" ? global.getCariSummary(m) : { teslimat: 0, iade: 0, tahsilat: 0, bakiye: 0 };
  }

  function renderCariBekleyenSafe(){
    if (bridge) return bridge.get("renderCariBekleyenHtml", function(){ return ""; });
    return typeof global.renderCariBekleyenHtml === "function" ? global.renderCariBekleyenHtml : function(){ return ""; };
  }

  function deleteSaleAndRefreshSafe(saleId, message){
    if (bridge) return bridge.call("deleteSaleAndRefresh", [saleId, message], function(){});
    if (typeof global.deleteSaleAndRefresh === "function") return global.deleteSaleAndRefresh(saleId, message);
  }

  function renderCariDetailSafe(customer){
    if (!customer) return;
    if (bridge) return bridge.call("renderCariDetail", [customer], function(){});
    if (typeof global.renderCariD === "function") return global.renderCariD(customer);
  }

  function renderCariListSafe(){
    if (bridge) return bridge.refresh(["renderCariList"]);
    if (typeof global.renderML === "function") return global.renderML();
  }

  function getTeslimBelgeViewerBuilder(){
    if (bridge) return bridge.get("buildTeslimBelgeViewerBody", null);
    return typeof global.buildTeslimBelgeViewerBody === "function" ? global.buildTeslimBelgeViewerBody : null;
  }

  function getCari(){ return readState("cari", []) || []; }
  function getMusteriler(){ return readState("musteriler", []) || []; }
  function getTeslimler(){ return readState("teslimler", []) || []; }
  function getSatis(){ return readState("satis", []) || []; }
  function getBekleyenSip(){ return readState("bekleyenSiparisler", []) || []; }

  function selectedCustomer(){ return bridge ? bridge.get("selectedCustomer", null) : (global.selMusteri || null); }
  function setSelectedCustomer(value){
    if (bridge) return bridge.set("selectedCustomer", value || null);
    global.selMusteri = value || null;
    return global.selMusteri;
  }

  function pushUndo(kind, label, data){
    if (bridge) return bridge.pushUndo(kind, label, data);
    if (typeof global.pushUndoSnapshot === "function") {
      try { global.pushUndoSnapshot(kind, label, data); } catch (err) {}
    }
  }

  function safeFindCustomer(input){
    if (bridge) return bridge.call("findCustomerByIdentity", [input], function(){ return null; });
    if (typeof global.findCustomerByIdentity === "function") return global.findCustomerByIdentity(input);
    return null;
  }

  function matchCustomer(mu, input){
    if (bridge) return bridge.call("customerMatchesIdentity", [mu, input], function(){ return !!mu && mu.ad === input; });
    if (typeof global.customerMatchesIdentity === "function") return global.customerMatchesIdentity(mu, input);
    return !!mu && mu.ad === input;
  }

  function refreshAfterCariChange(){
    var selected = selectedCustomer();
    renderCariDetailSafe(selected);
    renderCariListSafe();
  }

  function getCustomerUsageSummary(name){
    var mu = safeFindCustomer(name);
    var matches = function(value){
      return mu ? matchCustomer(mu, value) : value === name;
    };
    var satisCount = getSatis().filter(function(row){ return matches(row && row.musteri); }).length;
    var cariCount = getCari().filter(function(row){ return matches(row && row.musteri); }).length;
    var teslimCount = getTeslimler().filter(function(row){ return matches(row && row.musteri); }).length;
    var bekleyenCount = getBekleyenSip().filter(function(row){ return matches(row && row.musteri); }).length;
    return {
      satis: satisCount,
      cari: cariCount,
      teslim: teslimCount,
      bekleyen: bekleyenCount,
      total: satisCount + cariCount + teslimCount + bekleyenCount
    };
  }

  function pgCari(){
    var pageActs = el("pageActs");
    var content = el("content");
    if (!pageActs || !content) {
      console.warn("CariModule.pgCari: required DOM not found.");
      return;
    }

    pageActs.innerHTML = "";
    var musteriBtn = document.createElement("button");
    musteriBtn.className = "btn btn-grn";
    musteriBtn.textContent = "+ Musteri";
    musteriBtn.onclick = openYMModal;
    pageActs.appendChild(musteriBtn);

    var tahsilatBtn = document.createElement("button");
    tahsilatBtn.className = "btn btn-acc";
    tahsilatBtn.textContent = "+ Tahsilat";
    tahsilatBtn.onclick = function(){ openTahsModal(selectedCustomer() || ""); };
    pageActs.appendChild(tahsilatBtn);

    content.innerHTML =
      "<div style='display:grid;grid-template-columns:260px 1fr;gap:13px;align-items:start' id='cariGrid'>"
      + "<div class='card' style='position:sticky;top:0'><div class='card-body' style='padding:10px'>"
      + "<input class='srch' id='mSrch' placeholder='Musteri ara...' style='margin-bottom:7px;width:100%'>"
      + "<div class='flex gap4 mb8' id='cariSiraBtn'></div>"
      + "<div class='flex gap4 mb8' id='cariDurBtn'></div>"
      + "<div id='mList' style='max-height:calc(100vh - 290px);overflow-y:auto'></div>"
      + "</div></div>"
      + "<div id='cariDetail'><div class='empty-st'><div style='font-size:32px;margin-bottom:8px'>?</div>Sol listeden musteri secin</div></div>"
      + "</div>";

    var siraDiv = el("cariSiraBtn");
    [["bakiye", "Bakiyeye Gore"], ["isim", "Isme Gore"]].forEach(function(pair){
      var btn = document.createElement("button");
      btn.className = "btn btn-sec btn-xs";
      btn.textContent = pair[1];
      btn.onclick = function(){ state.cariFlt.siralama = pair[0]; renderML(); };
      if (siraDiv) siraDiv.appendChild(btn);
    });

    var durDiv = el("cariDurBtn");
    [
      ["borclu", "Borclular", "var(--red-bg)", "var(--red)"],
      ["alacakli", "Alacaklilar", "var(--grn-bg)", "var(--grn)"],
      ["", "Tumu", "", ""]
    ].forEach(function(row){
      var btn = document.createElement("button");
      btn.className = row[2] ? "btn btn-xs" : "btn btn-sec btn-xs";
      btn.textContent = row[1];
      if (row[2]) btn.style.cssText = "background:" + row[2] + ";color:" + row[3] + ";border:none";
      btn.onclick = function(){ state.cariFlt.durum = row[0]; renderML(); };
      if (durDiv) durDiv.appendChild(btn);
    });

    var search = el("mSrch");
    if (search) {
      search.value = state.cariFlt.q || "";
      search.oninput = function(){ state.cariFlt.q = String(this.value || "").toLowerCase(); renderML(); };
    }

    renderML();
  }

  function filterM(){
    var search = el("mSrch");
    state.cariFlt.q = String(search && search.value || "").toLowerCase();
    renderML();
  }

  function renderML(){
    syncCustomerRegistrySafe();

    var q = state.cariFlt.q || "";
    var dur = state.cariFlt.durum || "";
    var getBakiye = getCustomerBalance();
    var rows = getMusteriler()
      .filter(function(m){
        var hay = [m.ad || "", m.firma || "", m.tel || ""].concat(m.aliaslar || []).join(" ").toLocaleLowerCase("tr-TR");
        return !q || hay.indexOf(q) >= 0;
      })
      .map(function(m){ return Object.assign({}, m, { bak: getBakiye(m.ad) }); })
      .filter(function(m){
        if (dur === "borclu") return m.bak > 0.1;
        if (dur === "alacakli") return m.bak < -0.1;
        return true;
      });

    if (state.cariFlt.siralama === "bakiye") rows.sort(function(a, b){ return b.bak - a.bak; });
    else rows.sort(function(a, b){ return String(a.ad || "").localeCompare(String(b.ad || ""), "tr"); });

    var list = el("mList");
    if (!list) return;
    list.innerHTML = "";
    if (!rows.length) {
      list.innerHTML = "<div class='fz12 txt2' style='padding:12px'>Sonuc yok</div>";
      return;
    }

    rows.forEach(function(m){
      var bak = parseFloat(m.bak || 0) || 0;
      var color = bak > 0.1 ? "var(--red)" : bak < -0.1 ? "var(--grn)" : "var(--txt3)";
      var isActive = m.ad === selectedCustomer();
      var div = document.createElement("div");
      div.style.cssText = "padding:9px 10px;cursor:pointer;border-bottom:1px solid var(--bdr);transition:background .12s;" + (isActive ? "background:var(--acc);border-radius:6px;" : "");
      div.innerHTML =
        "<div class='fz12 fw7' style='" + (isActive ? "color:#fff" : "") + "'>" + (m.ad || "") + "</div>"
        + ((m.firma && m.firma !== m.ad) ? "<div class='fz10' style='color:" + (isActive ? "rgba(255,255,255,.72)" : "var(--txt2)") + "'>" + m.firma + "</div>" : "")
        + "<div class='fz11 mono' style='color:" + (isActive ? "rgba(255,255,255,.7)" : color) + "'>" + fmtMoney(bak) + " TL</div>"
        + (m.tel ? "<div class='fz10' style='color:" + (isActive ? "rgba(255,255,255,.5)" : "var(--txt3)") + "'>" + m.tel + "</div>" : "");
      div.onclick = function(){ selM(m.ad); };
      div.onmouseover = function(){ if (m.ad !== selectedCustomer()) this.style.background = "var(--sur2)"; };
      div.onmouseout = function(){ if (m.ad !== selectedCustomer()) this.style.background = ""; };
      list.appendChild(div);
    });
  }

  function selM(m){
    setSelectedCustomer(m);
    renderML();
    renderCariD(m);
  }

  function cariTeslimAyrintilar(id){
    var t = getTeslimler().find(function(x){ return x.id === id; });
    if (!t) return;
    var bn = t.belgeNo || String(t.id || "").slice(-6).toUpperCase();
    var rows = (t.items || []).map(function(s, i){
      return "<tr>"
        + "<td class='fz11'>" + (s.mann || "") + "</td>"
        + "<td><input type='number' class='tsl-edit-adet' data-i='" + i + "' value='" + (s.adet || 0) + "' min='0' style='width:60px;border:1.5px solid var(--bdr);border-radius:5px;padding:3px 6px;font-size:12px'></td>"
        + "<td><input type='number' class='tsl-edit-fiyat' data-i='" + i + "' value='" + ((parseFloat(s.fiyat) || 0).toFixed(2)) + "' step='0.01' min='0' style='width:80px;border:1.5px solid var(--bdr);border-radius:5px;padding:3px 6px;font-size:12px'></td>"
        + "<td class='mono r' id='tsl_sat_" + i + "'>" + fmtMoney(s.toplam || 0) + "TL</td>"
        + "<td class='c' style='white-space:nowrap'>"
        + "<button class='btn btn-amb btn-xs' style='margin-right:3px' onclick=\"openIadeModal('" + id + "','" + s.id + "')\">Iade</button>"
        + "<button class='btn btn-red btn-xs' onclick=\"deleteTeslimSaleFromCari('" + id + "','" + s.id + "')\">Sil</button>"
        + "</td>"
        + "</tr>";
    }).join("");

    var body = "<div style='font-size:11px;color:var(--txt2);margin-bottom:10px'>Belge No: <strong>" + bn + "</strong> - " + formatDateValue(t.tarih || "") + " - " + (t.musteri || "") + "</div>"
      + "<div style='padding:9px 10px;border:1px solid var(--bdr);border-radius:8px;background:var(--sur2);font-size:11px;margin-bottom:10px'>Yanlis eklenen satislar icin <strong>Sil</strong>, iade edilen kalemler icin <strong>Iade</strong> butonunu kullanin.</div>"
      + "<div class='tbl-wrap'><table class='tbl' id='tslEditTbl'><thead><tr>"
      + "<th>Urun (MANN)</th><th>Adet</th><th>Bir. Fiyat</th><th class='r'>Toplam</th><th class='c'>Islem</th>"
      + "</tr></thead><tbody>" + rows + "</tbody></table></div>"
      + "<div class='flex jb ic mt12' style='padding-top:10px;border-top:1.5px solid var(--bdr)'>"
      + "<span class='fz11 txt2'>Genel Toplam:</span>"
      + "<span class='mono fw8 fz12' id='tslEditGenel'>" + fmtMoney(t.toplam || 0) + "TL</span>"
      + "</div>";

    if (bridge || typeof global.openModal === "function") {
      openModalSafe("Teslimat Fisi Ayrintilari - " + bn, body,
        "<button class='btn btn-red' onclick=\"deleteTeslimBelgesi('" + id + "')\">Fisi Sil</button>"
        + "<button class='btn btn-sec' onclick='closeModal()'>Kapat</button>"
        + "<button class='btn btn-grn' onclick=\"saveTeslimEdit('" + id + "')\">Kaydet</button>", true);
    }

    setTimeout(function(){
      var tbl = document.getElementById("tslEditTbl");
      if (!tbl) return;
      function recalc(){
        var total = 0;
        (t.items || []).forEach(function(s, i){
          var adetEl = tbl.querySelector(".tsl-edit-adet[data-i='" + i + "']");
          var fiyatEl = tbl.querySelector(".tsl-edit-fiyat[data-i='" + i + "']");
          var adet = parseFloat(adetEl ? adetEl.value : s.adet) || 0;
          var fiyat = parseFloat(fiyatEl ? fiyatEl.value : s.fiyat) || 0;
          var sub = adet * fiyat;
          total += sub;
          var satir = document.getElementById("tsl_sat_" + i);
          if (satir) satir.textContent = fmtMoney(sub) + "TL";
        });
        var genel = document.getElementById("tslEditGenel");
        if (genel) genel.textContent = fmtMoney(total) + "TL";
      }
      Array.prototype.forEach.call(tbl.querySelectorAll(".tsl-edit-adet,.tsl-edit-fiyat"), function(inp){ inp.oninput = recalc; });
    }, 50);
  }

  function saveTeslimEdit(id){
    var teslimler = getTeslimler();
    var satis = getSatis();
    var t = teslimler.find(function(x){ return x.id === id; });
    if (!t) return notify("Fis bulunamadi", "red");
    var tbl = document.getElementById("tslEditTbl");
    if (!tbl) return notify("Tablo bulunamadi", "red");

    var total = 0;
    var nextItems = [];
    (t.items || []).forEach(function(s, i){
      var adetEl = tbl.querySelector(".tsl-edit-adet[data-i='" + i + "']");
      var fiyatEl = tbl.querySelector(".tsl-edit-fiyat[data-i='" + i + "']");
      s.adet = Math.max(0, parseFloat(adetEl ? adetEl.value : s.adet) || 0);
      s.fiyat = Math.max(0, parseFloat(fiyatEl ? fiyatEl.value : s.fiyat) || 0);
      s.toplam = s.adet * s.fiyat;
      var sale = satis.find(function(x){ return x.id === s.id; });
      if (sale) {
        sale.adet = s.adet;
        sale.fiyat = s.fiyat;
        sale.toplam = s.toplam;
        sale.kar = s.toplam - ((parseFloat(sale.maliyet) || 0) * s.adet);
      }
      if (s.adet > 0) {
        nextItems.push(s);
        total += s.toplam;
      } else {
        satis = satis.filter(function(x){ return x.id !== s.id; });
      }
    });

    t.items = nextItems;
    t.toplam = total;
    saveState("satis", satis);
    saveState("teslimler", teslimler);
    syncTeslimlerSafe();
    closeModalSafe();
    refreshAfterCariChange();
    notify("Teslimat fisi guncellendi", "grn");
  }

  function cariTeslimTaranYukle(id){
    var input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*,application/pdf";
    input.onchange = function(){
      var file = this.files && this.files[0];
      if (!file) return;
      if (file.size > 12 * 1024 * 1024) return notify("Dosya 12 MB'dan kucuk olmali", "red");
      var reader = new FileReader();
      reader.onload = function(){
        var teslimler = getTeslimler();
        var t = teslimler.find(function(x){ return x.id === id; });
        if (!t) return;
        t.tarananBelge = reader.result;
        saveState("teslimler", teslimler);
        notify("Taranmis belge kaydedildi", "grn");
        if (selectedCustomer()) renderCariD(selectedCustomer());
      };
      reader.readAsDataURL(file);
    };
    input.click();
  }

  function cariTeslimBelge(id){
    var t = getTeslimler().find(function(x){ return x.id === id; });
    if (!t) return;
    var bn = t.belgeNo || String(t.id || "").slice(-6).toUpperCase();
    var builder = getTeslimBelgeViewerBuilder();
    var body = builder ? builder(t) : null;
    if (body && (bridge || typeof global.openModal === "function")) {
      openModalSafe("Belge - " + bn, body,
        "<button class='btn btn-sec' onclick='closeModal()'>Kapat</button>"
        + "<button class='btn btn-acc' onclick=\"downloadTeslimDoc('" + id + "')\">Indir</button>", true);
      return;
    }
    if (bridge || typeof global.openModal === "function") {
      openModalSafe("Belge - " + bn,
        "<div class='empty-st' style='padding:30px 20px;text-align:center'><div style='font-size:14px;font-weight:700;margin-bottom:6px'>Belge yuklenmedi</div><div class='fz11 txt2'>Taran yukle ile belge ekleyebilirsiniz.</div></div>",
        "<button class='btn btn-sec' onclick='closeModal()'>Kapat</button>", false);
    }
  }

  function renderCariD(m){
    var summary = getCariSummarySafe(m);
    var mu = safeFindCustomer(m) || {};
    var teslimler = getTeslimler();
    var cari = getCari();
    var bekleyenRenderer = renderCariBekleyenSafe();

    var kaseHtml = mu.kase ? "<img src='" + mu.kase + "' style='max-width:90px;max-height:56px;border-radius:5px;border:1px solid var(--bdr);object-fit:contain'>" : "";
    var musteriTeslimler = teslimler.filter(function(t){ return mu.id ? matchCustomer(mu, t.musteri) : t.musteri === m; }).sort(function(a, b){ return String(b.signedAt || b.tarih || "").localeCompare(String(a.signedAt || a.tarih || "")); });
    var tahsilatlar = cari.filter(function(c){ return (mu.id ? matchCustomer(mu, c.musteri) : c.musteri === m) && c.tip === "TAHSILAT"; }).sort(function(a, b){ return String(b.tarih || "").localeCompare(String(a.tarih || "")); });
    var iadeler = cari.filter(function(c){ return (mu.id ? matchCustomer(mu, c.musteri) : c.musteri === m) && c.tip === "IADE"; }).sort(function(a, b){ return String(b.tarih || "").localeCompare(String(a.tarih || "")); });

  function openIadeModal(teslimId, itemId){
    var teslim = getTeslimler().find(function(x){ return x.id === teslimId; });
    if (!teslim) return;
    var item = (teslim.items || []).find(function(x){ return x.id === itemId; });
    if (!item) return notify("Satis kalemi bulunamadi", "red");
    var birim = (parseFloat(item.adet) || 0) > 0 ? (parseFloat(item.toplam) || 0) / (parseFloat(item.adet) || 1) : 0;
    if (!(bridge || typeof global.openModal === "function")) return;
    openModalSafe("Iade Kaydi",
      "<div class='fr'><div class='fg'><label>Urun</label><input type='text' value='" + (item.mann || "") + "' disabled></div><div class='fg'><label>Musteri</label><input type='text' value='" + (teslim.musteri || "") + "' disabled></div></div>"
      + "<div class='fr'><div class='fg'><label>Iade Tarihi</label><input type='date' id='iade_tarih' value='" + todayValue() + "'></div><div class='fg'><label>Iade Adedi</label><input type='number' id='iade_adet' min='1' max='" + (item.adet || 1) + "' value='" + (item.adet || 1) + "'></div></div>"
      + "<div class='fr'><div class='fg'><label>Iade Tutari (TL)</label><input type='number' id='iade_tutar' step='0.01' min='0' value='" + ((parseFloat(item.toplam) || 0).toFixed(2)) + "'></div><div class='fg'><label>Aciklama</label><input type='text' id='iade_aciklama' value='Teslimat fisinden iade edildi'></div></div>",
      "<button class='btn btn-sec' onclick='closeModal()'>Iptal</button><button class='btn btn-red' onclick=\"saveIadeKaydi('" + teslimId + "','" + itemId + "')\">Iade Kaydet</button>",
      true
    );
    setTimeout(function(){
      var adetInp = el("iade_adet");
      var tutarInp = el("iade_tutar");
      if (adetInp && tutarInp) {
        adetInp.oninput = function(){
          var adet = Math.max(1, parseFloat(adetInp.value) || 1);
          tutarInp.value = (adet * birim).toFixed(2);
        };
      }
    }, 30);
  }

  function saveIadeKaydi(teslimId, itemId){
    var teslim = getTeslimler().find(function(x){ return x.id === teslimId; });
    if (!teslim) return notify("Fis bulunamadi", "red");
    var item = (teslim.items || []).find(function(x){ return x.id === itemId; });
    if (!item) return notify("Satis kalemi bulunamadi", "red");
    var tarih = (el("iade_tarih") && el("iade_tarih").value) || todayValue();
    var adet = Math.max(1, parseFloat(el("iade_adet") && el("iade_adet").value) || 0);
    if (adet > (parseFloat(item.adet) || 0)) return notify("Iade adedi satis adedinden buyuk olamaz", "red");
    var tutar = parseFloat(el("iade_tutar") && el("iade_tutar").value) || 0;
    if (!tutar) return notify("Iade tutari gerekli", "red");
    var cari = getCari();
    cari.push({
      id: makeId(),
      tarih: tarih,
      musteri: teslim.musteri,
      tip: "IADE",
      tutar: tutar,
      aciklama: (el("iade_aciklama") && el("iade_aciklama").value) || ((item.mann || "") + " iadesi"),
      teslimId: teslimId,
      satisId: itemId,
      adet: adet,
      mann: item.mann || ""
    });
    saveState("cari", cari);
    closeModalSafe();
    refreshAfterCariChange();
    notify("Iade cari hesaba islendi", "grn");
  }

  function deleteTeslimSaleFromCari(teslimId, saleId){
    var teslim = getTeslimler().find(function(x){ return x.id === teslimId; });
    var item = teslim && (teslim.items || []).find(function(x){ return x.id === saleId; });
    if (!item) return notify("Satis kalemi bulunamadi", "red");
    if (!confirmAction((item.mann || "Bu satis") + " kalemi cari hesaptan silinsin mi?")) return;
    closeModalSafe();
    deleteSaleAndRefreshSafe(saleId, "Satis cari hesaptan silindi");
  }

  var api = {
    pgCari: pgCari,
    filterM: filterM,
    renderML: renderML,
    selM: selM,
    cariTeslimAyrintilar: cariTeslimAyrintilar,
    saveTeslimEdit: saveTeslimEdit,
    cariTeslimTaranYukle: cariTeslimTaranYukle,
    cariTeslimBelge: cariTeslimBelge,
    renderCariD: renderCariD,
    openMEdit: openMEdit,
    saveMEdit: saveMEdit,
    previewKase: previewKase,
    openTahsModal: openTahsModal,
    saveTahs: saveTahs,
    openYMModal: openYMModal,
    saveYM: saveYM,
    deleteMusteri: deleteMusteri,
    getCariKayitById: getCariKayitById,
    deleteCariKaydi: deleteCariKaydi,
    openCariKayitEditModal: openCariKayitEditModal,
    saveCariKayitEdit: saveCariKayitEdit,
    openIadeModal: openIadeModal,
    saveIadeKaydi: saveIadeKaydi,
    deleteTeslimSaleFromCari: deleteTeslimSaleFromCari
  };

  global.CariModule = api;
  Object.keys(api).forEach(function(key){ global[key] = api[key]; });
})(window);

}
